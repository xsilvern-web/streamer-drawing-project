<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방송 관리자 대시보드</title>
    <!-- ✨ 추가: 일괄 다운로드를 위한 압축 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 로그인 화면 */
        #login-screen {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            margin-top: 100px;
        }

        #login-screen input {
            padding: 10px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* 대시보드 화면 */
        #dashboard {
            display: none;
            width: 100%;
            max-width: 1000px;
            display: none; /* JS에서 block으로 전환 */
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .panel-title {
            margin-top: 0;
            color: #4fc3f7;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 8px 15px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary { background: #007acc; color: white; }
        .btn-primary:hover { background: #005f9e; }
        
        .btn-danger { background: #d32f2f; color: white; }
        .btn-danger:hover { background: #b71c1c; }
        
        .btn-success { background: #4CAF50; color: white; }
        .btn-success:hover { background: #388E3C; }

        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #f57c00; }

        input[type="text"], input[type="number"] {
            background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 4px;
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #444;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }
        th { background: #333; color: #ccc; }
        tr:nth-child(even) { background: #2a2a2b; }

        .control-group {
            display: flex; gap: 10px; align-items: center; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- 로그인 팝업 -->
    <div id="login-screen">
        <h2>🔒 관리자 로그인</h2>
        <input type="password" id="admin-pw" placeholder="비밀번호 입력" onkeypress="if(event.key === 'Enter') checkPassword()">
        <br>
        <button class="btn-primary" onclick="checkPassword()">접속하기</button>
    </div>

    <!-- 메인 대시보드 -->
    <div id="dashboard">
        <h1 style="margin: 0;">🎛️ 방송 스케치북 관리자</h1>
        
        <div style="display: flex; gap: 20px;">
            <!-- 좌측 패널 -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
                
                <!-- 방송 제어 패널 -->
                <div class="panel">
                    <h2 class="panel-title">전체 제어</h2>
                    <div class="control-group">
                        <span style="font-size: 16px;">현재 상태:</span>
                        <span id="status-text" style="font-size: 18px; font-weight: bold;">확인 중...</span>
                        <button id="btn-toggle" class="btn-primary" onclick="toggleDonation()">수신 상태 변경</button>
                    </div>
                    <div class="control-group" style="margin-top: 20px;">
                        <button class="btn-warning" onclick="skipCurrentDrawing()" style="width: 100%; padding: 12px; font-size: 15px;">
                            ⏭️ 현재 방송 화면에 나오는 그림 스킵하기 (강제종료)
                        </button>
                    </div>
                </div>

                <!-- 기본 설정 패널 -->
                <div class="panel">
                    <h2 class="panel-title">기본 설정</h2>
                    <div class="control-group">
                        <label style="width: 130px;">그림 노출 시간 (초)</label>
                        <input type="number" id="setting-duration" value="8" style="width: 60px;">
                    </div>
                    <div class="control-group">
                        <label style="width: 130px;">일일 갯수 제한</label>
                        <input type="number" id="setting-limit" value="0" style="width: 60px;" title="0이면 무제한">
                        <span style="font-size: 12px; color: #aaa;">(0 = 무제한)</span>
                    </div>
                    <button class="btn-success" onclick="saveSettings()">설정 저장</button>
                </div>

                <!-- 공지사항 팝업 패널 -->
                <div class="panel">
                    <h2 class="panel-title" style="color: #ff9800;">📢 실시간 공지 팝업 띄우기</h2>
                    <p style="font-size: 12px; color: #aaa; margin-bottom: 10px; margin-top: 0;">
                        내용을 작성하고 전송하면, 시청자들의 그리기 페이지에 최대 10초 내로 팝업창이 나타납니다.<br>
                        (내용을 완전히 지우고 전송하면 띄워진 팝업이 강제로 닫힙니다.)
                    </p>
                    <textarea id="admin-notice-input" rows="4" style="width: 100%; box-sizing: border-box; padding: 10px; border-radius: 4px; background: #222; color: white; border: 1px solid #555; font-size: 14px; margin-bottom: 10px;" placeholder="시청자에게 띄울 공지사항이나 경고 문구를 입력하세요..."></textarea>
                    <div style="text-align: right;">
                        <button class="btn-warning" onclick="sendNoticePopup()">팝업 전송하기</button>
                    </div>
                </div>

            </div>

            <!-- 우측 패널 -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
                
                <!-- 블랙리스트 관리 패널 -->
                <div class="panel">
                    <h2 class="panel-title" style="color: #ef5350;">블랙리스트 (차단 관리)</h2>
                    <div class="control-group">
                        <input type="text" id="ban-email" placeholder="차단할 고유ID (이메일)" style="flex: 1;">
                        <button class="btn-danger" onclick="banUser()">차단 추가</button>
                    </div>
                    <ul id="ban-list" style="list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; background: #222; border: 1px solid #444; border-radius: 4px; padding: 5px;">
                        <!-- 차단 목록 렌더링 -->
                    </ul>
                </div>

            </div>
        </div>

        <!-- 그리기 내역 (원장) 패널 -->
        <div class="panel" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <!-- ✨ 날짜 선택과 일괄 다운로드 영역 추가 -->
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h2 class="panel-title" style="margin: 0; border: none;">최근 그리기 내역 (다시 재생)</h2>
                    <input type="date" id="batch-date" style="background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; margin-left: 20px;">
                    <button class="btn-primary" style="background: #9c27b0;" onclick="downloadBatchByDate()">📦 일괄 다운로드</button>
                </div>
                <button class="btn-primary" onclick="loadLedger()">🔄 새로고침</button>
            </div>
            
            <div style="max-height: 400px; overflow-y: auto; margin-top: 15px;">
                <table id="ledger-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th style="width: 150px;">닉네임</th>
                            <th>제목</th>
                            <th style="width: 180px;">전송 시간</th>
                            <th style="width: 100px;">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 내역 렌더링 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = window.location.origin;
        let isEnabled = true;

        // 비밀번호 확인 및 로그인
        async function checkPassword() {
            const pw = document.getElementById('admin-pw').value;
            try {
                const res = await fetch(`${API_BASE}/api/verify-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                if (res.ok) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    loadSettings();
                    loadLedger();
                } else {
                    alert("비밀번호가 틀렸습니다.");
                }
            } catch (e) {
                alert("서버 연결 실패");
            }
        }

        // 설정 불러오기
        async function loadSettings() {
            try {
                const res = await fetch(`${API_BASE}/api/settings`);
                const data = await res.json();
                
                isEnabled = data.is_donation_enabled;
                updateStatusText();

                document.getElementById('setting-duration').value = data.display_duration;
                document.getElementById('setting-limit').value = data.daily_limit;
                document.getElementById('admin-notice-input').value = data.notice_text || "";

                const banListUl = document.getElementById('ban-list');
                banListUl.innerHTML = '';
                if(data.blocked_emails.length === 0) {
                    banListUl.innerHTML = '<li style="padding: 10px; color: #888; text-align: center;">차단된 사용자가 없습니다.</li>';
                } else {
                    data.blocked_emails.forEach(email => {
                        const li = document.createElement('li');
                        li.style.padding = '8px';
                        li.style.borderBottom = '1px solid #444';
                        li.style.display = 'flex';
                        li.style.justifyContent = 'space-between';
                        li.innerHTML = `
                            <span>${email}</span>
                            <button onclick="unbanUser('${email}')" style="background: transparent; color: #ef5350; border: 1px solid #ef5350; padding: 2px 6px; font-size: 11px;">해제</button>
                        `;
                        banListUl.appendChild(li);
                    });
                }
            } catch (e) {
                console.error("설정 로드 실패", e);
            }
        }

        function updateStatusText() {
            const statusEl = document.getElementById('status-text');
            if (isEnabled) {
                statusEl.innerText = "🟢 수신 허용 중";
                statusEl.style.color = "#4CAF50";
            } else {
                statusEl.innerText = "🔴 수신 차단됨 (닫힘)";
                statusEl.style.color = "#f44336";
            }
        }

        // 수신 온오프 토글
        async function toggleDonation() {
            try {
                const res = await fetch(`${API_BASE}/api/toggle-donation?enable=${!isEnabled}`, { method: 'POST' });
                if (res.ok) {
                    loadSettings();
                }
            } catch (e) {
                alert("설정 변경 실패");
            }
        }

        // 현재 화면 그림 스킵 (강제 종료)
        async function skipCurrentDrawing() {
            if(!confirm("현재 방송 화면에 그려지고 있는 그림을 강제로 종료(스킵)하시겠습니까?")) return;
            try {
                const res = await fetch(`${API_BASE}/api/skip`, { method: 'POST' });
                if (res.ok) {
                    alert("그림이 성공적으로 스킵되었습니다.");
                }
            } catch (e) {
                alert("스킵 실패");
            }
        }

        // 기본 설정 저장
        async function saveSettings() {
            const duration = parseInt(document.getElementById('setting-duration').value) || 8;
            const limit = parseInt(document.getElementById('setting-limit').value) || 0;
            try {
                const res = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_duration: duration, daily_limit: limit })
                });
                if (res.ok) alert("설정이 저장되었습니다.");
            } catch (e) {
                alert("저장 실패");
            }
        }

        // 실시간 팝업 전송
        async function sendNoticePopup() {
            const text = document.getElementById('admin-notice-input').value;
            const btn = event.target;
            btn.innerText = "전송 중...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notice_text: text })
                });
                
                if (response.ok) {
                    alert(text.trim() === "" ? "공지 팝업을 내렸습니다." : "시청자들에게 팝업을 띄웠습니다! (최대 10초 내에 반영됨)");
                } else {
                    alert("전송 실패: 서버 오류입니다.");
                }
            } catch (e) {
                alert("서버 연결 오류");
            } finally {
                btn.innerText = "팝업 전송하기";
                btn.disabled = false;
            }
        }

        // 차단 (Ban) 추가
        async function banUser() {
            const email = document.getElementById('ban-email').value.trim();
            if(!email) return;
            try {
                const res = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ add_blocked_email: email })
                });
                if (res.ok) {
                    document.getElementById('ban-email').value = '';
                    loadSettings();
                }
            } catch (e) {
                alert("차단 실패");
            }
        }

        // 차단 해제
        async function unbanUser(email) {
            try {
                const res = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ remove_blocked_email: email })
                });
                if (res.ok) {
                    loadSettings();
                }
            } catch (e) {
                alert("차단 해제 실패");
            }
        }

        // 그리기 내역 목록 로드
        async function loadLedger() {
            try {
                const res = await fetch(`${API_BASE}/api/recent-donations`);
                const data = await res.json();
                
                const tbody = document.querySelector('#ledger-table tbody');
                tbody.innerHTML = '';
                
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px; color: #888;">최근 내역이 없습니다.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const tr = document.createElement('tr');
                    // 기존 loadLedger() 함수 내의 tr.innerHTML 부분 수정
                    tr.innerHTML = `
                        <td>${item.id}</td>
                        <td>
                            <div style="font-weight: bold;">${item.name}</div>
                            <div style="font-size: 11px; color: #aaa;">${item.email}</div>
                        </td>
                        <td>${item.title}</td>
                        <td style="font-size: 12px; color: #bbb;">${item.time.split('.')[0]}</td>
                        <td>
                            <button class="btn-success" style="font-size: 11px; padding: 5px 10px;" onclick="replayDrawing(${item.id})">▶ 재생</button>
                            <!-- ✨ 다운로드 버튼 추가 -->
                            <button class="btn-primary" style="font-size: 11px; padding: 5px 10px; margin-left: 5px;" onclick="downloadSingleDrawing(${item.id}, '${item.name}', '${item.time}')">💾 다운</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("내역 로드 실패", e);
            }
        }

        // 단일 내역 다시 방송 화면에 띄우기
        async function replayDrawing(id) {
            if(!confirm(`해당 그림(ID: ${id})을 방송 화면에 다시 재생하시겠습니까?`)) return;
            try {
                const res = await fetch(`${API_BASE}/api/replay-donation/${id}`, { method: 'POST' });
                if (res.ok) {
                    alert("방송 화면에 재생을 요청했습니다.");
                } else {
                    alert("데이터를 찾을 수 없거나 재생에 실패했습니다.");
                }
            } catch (e) {
                alert("재생 요청 실패");
            }
        }
        // ✨ [핵심 기능] 서버의 그리기 데이터를 해석하여 보이지 않는 캔버스에 그린 후 PNG로 반환하는 엔진
        async function renderDrawingToDataURL(drawingData) {
            const canvas = document.createElement('canvas');
            canvas.width = 1920; canvas.height = 1080;
            const ctx = canvas.getContext('2d');

            // 1. 다중 프레임(움짤) 모드인 경우, 첫 프레임만 추출
            if (drawingData.isAnimation && drawingData.frames && drawingData.frames.length > 0) {
                return await new Promise(res => {
                    const img = new Image();
                    img.onload = () => { ctx.drawImage(img, 0, 0); res(canvas.toDataURL('image/png')); };
                    img.src = drawingData.frames[0].src;
                });
            }

            // 2. 일반 드로잉 데이터 해석 및 렌더링
            const items = Array.isArray(drawingData) ? drawingData : [];
            for (let item of items) {
                if (item.type === 'raster_image') {
                    await new Promise(res => {
                        const img = new Image();
                        img.onload = () => {
                            ctx.save(); ctx.translate(item.cx, item.cy); ctx.rotate(item.angle || 0);
                            ctx.drawImage(img, -item.width/2, -item.height/2, item.width, item.height);
                            ctx.restore(); res();
                        };
                        img.src = item.src;
                    });
                } else if (item.type === 'path' || !item.type) {
                    if(!item.points || item.points.length === 0) continue;
                    ctx.globalCompositeOperation = item.color === 'erase' ? 'destination-out' : 'source-over';
                    ctx.globalAlpha = item.opacity !== undefined ? item.opacity : 1.0;
                    ctx.fillStyle = item.color === 'erase' ? 'rgba(0,0,0,1)' : item.color;
                    
                    for (let i = 1; i < item.points.length; i++) {
                        const p1 = item.points[i-1], p2 = item.points[i];
                        const dx = p2.x - p1.x, dy = p2.y - p1.y, distance = Math.hypot(dx, dy);
                        const spacing = Math.max(1, Math.min(p1.w, p2.w) * 0.1);
                        const steps = Math.max(1, Math.floor(distance / spacing));
                        for(let j=0; j<=steps; j++) {
                            const ratio = steps===0 ? 1 : j/steps;
                            const cx = p1.x + dx*ratio, cy = p1.y + dy*ratio, cw = p1.w + (p2.w-p1.w)*ratio;
                            ctx.beginPath(); ctx.arc(cx, cy, cw/2, 0, Math.PI*2); ctx.fill();
                        }
                    }
                } else if (['line', 'rect', 'circle', 'text', 'draw_shape'].includes(item.type)) {
                    ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1.0;
                    ctx.strokeStyle = item.color; ctx.lineWidth = item.width || 5; ctx.beginPath();
                    let shape = item.shape || item.type;
                    if (shape === 'line') { ctx.moveTo(item.start.x, item.start.y); ctx.lineTo(item.end.x, item.end.y); ctx.stroke(); }
                    else if (shape === 'rect') { ctx.strokeRect(item.start.x, item.start.y, item.end.x - item.start.x, item.end.y - item.start.y); }
                    else if (shape === 'circle') { let r = Math.hypot(item.end.x - item.start.x, item.end.y - item.start.y); ctx.arc(item.start.x, item.start.y, r, 0, Math.PI * 2); ctx.stroke(); }
                    else if (shape === 'text') {
                         ctx.font = `bold ${item.width}px 'Malgun Gothic', sans-serif`;
                         ctx.fillStyle = item.color; ctx.textBaseline = 'top';
                         const lines = item.end.text.split('\n'); let curY = item.start.y;
                         for(let line of lines) { ctx.fillText(line, item.start.x, curY); curY += item.width * 1.2; }
                    }
                }
            }

            // 다운로드 시 지우개로 뚫린 구멍이 까맣게 보이지 않도록 뒤에 흰색 배경 합성
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = 1920; finalCanvas.height = 1080;
            const fCtx = finalCanvas.getContext('2d');
            fCtx.fillStyle = '#ffffff'; fCtx.fillRect(0, 0, 1920, 1080);
            fCtx.drawImage(canvas, 0, 0);

            return finalCanvas.toDataURL('image/png');
        }

        // ✨ 1. 개별 이미지 다운로드 함수
        async function downloadSingleDrawing(id, name, time) {
            try {
                const res = await fetch(`${API_BASE}/api/donation/${id}`);
                if (!res.ok) throw new Error("데이터를 찾을 수 없습니다.");
                const data = await res.json();
                
                const dataUrl = await renderDrawingToDataURL(data.data);
                
                const link = document.createElement('a');
                // 저장될 파일 이름 규칙: 닉네임_날짜.png
                link.download = `drawing_${name}_${time.split(' ')[0]}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("이미지 다운로드 실패: " + e.message);
            }
        }

        // ✨ 2. 지정된 날짜 일괄 다운로드 (ZIP) 함수
        // ✨ 2. 지정된 날짜 일괄 다운로드 (ZIP) 함수 - 과부하 방지 버전으로 업그레이드!
        async function downloadBatchByDate() {
            const dateVal = document.getElementById('batch-date').value;
            if(!dateVal) return alert("먼저 다운로드할 날짜를 선택해주세요!");
            
            const btn = event.target;
            const originalText = btn.innerText;
            
            try {
                btn.innerText = "⏳ 목록 불러오는 중...";
                btn.disabled = true;

                // 1. 해당 날짜의 '목록(ID)'만 먼저 가볍게 가져옵니다.
                const res = await fetch(`${API_BASE}/api/donations/by-date?date=${dateVal}`);
                
                // HTML 에러 페이지가 반환되었을 때 뻗지 않도록 방어
                const contentType = res.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("서버에서 올바른 데이터를 반환하지 않았습니다. (서버 과부하)");
                }

                const list = await res.json();
                
                if(list.length === 0) {
                    alert(`${dateVal} 날짜에 저장된 그림이 없습니다.`);
                    btn.innerText = originalText;
                    btn.disabled = false;
                    return;
                }

                const zip = new JSZip();
                const folder = zip.folder(`donations_${dateVal}`);

                // ✨ 2. 목록의 ID를 바탕으로 서버가 뻗지 않게 1개씩 순차적으로 가져와 변환합니다.
                for (let i = 0; i < list.length; i++) {
                    const item = list[i];
                    btn.innerText = `⏳ 변환 및 압축 중... (${i+1} / ${list.length})`;
                    
                    try {
                        // 작동이 검증된 개별 조회 API를 재활용
                        const detailRes = await fetch(`${API_BASE}/api/donation/${item.id}`);
                        if (!detailRes.ok) continue;
                        const detailData = await detailRes.json();

                        const dataUrl = await renderDrawingToDataURL(detailData.data);
                        const base64Data = dataUrl.replace(/^data:image\/(png|jpg);base64,/, "");
                        const safeName = item.name.replace(/[^a-z0-9가-힣]/gi, '_'); // 파일명 오류 방지
                        folder.file(`[${item.id}]_${safeName}.png`, base64Data, {base64: true});
                    } catch(err) {
                        console.error(`ID ${item.id} 변환 실패:`, err);
                    }
                }

                btn.innerText = "⏳ ZIP 파일 생성 중...";
                const content = await zip.generateAsync({type:"blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `donations_${dateVal}.zip`;
                link.click();
                URL.revokeObjectURL(link.href);

                btn.innerText = originalText;
                btn.disabled = false;
            } catch(e) {
                alert("일괄 다운로드 중 오류 발생: " + e.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
