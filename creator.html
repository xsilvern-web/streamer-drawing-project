<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>크리에이터 제어판</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #1e1e1e; color: #eee; padding: 40px; display: flex; justify-content: center; }
        .dashboard { background: #2d2d2d; padding: 30px; border-radius: 10px; width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { border-bottom: 2px solid #007acc; padding-bottom: 10px; margin-top: 0; }
        .setting-group { margin-bottom: 20px; background: #333; padding: 15px; border-radius: 6px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input[type="number"], input[type="text"] { width: 100%; padding: 8px; background: #222; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #007acc; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #005f9e; }
        
        .toggle-btn { background: #ff4757; }
        .toggle-btn.on { background: #2ed573; }
        
        .ban-list { margin-top: 10px; font-size: 13px; color: #ff6b81; white-space: pre-line; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>⚙️ 후원 설정 제어판</h2>

        <div class="setting-group">
            <label>1. 후원 창구 On / Off</label>
            <button id="btn-toggle" class="toggle-btn on">🟢 현재 상태: 후원 열림 (클릭하여 닫기)</button>
        </div>

        <div class="setting-group">
            <label>2. 최소 후원 금액 설정 (원)</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="min-amount" value="1000" min="0">
                <button id="btn-save-amount" style="width: 80px;">저장</button>
            </div>
        </div>

        <div class="setting-group">
            <label>3. 악성 유저 이메일 차단</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="ban-email" placeholder="차단할 이메일 입력 (예: bad@gmail.com)">
                <button id="btn-ban" style="width: 80px; background: #ff4757;">차단</button>
            </div>
            <div class="ban-list" id="ban-list-display">차단된 이메일: 없음</div>
        </div>
    </div>

    <script>
        // ✨ 마법의 핵심: 현재 접속한 클라우드타입 웹 주소를 자동으로 감지합니다.
        const API_BASE = window.location.origin;

        // 1. 서버에서 최신 설정 불러오기
        async function fetchSettings() {
            try {
                const res = await fetch(`${API_BASE}/api/settings`);
                const data = await res.json();
                
                const btnToggle = document.getElementById('btn-toggle');
                if(data.is_donation_enabled) {
                    btnToggle.className = 'toggle-btn on';
                    btnToggle.innerText = '🟢 현재 상태: 후원 열림 (클릭하여 닫기)';
                } else {
                    btnToggle.className = 'toggle-btn';
                    btnToggle.innerText = '🔴 현재 상태: 후원 닫힘 (클릭하여 열기)';
                }

                // 서버에서 가져온 정상적인 숫자만 입력창에 넣도록 안전장치 추가
                if(data.min_amount !== null && data.min_amount !== undefined) {
                    document.getElementById('min-amount').value = data.min_amount;
                }
                
                document.getElementById('ban-list-display').innerText = data.blocked_emails.length > 0 ? `차단된 이메일:\n${data.blocked_emails.join('\n')}` : '차단된 이메일: 없음';
            } catch (error) {
                console.error("서버와 통신할 수 없습니다.", error);
            }
        }

        // 2. 후원 열기/닫기 토글
        document.getElementById('btn-toggle').onclick = async () => {
            const isCurrentlyOn = document.getElementById('btn-toggle').classList.contains('on');
            try {
                await fetch(`${API_BASE}/api/toggle-donation?enable=${!isCurrentlyOn}`, { method: 'POST' });
                fetchSettings(); // 변경 후 화면 즉시 새로고침
            } catch (error) {
                alert("상태 변경에 실패했습니다.");
            }
        };

        // 3. 최소 금액 저장
        document.getElementById('btn-save-amount').onclick = async () => {
            const amountVal = document.getElementById('min-amount').value;
            const amount = parseInt(amountVal);

            // 빈칸이거나 숫자가 아닌 값이 들어오는 것을 완벽 차단
            if (isNaN(amount) || amount < 0) {
                alert("올바른 금액을 입력해주세요.");
                return;
            }

            try {
                await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ min_amount: amount })
                });
                alert(`최소 후원 금액이 ${amount}원으로 저장되었습니다.`);
                fetchSettings(); // 저장 후 화면 즉시 새로고침
            } catch (error) {
                alert("서버 연결 문제로 저장에 실패했습니다.");
            }
        };

        // 4. 이메일 차단
        document.getElementById('btn-ban').onclick = async () => {
            const banEmail = document.getElementById('ban-email').value.trim();
            if(!banEmail || !banEmail.includes('@')) {
                alert("유효한 이메일 주소를 입력해주세요.");
                return;
            }

            try {
                await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ add_blocked_email: banEmail })
                });
                document.getElementById('ban-email').value = '';
                alert(`${banEmail} 계정이 차단되었습니다.`);
                fetchSettings();
            } catch (error) {
                alert("차단에 실패했습니다.");
            }
        };

        // 페이지가 열리면 즉시 서버 설정 불러오기
        fetchSettings();
    </script>
</body>
</html>
