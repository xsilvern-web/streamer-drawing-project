<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>크리에이터 제어판</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #1e1e1e; color: #eee; padding: 40px; display: flex; justify-content: center; }
        .dashboard { background: #2d2d2d; padding: 30px; border-radius: 10px; width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { border-bottom: 2px solid #007acc; padding-bottom: 10px; margin-top: 0; }
        .setting-group { margin-bottom: 20px; background: #333; padding: 15px; border-radius: 6px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 8px; background: #222; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #007acc; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #005f9e; }
        .toggle-btn { background: #ff4757; }
        .toggle-btn.on { background: #2ed573; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; }
        .action-btn { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; width: auto; }
        .unban-btn { background: #555; color: white; }
        .unban-btn:hover { background: #777; }
        .replay-btn { background: #ff9800; color: white; }
        .replay-btn:hover { background: #e68a00; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>⚙️ 그림 받기 제어판</h2>

        <div class="setting-group">
            <label>1. 그림 창구 On / Off</label>
            <button id="btn-toggle" class="toggle-btn on">🟢 현재 상태: 열림 (클릭하여 닫기)</button>
        </div>

        <div class="setting-group">
            <label>2. 악성 유저 이메일 차단</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="ban-email" placeholder="차단할 이메일 입력">
                <button id="btn-ban" style="width: 80px; background: #ff4757;">차단</button>
            </div>
            <div id="ban-list-container" style="margin-top: 10px;"></div>
        </div>

        <div class="setting-group">
            <label>3. 📺 최근 받은 그림 다시보기 (최대 10개)</label>
            <div id="recent-donations-container">내역을 불러오는 중...</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function fetchSettings() {
            try {
                const res = await fetch(`${API_BASE}/api/settings`);
                const data = await res.json();
                
                const btnToggle = document.getElementById('btn-toggle');
                if(data.is_donation_enabled) {
                    btnToggle.className = 'toggle-btn on'; btnToggle.innerText = '🟢 현재 상태: 열림 (클릭하여 닫기)';
                } else {
                    btnToggle.className = 'toggle-btn'; btnToggle.innerText = '🔴 현재 상태: 닫힘 (클릭하여 열기)';
                }
                
                const banContainer = document.getElementById('ban-list-container');
                banContainer.innerHTML = '';
                if(data.blocked_emails.length === 0) {
                    banContainer.innerHTML = '<div style="font-size: 13px; color: #aaa;">차단된 이메일이 없습니다.</div>';
                } else {
                    data.blocked_emails.forEach(email => {
                        const item = document.createElement('div');
                        item.className = 'list-item';
                        item.innerHTML = `<span style="color: #ff6b81;">${email}</span><button class="action-btn unban-btn" onclick="unbanEmail('${email}')">차단 해제</button>`;
                        banContainer.appendChild(item);
                    });
                }
            } catch (error) { console.error("설정 불러오기 실패", error); }
        }

        async function fetchRecentDonations() {
            try {
                const res = await fetch(`${API_BASE}/api/recent-donations`);
                const donations = await res.json();
                
                const container = document.getElementById('recent-donations-container');
                container.innerHTML = '';
                
                if(donations.length === 0) {
                    container.innerHTML = '<div style="font-size: 13px; color: #aaa;">최근 내역이 없습니다.</div>';
                    return;
                }
                
                donations.forEach(d => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <div><strong>${d.name}</strong> - ${d.title}</div>
                        <button class="action-btn replay-btn" onclick="replayDonation(${d.id})">다시보기</button>
                    `;
                    container.appendChild(item);
                });
            } catch (error) { console.error("내역 불러오기 실패", error); }
        }

        async function unbanEmail(email) {
            if(!confirm(`${email} 계정의 차단을 해제하시겠습니까?`)) return;
            await fetch(`${API_BASE}/api/update-settings`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ remove_blocked_email: email }) });
            fetchSettings();
        }

        async function replayDonation(id) {
            try {
                await fetch(`${API_BASE}/api/replay-donation/${id}`, { method: 'POST' });
                alert("해당 그림을 방송 화면에 다시 전송했습니다!");
            } catch (error) { alert("다시보기 재생에 실패했습니다."); }
        }

        document.getElementById('btn-toggle').onclick = async () => {
            const isCurrentlyOn = document.getElementById('btn-toggle').classList.contains('on');
            await fetch(`${API_BASE}/api/toggle-donation?enable=${!isCurrentlyOn}`, { method: 'POST' });
            fetchSettings();
        };

        document.getElementById('btn-ban').onclick = async () => {
            const banEmail = document.getElementById('ban-email').value.trim();
            if(!banEmail || !banEmail.includes('@')) return alert("유효한 이메일을 입력하세요.");
            await fetch(`${API_BASE}/api/update-settings`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ add_blocked_email: banEmail }) });
            document.getElementById('ban-email').value = '';
            fetchSettings();
        };

        fetchSettings(); fetchRecentDonations(); setInterval(fetchRecentDonations, 10000);
    </script>
</body>
</html>
