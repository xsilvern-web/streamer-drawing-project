<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>방송 관리자 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gifshot@0.3.2/build/gifshot.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 로그인 화면 */
        #login-screen {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-top: 100px;
        }

        #login-screen input {
            padding: 10px;
            font-size: 16px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* 대시보드 화면 */
        #dashboard {
            display: none;
            width: 100%;
            max-width: 1000px;
            display: none;
            /* JS에서 block으로 전환 */
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            margin-top: 0;
            color: #4fc3f7;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 8px 15px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary {
            background: #007acc;
            color: white;
        }

        .btn-primary:hover {
            background: #005f9e;
        }

        .btn-danger {
            background: #d32f2f;
            color: white;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-success:hover {
            background: #388E3C;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-warning:hover {
            background: #f57c00;
        }

        input[type="text"],
        input[type="number"] {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 10px;
            border-radius: 4px;
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #444;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #333;
            color: #ccc;
        }

        tr:nth-child(even) {
            background: #2a2a2b;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <!-- 로그인 팝업 -->
    <div id="login-screen">
        <h2>🔒 관리자 로그인</h2>
        <input type="password" id="admin-pw" placeholder="비밀번호 입력"
            onkeypress="if(event.key === 'Enter') checkPassword()">
        <br>
        <button class="btn-primary" onclick="checkPassword()">접속하기</button>
    </div>

    <!-- 메인 대시보드 -->
    <div id="dashboard">
        <h1 style="margin: 0;">🎛️ 방송 스케치북 관리자</h1>

        <div style="display: flex; gap: 20px;">
            <!-- 좌측 패널 -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">

                <!-- 방송 제어 패널 -->
                <div class="panel">
                    <h2 class="panel-title">전체 제어</h2>
                    <div class="control-group">
                        <span style="font-size: 16px;">현재 상태:</span>
                        <span id="status-text" style="font-size: 18px; font-weight: bold;">확인 중...</span>
                        <button id="btn-toggle" class="btn-primary" onclick="toggleDonation()">수신 상태 변경</button>
                    </div>
                    <div class="control-group" style="margin-top: 20px;">
                        <button class="btn-warning" onclick="skipCurrentDrawing()"
                            style="width: 100%; padding: 12px; font-size: 15px;">
                            ⏭️ 현재 방송 화면에 나오는 그림 스킵하기 (강제종료)
                        </button>
                    </div>
                </div>

                <!-- 기본 설정 패널 -->
                <div class="panel">
                    <h2 class="panel-title">기본 설정</h2>
                    <div class="control-group">
                        <label style="width: 130px;">그림 노출 시간 (초)</label>
                        <input type="number" id="setting-duration" value="8" style="width: 60px;">
                    </div>
                    <div class="control-group">
                        <label style="width: 130px;">일일 갯수 제한</label>
                        <input type="number" id="setting-limit" value="0" style="width: 60px;" title="0이면 무제한">
                        <span style="font-size: 12px; color: #aaa;">(0 = 무제한)</span>
                    </div>
                    <button class="btn-success" onclick="saveSettings()">설정 저장</button>
                </div>

                <!-- 공지사항 팝업 패널 -->
                <div class="panel">
                    <h2 class="panel-title" style="color: #ff9800;">📢 실시간 공지 팝업 띄우기</h2>
                    <p style="font-size: 12px; color: #aaa; margin-bottom: 10px; margin-top: 0;">
                        내용을 작성하고 전송하면, 시청자들의 그리기 페이지에 최대 10초 내로 팝업창이 나타납니다.<br>
                        (내용을 완전히 지우고 전송하면 띄워진 팝업이 강제로 닫힙니다.)
                    </p>
                    <textarea id="admin-notice-input" rows="4"
                        style="width: 100%; box-sizing: border-box; padding: 10px; border-radius: 4px; background: #222; color: white; border: 1px solid #555; font-size: 14px; margin-bottom: 10px;"
                        placeholder="시청자에게 띄울 공지사항이나 경고 문구를 입력하세요..."></textarea>
                    <div style="text-align: right;">
                        <button class="btn-warning" onclick="sendNoticePopup()">팝업 전송하기</button>
                    </div>
                </div>

            </div>

            <!-- 우측 패널 -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">

                <!-- 블랙리스트 관리 패널 -->
                <div class="panel">
                    <h2 class="panel-title" style="color: #ef5350;">블랙리스트 (차단 관리)</h2>
                    <div class="control-group">
                        <input type="text" id="ban-email" placeholder="차단할 고유ID (이메일)" style="flex: 1;">
                        <button class="btn-danger" onclick="banUser()">차단 추가</button>
                    </div>
                    <ul id="ban-list"
                        style="list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; background: #222; border: 1px solid #444; border-radius: 4px; padding: 5px;">
                        <!-- 차단 목록 렌더링 -->
                    </ul>
                </div>

            </div>
        </div>

        <!-- 그리기 내역 (원장) 패널 -->
        <div class="panel" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <!-- ✨ 날짜 선택과 일괄 다운로드 영역 추가 -->
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h2 class="panel-title" style="margin: 0; border: none;">최근 그리기 내역 (다시 재생)</h2>
                    <input type="date" id="batch-date"
                        style="background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; margin-left: 20px;">
                    <button class="btn-primary" style="background: #9c27b0;" onclick="downloadBatchByDate()">📦 일괄
                        다운로드</button>
                </div>
                <button class="btn-primary" onclick="loadLedger()">🔄 새로고침</button>
            </div>

            <div style="max-height: 400px; overflow-y: auto; margin-top: 15px;">
                <table id="ledger-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th style="width: 150px;">닉네임</th>
                            <th>제목</th>
                            <th style="width: 180px;">전송 시간</th>
                            <th style="width: 100px;">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 내역 렌더링 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ✨ 문의사항 (개발자에게 온 메시지) 패널 -->
        <div class="panel" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 class="panel-title" style="margin: 0; border: none; color: #ffb74d;">📮 문의사항 (개발자 메시지)</h2>
                <button class="btn-primary" onclick="loadInquiries()">🔄 새로고침</button>
            </div>
            <div style="max-height: 320px; overflow-y: auto; margin-top: 15px;">
                <table id="inquiry-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th style="width: 140px;">보낸이</th>
                            <th>내용</th>
                            <th style="width: 160px;">시간</th>
                            <th style="width: 70px;">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 문의 렌더링 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const brushImageCache = {};
        function colorizeBrush(brushName, colorHex) {
            const cacheKey = `${brushName}_${colorHex}`;
            if (brushImageCache[cacheKey]) return brushImageCache[cacheKey];

            const offCvs = document.createElement('canvas');
            const offCtx = offCvs.getContext('2d');
            const img = new Image();
            img.src = `/Brushes/${brushName}.png`;

            brushImageCache[cacheKey] = new Promise((resolve) => {
                img.onload = () => {
                    const w = img.width; const h = img.height;
                    offCvs.width = w; offCvs.height = h;
                    offCtx.drawImage(img, 0, 0, w, h);

                    const imgData = offCtx.getImageData(0, 0, w, h);
                    const data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const luminance = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                        const alpha = (255 - luminance) * (data[i + 3] / 255);
                        data[i] = 0; data[i + 1] = 0; data[i + 2] = 0; data[i + 3] = alpha;
                    }
                    offCtx.putImageData(imgData, 0, 0);

                    offCtx.globalCompositeOperation = "source-in";
                    offCtx.fillStyle = colorHex;
                    offCtx.fillRect(0, 0, w, h);
                    resolve(offCvs);
                };
                img.onerror = () => resolve(null);
            });
            return brushImageCache[cacheKey];
        }


        const API_BASE = window.location.origin;
        let isEnabled = true;

        // 비밀번호 확인 및 로그인
        async function checkPassword() {
            const pw = document.getElementById('admin-pw').value;
            try {
                const res = await fetch(`${API_BASE}/api/verify-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                if (res.ok) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    loadSettings();
                    loadLedger();
                    loadInquiries();
                } else {
                    alert("비밀번호가 틀렸습니다.");
                }
            } catch (e) {
                alert("서버 연결 실패");
            }
        }
        // ✨ 1. 채우기(버킷) 도구 완벽 지원을 위한 픽셀 연산 함수 추가
        function doFloodFill(ctx, startX, startY, colorStr, tolerance, gap, sampleAllLayers = false, layerContexts = null) {
            const canvasW = 1920; const canvasH = 1080;
            let sampleData;

            if (sampleAllLayers && layerContexts) {
                const offCvs = document.createElement('canvas'); offCvs.width = canvasW; offCvs.height = canvasH;
                const offCtx = offCvs.getContext('2d');

                const layers = Object.values(layerContexts).filter(c => c && c.canvasNode).sort((a, b) => {
                    const zA = parseInt(a.canvasNode.style.zIndex) || 0;
                    const zB = parseInt(b.canvasNode.style.zIndex) || 0;
                    return zA - zB;
                });

                layers.forEach(c => {
                    offCtx.globalAlpha = c.canvasNode.style.opacity || 1;
                    offCtx.globalCompositeOperation = c.canvasNode.style.mixBlendMode || 'source-over';
                    offCtx.drawImage(c.canvasNode, 0, 0);
                });
                sampleData = offCtx.getImageData(0, 0, canvasW, canvasH).data;
            } else {
                sampleData = ctx.getImageData(0, 0, canvasW, canvasH).data;
            }

            const sx = Math.floor(startX); const sy = Math.floor(startY);
            if (sx < 0 || sx >= canvasW || sy < 0 || sy >= canvasH) return;

            const startPos = (sy * canvasW + sx) * 4;
            const targetR = sampleData[startPos], targetG = sampleData[startPos + 1], targetB = sampleData[startPos + 2], targetA = sampleData[startPos + 3];

            const m = colorStr.match(/[\d.]+/g);
            if (!m || m.length < 3) return;
            const fillR = parseInt(m[0]), fillG = parseInt(m[1]), fillB = parseInt(m[2]), fillA = m[3] ? Math.round(parseFloat(m[3]) * 255) : 255;

            if (Math.abs(targetR - fillR) <= tolerance && Math.abs(targetG - fillG) <= tolerance && Math.abs(targetB - fillB) <= tolerance && Math.abs(targetA - fillA) <= tolerance) return;

            let checkData = sampleData;
            if (gap > 0) {
                const baseCvs = document.createElement('canvas'); baseCvs.width = canvasW; baseCvs.height = canvasH;
                const baseCtx = baseCvs.getContext('2d');
                const baseImgData = baseCtx.createImageData(canvasW, canvasH);
                baseImgData.data.set(sampleData);
                baseCtx.putImageData(baseImgData, 0, 0);

                const offCvs = document.createElement('canvas'); offCvs.width = canvasW; offCvs.height = canvasH;
                const offCtx = offCvs.getContext('2d');
                offCtx.drawImage(baseCvs, 0, 0);
                offCtx.globalAlpha = 1.0; offCtx.globalCompositeOperation = 'source-over';
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) { offCtx.drawImage(baseCvs, Math.cos(a) * gap, Math.sin(a) * gap); }
                checkData = offCtx.getImageData(0, 0, canvasW, canvasH).data;
            }

            const visited = new Uint8Array(canvasW * canvasH);
            const pixelStack = [[sx, sy]];

            function matchColor(x, y) {
                if (x < 0 || x >= canvasW || y < 0 || y >= canvasH) return false;
                const p = (y * canvasW + x) * 4;
                if (checkData[p + 3] === 0 && targetA === 0) return true;
                return Math.abs(checkData[p] - targetR) <= tolerance && Math.abs(checkData[p + 1] - targetG) <= tolerance && Math.abs(checkData[p + 2] - targetB) <= tolerance && Math.abs(checkData[p + 3] - targetA) <= tolerance;
            }

            while (pixelStack.length > 0) {
                const [cx, cy] = pixelStack.pop();
                let x = cx, y = cy;
                while (y >= 0 && matchColor(x, y)) y--;
                y++;
                let reachLeft = false, reachRight = false;
                while (y < canvasH && matchColor(x, y)) {
                    visited[y * canvasW + x] = 1;
                    if (x > 0) {
                        if (matchColor(x - 1, y) && !visited[y * canvasW + x - 1]) {
                            if (!reachLeft) { pixelStack.push([x - 1, y]); reachLeft = true; }
                        } else if (reachLeft) reachLeft = false;
                    }
                    if (x < canvasW - 1) {
                        if (matchColor(x + 1, y) && !visited[y * canvasW + x + 1]) {
                            if (!reachRight) { pixelStack.push([x + 1, y]); reachRight = true; }
                        } else if (reachRight) reachRight = false;
                    }
                    y++;
                }
            }

            const fillCvs = document.createElement('canvas'); fillCvs.width = canvasW; fillCvs.height = canvasH;
            const fillCtx = fillCvs.getContext('2d');
            const fillImgData = fillCtx.createImageData(canvasW, canvasH);
            const fd = fillImgData.data;
            for (let i = 0; i < canvasW * canvasH; i++) {
                if (visited[i]) { fd[i * 4] = fillR; fd[i * 4 + 1] = fillG; fd[i * 4 + 2] = fillB; fd[i * 4 + 3] = fillA; }
            }
            fillCtx.putImageData(fillImgData, 0, 0);

            ctx.globalCompositeOperation = 'source-over';
            if (gap > 0) {
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) { ctx.drawImage(fillCvs, Math.cos(a) * gap, Math.sin(a) * gap); }
            } else { ctx.drawImage(fillCvs, 0, 0); }
        }
        // 설정 불러오기
        async function loadSettings() {
            try {
                const res = await fetch(`${API_BASE}/api/settings`);
                const data = await res.json();

                isEnabled = data.is_donation_enabled;
                updateStatusText();

                document.getElementById('setting-duration').value = data.display_duration;
                document.getElementById('setting-limit').value = data.daily_limit;
                document.getElementById('admin-notice-input').value = data.notice_text || "";

                const banListUl = document.getElementById('ban-list');
                banListUl.innerHTML = '';
                if (data.blocked_emails.length === 0) {
                    banListUl.innerHTML = '<li style="padding: 10px; color: #888; text-align: center;">차단된 사용자가 없습니다.</li>';
                } else {
                    data.blocked_emails.forEach(email => {
                        const li = document.createElement('li');
                        li.style.padding = '8px';
                        li.style.borderBottom = '1px solid #444';
                        li.style.display = 'flex';
                        li.style.justifyContent = 'space-between';
                        li.innerHTML = `
                            <span>${email}</span>
                            <button onclick="unbanUser('${email}')" style="background: transparent; color: #ef5350; border: 1px solid #ef5350; padding: 2px 6px; font-size: 11px;">해제</button>
                        `;
                        banListUl.appendChild(li);
                    });
                }
            } catch (e) {
                console.error("설정 로드 실패", e);
            }
        }

        function updateStatusText() {
            const statusEl = document.getElementById('status-text');
            if (isEnabled) {
                statusEl.innerText = "🟢 수신 허용 중";
                statusEl.style.color = "#4CAF50";
            } else {
                statusEl.innerText = "🔴 수신 차단됨 (닫힘)";
                statusEl.style.color = "#f44336";
            }
        }

        // 수신 온오프 토글
        async function toggleDonation() {
            try {
                const res = await fetch(`${API_BASE}/api/toggle-donation?enable=${!isEnabled}`, { method: 'POST' });
                if (res.ok) {
                    loadSettings();
                }
            } catch (e) {
                alert("설정 변경 실패");
            }
        }

        // 현재 화면 그림 스킵 (강제 종료)
        async function skipCurrentDrawing() {
            if (!confirm("현재 방송 화면에 그려지고 있는 그림을 강제로 종료(스킵)하시겠습니까?")) return;
            try {
                const res = await fetch(`${API_BASE}/api/skip`, { method: 'POST' });
                if (res.ok) {
                    alert("그림이 성공적으로 스킵되었습니다.");
                }
            } catch (e) {
                alert("스킵 실패");
            }
        }

        // 기본 설정 저장
        async function saveSettings() {
            const duration = parseInt(document.getElementById('setting-duration').value) || 8;
            const limit = parseInt(document.getElementById('setting-limit').value) || 0;
            try {
                const res = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_duration: duration, daily_limit: limit })
                });
                if (res.ok) alert("설정이 저장되었습니다.");
            } catch (e) {
                alert("저장 실패");
            }
        }

        // 실시간 팝업 전송
        async function sendNoticePopup() {
            const text = document.getElementById('admin-notice-input').value;
            const btn = event.target;
            btn.innerText = "전송 중...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notice_text: text })
                });

                if (response.ok) {
                    alert(text.trim() === "" ? "공지 팝업을 내렸습니다." : "시청자들에게 팝업을 띄웠습니다! (최대 10초 내에 반영됨)");
                } else {
                    alert("전송 실패: 서버 오류입니다.");
                }
            } catch (e) {
                alert("서버 연결 오류");
            } finally {
                btn.innerText = "팝업 전송하기";
                btn.disabled = false;
            }
        }

        // 차단 (Ban) 추가
        async function banUser() {
            const email = document.getElementById('ban-email').value.trim();
            if (!email) return;
            try {
                const res = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ add_blocked_email: email })
                });
                if (res.ok) {
                    document.getElementById('ban-email').value = '';
                    loadSettings();
                }
            } catch (e) {
                alert("차단 실패");
            }
        }

        // 차단 해제
        async function unbanUser(email) {
            try {
                const res = await fetch(`${API_BASE}/api/update-settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ remove_blocked_email: email })
                });
                if (res.ok) {
                    loadSettings();
                }
            } catch (e) {
                alert("차단 해제 실패");
            }
        }

        // ✨ HTML 이스케이프 (문의 내용은 사용자 자유 입력이므로 XSS 방지)
        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        // ✨ 문의사항 목록 로드
        async function loadInquiries() {
            try {
                const res = await fetch(`${API_BASE}/api/inquiries`);
                const data = await res.json();
                const tbody = document.querySelector('#inquiry-table tbody');
                tbody.innerHTML = '';
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#888;">접수된 문의가 없습니다.</td></tr>';
                    return;
                }
                data.forEach(item => {
                    const tr = document.createElement('tr');
                    const emailHtml = item.email ? `<div style="font-size:11px; color:#aaa;">${escapeHtml(item.email)}</div>` : '';
                    tr.innerHTML = `
                        <td>${item.id}</td>
                        <td><div style="font-weight:bold;">${escapeHtml(item.name || '(익명)')}</div>${emailHtml}</td>
                        <td style="white-space:pre-wrap; word-break:break-word;">${escapeHtml(item.message)}</td>
                        <td style="font-size:12px; color:#bbb;">${escapeHtml((item.time || '').split('.')[0])}</td>
                        <td><button class="btn-danger" style="font-size:11px; padding:5px 10px;" onclick="deleteInquiry(${item.id})">삭제</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("문의 로드 실패", e);
            }
        }

        // ✨ 문의사항 삭제
        async function deleteInquiry(id) {
            if (!confirm(`문의(ID: ${id})를 삭제하시겠습니까?`)) return;
            try {
                const res = await fetch(`${API_BASE}/api/inquiry/${id}`, { method: 'DELETE' });
                if (res.ok) loadInquiries();
                else alert("삭제 실패");
            } catch (e) {
                alert("삭제 요청 실패");
            }
        }

        // 그리기 내역 목록 로드
        async function loadLedger() {
            try {
                const res = await fetch(`${API_BASE}/api/recent-donations`);
                const data = await res.json();

                const tbody = document.querySelector('#ledger-table tbody');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px; color: #888;">최근 내역이 없습니다.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const tr = document.createElement('tr');
                    // 기존 loadLedger() 함수 내의 tr.innerHTML 부분 수정
                    // ✨ email = 네이버 앱별 고유 식별자(차단 기준), naverEmail = 실제 메일 주소
                    const mailLine = item.naverEmail
                        ? `<div style="font-size: 11px; color: #81c784;" title="네이버 계정 메일">✉ ${escapeHtml(item.naverEmail)}</div>`
                        : '';
                    tr.innerHTML = `
                        <td>${item.id}</td>
                        <td>
                            <div style="font-weight: bold;">${escapeHtml(item.name)}</div>
                            ${mailLine}
                            <div style="font-size: 10px; color: #777; word-break: break-all;" title="차단에 사용하는 고유 식별자">${escapeHtml(item.email)}</div>
                        </td>
                        <td>${item.title}</td>
                        <td style="font-size: 12px; color: #bbb;">${item.time.split('.')[0]}</td>
                        <td>
                            <button class="btn-success" style="font-size: 11px; padding: 5px 10px;" onclick="replayDrawing(${item.id})">▶ 재생</button>
                            <!-- ✨ 다운로드 버튼 추가 -->
                            <button class="btn-primary" style="font-size: 11px; padding: 5px 10px; margin-left: 5px;" onclick="downloadSingleDrawing(${item.id}, '${item.name}', '${item.time}')">💾 다운</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("내역 로드 실패", e);
            }
        }

        // 단일 내역 다시 방송 화면에 띄우기
        async function replayDrawing(id) {
            if (!confirm(`해당 그림(ID: ${id})을 방송 화면에 다시 재생하시겠습니까?`)) return;
            try {
                const res = await fetch(`${API_BASE}/api/replay-donation/${id}`, { method: 'POST' });
                if (res.ok) {
                    alert("방송 화면에 재생을 요청했습니다.");
                } else {
                    alert("데이터를 찾을 수 없거나 재생에 실패했습니다.");
                }
            } catch (e) {
                alert("재생 요청 실패");
            }
        }
        // ✨ 2. 기존의 낡은 구형 renderBrushStroke 함수를 완전히 삭제하고 아래의 신형 비동기 함수로 교체합니다.
        async function renderBrushStroke(ctx, x1, y1, w1, x2, y2, w2, color, isEraser, brushType = null, spacingPercent = 0.1) {
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
            const dx = x2 - x1; const dy = y2 - y1; const distance = Math.hypot(dx, dy);
            const spacing = spacingPercent || 0.1;
            const step = Math.max(1, ((w1 + w2) / 2) * spacing);
            const steps = Math.floor(distance / step);

            let coloredBrushImg = null;
            if (!isEraser && brushType && brushType !== 'default') {
                coloredBrushImg = await colorizeBrush(brushType, color);
            }

            for (let i = 0; i <= steps; i++) {
                const ratio = steps === 0 ? 1 : i / steps;
                const cx = x1 + dx * ratio; const cy = y1 + dy * ratio; const cw = w1 + (w2 - w1) * ratio;
                if (coloredBrushImg) {
                    ctx.drawImage(coloredBrushImg, cx - cw / 2, cy - cw / 2, cw, cw);
                } else {
                    ctx.fillStyle = isEraser ? "rgba(0,0,0,1)" : color;
                    ctx.beginPath(); ctx.arc(cx, cy, cw / 2, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        // ✨ 2. [draw.html 완벽 호환] 레이어, 채우기, 투명도 버퍼링을 모두 지원하는 최적화 렌더링 엔진
        // ✨ [draw.html 완벽 호환] 레이어, 채우기, 투명도 버퍼링, 변형/유동화 호환 및 렌더링 속도 최적화 엔진
        async function renderDrawingToDataURL(drawingData) {
            // [움짤(GIF) 모드 처리]
            if (drawingData.isAnimation && drawingData.frames && drawingData.frames.length > 0) {
                const totalFrames = drawingData.frames.length;
                const opaqueFrames = [];
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 1920; tempCanvas.height = 1080;
                const tempCtx = tempCanvas.getContext('2d');

                for (let i = 0; i < totalFrames; i++) {
                    const frameSrc = drawingData.frames[i].src;
                    tempCtx.globalCompositeOperation = 'source-over';
                    tempCtx.fillStyle = '#ffffff';
                    tempCtx.fillRect(0, 0, 1920, 1080);

                    await new Promise((imgRes) => {
                        const img = new Image();
                        img.onload = () => {
                            tempCtx.drawImage(img, 0, 0);
                            opaqueFrames.push(tempCanvas.toDataURL('image/png'));
                            imgRes();
                        };
                        img.onerror = imgRes; img.src = frameSrc;
                    });
                }
                return new Promise((resolve, reject) => {
                    const avgDuration = drawingData.frames.reduce((acc, f) => acc + (f.duration || 500), 0) / totalFrames;
                    gifshot.createGIF({
                        images: opaqueFrames, gifWidth: 960, gifHeight: 540,
                        interval: avgDuration / 1000, numWorkers: 4
                    }, function (obj) {
                        if (!obj.error) resolve(obj.image);
                        else reject(new Error("GIF 생성 실패: " + obj.error));
                    });
                });
            }

            // [정지 이미지 모드 처리]
            const items = Array.isArray(drawingData) ? drawingData : [];
            const layerContexts = {};
            const layerOrder = [];

            // ✨ 투명도 겹침(애벌레 현상) 방지 및 속도 향상을 위한 버퍼 캔버스
            const tmpCvs = document.createElement('canvas');
            tmpCvs.width = 1920; tmpCvs.height = 1080;
            const tmpCtx = tmpCvs.getContext('2d');

            // 1) 초기 레이어 구성 설정
            const initItem = items.find(i => i.type === 'init_layers');
            if (initItem) {
                initItem.layers.forEach((l, index) => {
                    const cvs = document.createElement('canvas');
                    cvs.width = 1920; cvs.height = 1080;
                    cvs.style.zIndex = index + 1;
                    cvs.style.opacity = l.opacity !== undefined ? l.opacity : 1;
                    cvs.style.mixBlendMode = l.blendMode || 'normal';

                    layerContexts[l.id] = { canvasNode: cvs, ctx: cvs.getContext('2d') };
                    layerOrder.push(l.id);
                });
            }

            function getTargetLayer(layerId) {
                if (layerId && layerContexts[layerId]) return layerContexts[layerId];
                if (layerOrder.length === 0) {
                    const cvs = document.createElement('canvas');
                    cvs.width = 1920; cvs.height = 1080; cvs.style.zIndex = 1;
                    layerContexts['default'] = { canvasNode: cvs, ctx: cvs.getContext('2d') };
                    layerOrder.push('default');
                }
                return layerContexts[layerOrder[0]];
            }

            // 2) 그림 내역 순차적 그리기 (draw.html과 1:1 매칭)
            for (let item of items) {
                if (item.type === 'init_layers') continue;

                const targetLayer = getTargetLayer(item.layerId);
                const ctx = targetLayer.ctx;

                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1.0;

                // ✨ [오류 수정] 변형/이동 시 기존 객체를 지우는 로직 복원 (찌꺼기 및 이중 렌더링 방지)
                if (item.type === 'clear' || (item.type === 'draw_shape' && item.shape === 'clear')) {
                    ctx.clearRect(0, 0, 1920, 1080);
                }
                else if (item.type === 'raster_image' || (item.type === 'draw_shape' && item.shape === 'raster_image')) {
                    await new Promise(res => {
                        const img = new Image();
                        img.onload = () => {
                            ctx.save();
                            // ✨ [오류 수정] 유동화/병합 등 전체 덮어쓰기 시 잔상 제거 로직 복원
                            if (item.width >= 1920 && item.height >= 1080) {
                                ctx.clearRect(0, 0, 1920, 1080);
                            }
                            ctx.translate(item.cx, item.cy); ctx.rotate(item.angle || 0);
                            ctx.drawImage(img, -item.width / 2, -item.height / 2, item.width, item.height);
                            ctx.restore(); res();
                        };
                        img.onerror = res; img.src = item.src;
                    });
                }
                else if (item.type === 'fill') {
                    const px = item.point ? item.point.x : item.x;
                    const py = item.point ? item.point.y : item.y;
                    const tol = item.tolerance !== undefined ? item.tolerance : 50;
                    const gap = item.gap !== undefined ? item.gap : (item.gapSize !== undefined ? item.gapSize : 1);
                    doFloodFill(ctx, px, py, item.color, tol, gap, item.sampleAllLayers, layerContexts);
                }
                else if (item.type === 'path' || !item.type) {
                    if (!item.points || item.points.length === 0) continue;

                    // ✨ 브러시 종류와 간격 데이터 적용
                    const brushType = item.brushType || 'default';
                    const spacing = item.spacing || 0.1;

                    if (item.color === 'erase') {
                        if (item.points.length === 1) {
                            const p = item.points[0];
                            await renderBrushStroke(ctx, p.x, p.y, p.w, p.x, p.y, p.w, item.color, true, brushType, spacing);
                        } else {
                            for (let i = 1; i < item.points.length; i++) {
                                await renderBrushStroke(ctx, item.points[i - 1].x, item.points[i - 1].y, item.points[i - 1].w, item.points[i].x, item.points[i].y, item.points[i].w, item.color, true, brushType, spacing);
                            }
                        }
                    } else {
                        tmpCtx.clearRect(0, 0, 1920, 1080);
                        const rgbColor = item.color.startsWith('#') ? item.color : '#ffffff';
                        const opaqueColor = `rgba(${parseInt(rgbColor.slice(1, 3), 16)}, ${parseInt(rgbColor.slice(3, 5), 16)}, ${parseInt(rgbColor.slice(5, 7), 16)}, 1)`;

                        if (item.points.length === 1) {
                            const p = item.points[0];
                            await renderBrushStroke(tmpCtx, p.x, p.y, p.w, p.x, p.y, p.w, opaqueColor, false, brushType, spacing);
                        } else {
                            for (let i = 1; i < item.points.length; i++) {
                                await renderBrushStroke(tmpCtx, item.points[i - 1].x, item.points[i - 1].y, item.points[i - 1].w, item.points[i].x, item.points[i].y, item.points[i].w, opaqueColor, false, brushType, spacing);
                            }
                        }
                        ctx.globalAlpha = item.opacity !== undefined ? item.opacity : 1.0;
                        ctx.drawImage(tmpCvs, 0, 0);
                    }
                }
                else if (['line', 'rect', 'circle', 'text', 'draw_shape'].includes(item.type)) {
                    ctx.strokeStyle = item.color; ctx.fillStyle = item.color; ctx.lineWidth = item.width || 5; ctx.beginPath();
                    let shape = item.shape || item.type;
                    if (shape === 'line') { ctx.moveTo(item.start.x, item.start.y); ctx.lineTo(item.end.x, item.end.y); ctx.stroke(); }
                    else if (shape === 'rect') { if (item.filled) ctx.fillRect(item.start.x, item.start.y, item.end.x - item.start.x, item.end.y - item.start.y); ctx.strokeRect(item.start.x, item.start.y, item.end.x - item.start.x, item.end.y - item.start.y); }
                    else if (shape === 'circle') { let r = Math.hypot(item.end.x - item.start.x, item.end.y - item.start.y); ctx.arc(item.start.x, item.start.y, r, 0, Math.PI * 2); if (item.filled) ctx.fill(); ctx.stroke(); }
                }
            }

            // 3) 분리된 모든 레이어들을 z-index 순서에 맞게 최종 합성 (Baking)
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = 1920; finalCanvas.height = 1080;
            const fCtx = finalCanvas.getContext('2d');
            fCtx.fillStyle = '#ffffff';
            fCtx.fillRect(0, 0, 1920, 1080); // 최하단 흰색 배경

            layerOrder.forEach(id => {
                const l = layerContexts[id];
                fCtx.globalAlpha = l.canvasNode.style.opacity || 1;
                let mode = l.canvasNode.style.mixBlendMode || 'normal';
                fCtx.globalCompositeOperation = mode === 'normal' ? 'source-over' : mode;
                fCtx.drawImage(l.canvasNode, 0, 0);
            });

            return finalCanvas.toDataURL('image/png');
        }

        // ✨ 1. 개별 이미지 다운로드 함수
        async function downloadSingleDrawing(id, name, time) {
            try {
                const res = await fetch(`${API_BASE}/api/donation/${id}`);
                const data = await res.json();

                const dataUrl = await renderDrawingToDataURL(data.data);

                // ✨ 파일 확장자 자동 결정 (GIF인지 PNG인지)
                const isGif = dataUrl.startsWith("data:image/gif");
                const ext = isGif ? "gif" : "png";

                const link = document.createElement('a');
                link.download = `drawing_${name}_${time.split(' ')[0]}.${ext}`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드 실패: " + e.message);
            }
        }

        // ✨ 2. 지정된 날짜 일괄 다운로드 (ZIP) 함수
        // ✨ 2. 지정된 날짜 일괄 다운로드 (ZIP) 함수 - 과부하 방지 버전으로 업그레이드!
        async function downloadBatchByDate() {
            const dateVal = document.getElementById('batch-date').value;
            if (!dateVal) return alert("먼저 다운로드할 날짜를 선택해주세요!");

            const btn = event.target;
            const originalText = btn.innerText;

            try {
                btn.innerText = "⏳ 목록 불러오는 중...";
                btn.disabled = true;

                // 1. 해당 날짜의 '목록(ID)'만 먼저 가볍게 가져옵니다.
                const res = await fetch(`${API_BASE}/api/donations/by-date?date=${dateVal}`);

                // HTML 에러 페이지가 반환되었을 때 뻗지 않도록 방어
                const contentType = res.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("서버에서 올바른 데이터를 반환하지 않았습니다. (서버 과부하)");
                }

                const list = await res.json();

                if (list.length === 0) {
                    alert(`${dateVal} 날짜에 저장된 그림이 없습니다.`);
                    btn.innerText = originalText;
                    btn.disabled = false;
                    return;
                }

                const zip = new JSZip();
                const folder = zip.folder(`donations_${dateVal}`);

                // ✨ 2. 목록의 ID를 바탕으로 서버가 뻗지 않게 1개씩 순차적으로 가져와 변환합니다.
                for (let i = 0; i < list.length; i++) {
                    const item = list[i];
                    btn.innerText = `⏳ 변환 및 압축 중... (${i + 1} / ${list.length})`;

                    try {
                        // 작동이 검증된 개별 조회 API를 재활용
                        const detailRes = await fetch(`${API_BASE}/api/donation/${item.id}`);
                        if (!detailRes.ok) continue;
                        const detailData = await detailRes.json();

                        const dataUrl = await renderDrawingToDataURL(detailData.data);
                        const base64Data = dataUrl.split(',')[1]; // 헤더 제거 후 순수 데이터만 추출

                        // ✨ 확장자 결정
                        const isGif = dataUrl.startsWith("data:image/gif");
                        const ext = isGif ? "gif" : "png";

                        const safeName = item.name.replace(/[^a-z0-9가-힣]/gi, '_');
                        folder.file(`[${item.id}]_${safeName}.${ext}`, base64Data, { base64: true });
                    } catch (err) {
                        console.error(`ID ${item.id} 변환 실패:`, err);
                    }
                }

                btn.innerText = "⏳ ZIP 파일 생성 중...";
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `donations_${dateVal}.zip`;
                link.click();
                URL.revokeObjectURL(link.href);

                btn.innerText = originalText;
                btn.disabled = false;
            } catch (e) {
                alert("일괄 다운로드 중 오류 발생: " + e.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
