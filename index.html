<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OBS 알림 오버레이 (전체화면 + 그림 최우선)</title>
    <style>
        /* OBS 기본 여백 제거 및 화면 꽉 채우기 */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 1920px; 
            height: 1080px; 
            background-color: transparent; 
            overflow: hidden; 
            font-family: 'Malgun Gothic', sans-serif; 
        }
        
        #alert-container { 
            display: none; /* 평소엔 숨김 */
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 1. 후원 텍스트 (그림 뒤로 배치, 화면 상단 중앙) */
        #message-text {
            position: absolute;
            top: 50px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1; /* 낮을수록 뒤로 감 */
            color: #ffffff; 
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.9), 0px 0px 5px rgba(0,0,0,0.5);
            margin: 0;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 30px;
            border-radius: 50px;
        }

        /* 2. 그림 캔버스 (화면 전체 덮기, 텍스트보다 위로) */
        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10; /* 그림이 텍스트 위를 덮도록 최상단 배치 */
            background-color: transparent; /* 완전 투명 (그림만 남김) */
        }
    </style>
</head>
<body>

    <div id="alert-container">
        <!-- 후원 알림 글씨 (그림보다 뒤에 위치) -->
        <h1 id="message-text"></h1>
        
        <!-- 1920x1080 캔버스 (가장 위에서 렌더링) -->
        <canvas id="drawing-canvas" width="1920" height="1080"></canvas>
    </div>

    <script>
        // --- 기존 코드 삭제 ---
// const API_BASE = window.location.origin
// const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
// const ws = new WebSocket(`${protocol}${window.location.host}/ws`);  

// ✨ 새로 교체할 코드 (자동 재연결 기능 탑재)
const API_BASE = window.location.origin;
const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
const wsUrl = `${protocol}${window.location.host}/ws`;

let ws;

function connectWebSocket() {
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
        console.log("🟢 웹소켓 연결 성공!");
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        // ... (이 아래에 있던 data.type === 'alert' 등의 기존 로직은 그대로 두시면 됩니다!) ...
        
        if (data.type === 'alert') {
            document.getElementById('donor-name-display').innerText = data.name;
            document.getElementById('drawing-title-display').innerText = data.title;
            document.getElementById('donation-amount-display').innerText = data.amount + '원';
            
            alertContainer.classList.add('show');
            setTimeout(() => { alertContainer.classList.remove('show'); }, 5000);
            
            const audio = new Audio(`${API_BASE}/coin.mp3`);
            audio.play().catch(e => console.log("오디오 재생 에러:", e));
        } else if (data.type === 'clear') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        } else if (data.type === 'start_path') {
            ctx.beginPath();
            ctx.moveTo(data.point.x, data.point.y);
            ctx.strokeStyle = data.color === 'erase' ? 'rgba(0,0,0,1)' : data.color;
            ctx.globalCompositeOperation = data.color === 'erase' ? 'destination-out' : 'source-over';
        } else if (data.type === 'draw_line') {
            ctx.lineTo(data.point.x, data.point.y);
            ctx.lineWidth = data.point.w;
            ctx.stroke();
        } else if (data.type === 'draw_shape') {
            ctx.beginPath();
            ctx.strokeStyle = data.color;
            ctx.lineWidth = data.width;
            ctx.globalCompositeOperation = 'source-over';
            if (data.shape === 'line') {
                ctx.moveTo(data.start.x, data.start.y); ctx.lineTo(data.end.x, data.end.y);
            } else if (data.shape === 'rect') {
                ctx.rect(data.start.x, data.start.y, data.end.x - data.start.x, data.end.y - data.start.y);
            } else if (data.shape === 'circle') {
                let radius = Math.hypot(data.end.x - data.start.x, data.end.y - data.start.y);
                ctx.arc(data.start.x, data.start.y, radius, 0, Math.PI * 2);
            }
            ctx.stroke();
        }
    };

    // ✨ 서버가 끊으면 알아서 다시 연결합니다
    ws.onclose = () => {
        console.log("🔴 웹소켓 연결 끊김. 3초 후 재연결 시도...");
        setTimeout(connectWebSocket, 3000);
    };

    ws.onerror = (err) => {
        console.error("❌ 웹소켓 오류:", err);
        ws.close(); // 에러가 나면 닫아버리고 위의 onclose가 다시 살려내도록 유도
    };
}

// 최초 연결 실행
connectWebSocket();
    </script>

</body>
</html>
