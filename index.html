<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>방송용 스케치북 화면</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            overflow: hidden;
        }

        /* ✨ 그림 캔버스를 위로 올림 (z-index: 10) */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            /* ✨ 페이드인/아웃 시간을 1초로 변경하고, 기본 상태를 투명(0)으로 둡니다. */
            transition: opacity 1s ease-in-out;
            opacity: 0;
        }

        /* ✨ 알림창을 캔버스 아래(최하위 레이어)로 강등 (z-index: 1) */
        #alert-container {
            position: absolute;
            top: 50px;
            left: 50px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-family: 'Malgun Gothic', sans-serif;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            border: 2px solid #007acc;
        }

        #alert-container.show {
            opacity: 1;
        }

        .highlight {
            color: #ff9800;
            font-weight: bold;
            font-size: 24px;
        }

        #alert-profile-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: white;
            background-size: cover;
            background-position: center;
            border: 2px solid #ff9800;
        }

        /* ✨ 움짤 로딩 인디케이터 스타일 추가 */
        @keyframes pulse-opacity {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        #loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: #4CAF50;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            font-family: 'Malgun Gothic', sans-serif;
            border: 2px solid #4CAF50;
            z-index: 2000;
            /* 화면 최상단에 배치 */
            display: none;
            /* 기본적으로 숨김 */
            animation: pulse-opacity 1.5s infinite;
            /* 깜빡임 효과 */
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
    </style>
</head>

<body>
    <!-- ✨ 로딩 인디케이터 HTML 추가 -->
    <div id="loading-indicator">🎬 움짤 데이터를 수신하는 중입니다...</div>

    <div id="canvas-container"></div>

    <div id="alert-container">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="alert-profile-img"></div>
            <div>
                <div>🎉 <span id="donor-name-display" class="highlight"></span> 님이 그림을 보냈습니다!</div>
                <div style="font-size: 18px; margin-top: 5px;">제목: <span id="drawing-title-display"
                        style="color: #ccc;"></span></div>
            </div>
        </div>
    </div>

    <script>
        // 브러시 이미지를 담아둘 캐시 메모리
        const brushImageCache = {};
        // ✨ 장시간 방송 시 브러시색 조합이 무한정 쌓여 메모리 누수/프리즈가 생기지 않도록 상한을 둡니다.
        const BRUSH_CACHE_MAX = 150;
        function trimBrushCache() {
            const keys = Object.keys(brushImageCache);
            if (keys.length > BRUSH_CACHE_MAX) {
                for (let i = 0; i < keys.length - BRUSH_CACHE_MAX; i++) {
                    delete brushImageCache[keys[i]]; // 오래된 항목부터 제거(FIFO)
                }
            }
        }

        // 흑백 브러시 이미지를 유저가 선택한 색상으로 물들이는 마법의 함수
        // 흑백/흰색 배경 브러시 이미지를 투명화하고 선택한 색상으로 물들이는 함수
        function colorizeBrush(brushName, colorHex) {
            const cacheKey = `${brushName}_${colorHex}`;
            if (brushImageCache[cacheKey]) return brushImageCache[cacheKey]; // 캐시 재사용

            const offCvs = document.createElement('canvas');
            const offCtx = offCvs.getContext('2d');

            const img = new Image();
            img.src = `/Brushes/${brushName}.png`;

            brushImageCache[cacheKey] = new Promise((resolve) => {
                img.onload = () => {
                    // 1. 하드코딩된 256을 버리고, 이미지의 실제 원본 크기를 자동으로 감지하여 적용
                    const w = img.width;
                    const h = img.height;
                    offCvs.width = w;
                    offCvs.height = h;

                    // 2. 캔버스에 원본 브러시(흰 배경+검은 무늬) 그리기
                    offCtx.drawImage(img, 0, 0, w, h);

                    // 3. 픽셀 데이터를 분석하여 흰색 배경을 투명하게 날려버리기 (루미넌스-알파 반전)
                    const imgData = offCtx.getImageData(0, 0, w, h);
                    const data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        // 픽셀의 밝기(Luminance) 계산 (0: 검은색 ~ 255: 흰색)
                        const luminance = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];

                        // 어두울수록 불투명하게, 밝을(흰색)수록 투명하게 알파값 반전
                        // (이미 투명한 PNG일 경우를 대비해 기존 알파 비율도 곱해줌)
                        const alpha = (255 - luminance) * (data[i + 3] / 255);

                        data[i] = 0;       // R (모양을 검은색으로 통일)
                        data[i + 1] = 0;     // G
                        data[i + 2] = 0;     // B
                        data[i + 3] = alpha; // A (계산된 투명도 적용)
                    }
                    offCtx.putImageData(imgData, 0, 0);

                    // 4. 투명해진 브러시 위에 유저가 선택한 색상 덮어씌우기 (클리핑 마스크)
                    offCtx.globalCompositeOperation = "source-in";
                    offCtx.fillStyle = colorHex;
                    offCtx.fillRect(0, 0, w, h);

                    resolve(offCvs); // 완성된 브러시 팁 반환
                };
                img.onerror = () => resolve(null); // 파일 로드 실패 방어
            });

            trimBrushCache(); // ✨ 캐시 상한 유지
            return brushImageCache[cacheKey];
        }

        const canvasContainer = document.getElementById('canvas-container');
        const alertContainer = document.getElementById("alert-container");
        const profileImgDiv = document.getElementById("alert-profile-img");

        const API_BASE = window.location.origin;
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const wsUrl = `${protocol}${window.location.host}/ws`;

        let ws;
        let lastPoint = null;
        let layerContexts = {};

        let draftContext = null;
        let draftCanvas = null;

        function getDraftLayer() {
            if (!draftCanvas) {
                draftCanvas = document.createElement('canvas');
                draftCanvas.id = 'draft-canvas';
                draftCanvas.width = 1920;
                draftCanvas.height = 1080;
                draftCanvas.style.position = 'absolute';
                draftCanvas.style.top = '0';
                draftCanvas.style.left = '0';
                draftCanvas.style.zIndex = 1000;
                draftCanvas.style.pointerEvents = 'none';
                draftCanvas.style.display = 'none';
                canvasContainer.appendChild(draftCanvas);
                draftContext = draftCanvas.getContext('2d');
            }
            return draftContext;
        }

        // ✨ 업그레이드된 브러시 렌더링 엔진
        // ✨ 에어브러시용 부드러운 원형 팁 캐시 (색상별로 한 번만 생성해 재사용 → 방송 재생 부하 최소화)
        const airbrushTipCache = {};
        function getAirbrushTip(r, g, b) {
            const key = `${r}_${g}_${b}`;
            if (airbrushTipCache[key]) return airbrushTipCache[key];
            const keys = Object.keys(airbrushTipCache);
            if (keys.length > 64) delete airbrushTipCache[keys[0]]; // 상한 유지(메모리 방어)
            const size = 64;
            const c = document.createElement('canvas'); c.width = size; c.height = size;
            const cctx = c.getContext('2d');
            const grad = cctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
            grad.addColorStop(0.5, `rgba(${r},${g},${b},0.5)`);
            grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
            cctx.fillStyle = grad;
            cctx.fillRect(0, 0, size, size);
            airbrushTipCache[key] = c;
            return c;
        }

        async function renderBrushStroke(ctx, x1, y1, w1, x2, y2, w2, color, isEraser, brushType = null, spacingPercent = 0.1) {
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';

            const dx = x2 - x1;
            const dy = y2 - y1;
            const distance = Math.hypot(dx, dy);

            // ✨ 에어브러시: 부드러운 원형 팁을 낮은 투명도로 촘촘히 겹쳐 스프레이 효과 (겹칠수록 진해짐)
            if (!isEraser && brushType === 'airbrush') {
                let ar = 255, ag = 255, ab = 255;
                if (typeof color === 'string' && color[0] === '#') {
                    ar = parseInt(color.slice(1, 3), 16); ag = parseInt(color.slice(3, 5), 16); ab = parseInt(color.slice(5, 7), 16);
                } else {
                    const m = (color || '').match(/[\d.]+/g);
                    if (m && m.length >= 3) { ar = +m[0]; ag = +m[1]; ab = +m[2]; }
                }
                const tip = getAirbrushTip(ar, ag, ab);
                const airStep = Math.max(1, ((w1 + w2) / 2) * 0.3);
                const airSteps = Math.floor(distance / airStep);
                const prevAlpha = ctx.globalAlpha;
                ctx.globalAlpha = 0.18;
                for (let i = 0; i <= airSteps; i++) {
                    const ratio = airSteps === 0 ? 1 : i / airSteps;
                    const cx = x1 + dx * ratio;
                    const cy = y1 + dy * ratio;
                    const cw = Math.max(1, w1 + (w2 - w1) * ratio);
                    ctx.drawImage(tip, cx - cw / 2, cy - cw / 2, cw, cw);
                }
                ctx.globalAlpha = prevAlpha;
                return;
            }

            // 간격(Spacing) 계산: 굵기 대비 퍼센트 (기본 0.1 = 10% 겹치게 촘촘히 찍음)
            // 데이터에 간격 값이 없으면 0.1을 기본으로 사용하여 기존 그림 완벽 호환
            const spacing = spacingPercent || 0.1;
            const step = Math.max(1, ((w1 + w2) / 2) * spacing);
            const steps = Math.floor(distance / step);

            let coloredBrushImg = null;

            if (!isEraser && brushType && brushType !== 'default') {
                // 헥스 보정 코드를 삭제하고, 넘겨받은 color를 그대로 사용합니다. (rgba 포맷 완벽 지원)
                coloredBrushImg = await colorizeBrush(brushType, color);
            }

            for (let i = 0; i <= steps; i++) {
                const ratio = steps === 0 ? 1 : i / steps;
                const cx = x1 + dx * ratio;
                const cy = y1 + dy * ratio;
                const cw = w1 + (w2 - w1) * ratio;

                if (coloredBrushImg) {
                    // [커스텀 브러시] 도장 찍기
                    ctx.drawImage(coloredBrushImg, cx - cw / 2, cy - cw / 2, cw, cw);
                } else {
                    // [기본 브러시 및 지우개] 기존의 둥근 브러시 (하위 호환)
                    ctx.fillStyle = isEraser ? "rgba(0,0,0,1)" : color;
                    ctx.beginPath();
                    ctx.arc(cx, cy, cw / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function doFloodFill(ctx, startX, startY, colorStr, tolerance, gap, sampleAllLayers = false, layerContexts = null) {
            const canvasW = 1920; const canvasH = 1080;
            let sampleData;

            if (sampleAllLayers && layerContexts) {
                const offCvs = document.createElement('canvas'); offCvs.width = canvasW; offCvs.height = canvasH;
                const offCtx = offCvs.getContext('2d');

                // layerContexts에 등록된 화면(캔버스)을 z-index 순서대로 합침
                const layers = Object.values(layerContexts).filter(c => c && c.canvasNode).sort((a, b) => {
                    const zA = parseInt(a.canvasNode.style.zIndex) || 0;
                    const zB = parseInt(b.canvasNode.style.zIndex) || 0;
                    return zA - zB;
                });

                layers.forEach(c => {
                    offCtx.globalAlpha = c.canvasNode.style.opacity || 1;
                    offCtx.globalCompositeOperation = c.canvasNode.style.mixBlendMode || 'source-over';
                    offCtx.drawImage(c.canvasNode, 0, 0);
                });
                sampleData = offCtx.getImageData(0, 0, canvasW, canvasH).data;
            } else {
                sampleData = ctx.getImageData(0, 0, canvasW, canvasH).data;
            }

            const sx = Math.floor(startX); const sy = Math.floor(startY);
            if (sx < 0 || sx >= canvasW || sy < 0 || sy >= canvasH) return;

            const startPos = (sy * canvasW + sx) * 4;
            const targetR = sampleData[startPos], targetG = sampleData[startPos + 1], targetB = sampleData[startPos + 2], targetA = sampleData[startPos + 3];

            const m = colorStr.match(/[\d.]+/g);
            if (!m || m.length < 3) return;
            const fillR = parseInt(m[0]), fillG = parseInt(m[1]), fillB = parseInt(m[2]), fillA = m[3] ? Math.round(parseFloat(m[3]) * 255) : 255;

            if (Math.abs(targetR - fillR) <= tolerance && Math.abs(targetG - fillG) <= tolerance && Math.abs(targetB - fillB) <= tolerance && Math.abs(targetA - fillA) <= tolerance) return;

            let checkData = sampleData;
            if (gap > 0) {
                const baseCvs = document.createElement('canvas'); baseCvs.width = canvasW; baseCvs.height = canvasH;
                const baseCtx = baseCvs.getContext('2d');
                const baseImgData = baseCtx.createImageData(canvasW, canvasH);
                baseImgData.data.set(sampleData);
                baseCtx.putImageData(baseImgData, 0, 0);

                const offCvs = document.createElement('canvas'); offCvs.width = canvasW; offCvs.height = canvasH;
                const offCtx = offCvs.getContext('2d');
                offCtx.drawImage(baseCvs, 0, 0);
                offCtx.globalAlpha = 1.0; offCtx.globalCompositeOperation = 'source-over';
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) { offCtx.drawImage(baseCvs, Math.cos(a) * gap, Math.sin(a) * gap); }
                checkData = offCtx.getImageData(0, 0, canvasW, canvasH).data;
            }

            const visited = new Uint8Array(canvasW * canvasH);
            const pixelStack = [[sx, sy]];

            function matchColor(x, y) {
                if (x < 0 || x >= canvasW || y < 0 || y >= canvasH) return false;
                const p = (y * canvasW + x) * 4;
                if (checkData[p + 3] === 0 && targetA === 0) return true;
                return Math.abs(checkData[p] - targetR) <= tolerance && Math.abs(checkData[p + 1] - targetG) <= tolerance && Math.abs(checkData[p + 2] - targetB) <= tolerance && Math.abs(checkData[p + 3] - targetA) <= tolerance;
            }

            while (pixelStack.length > 0) {
                const [cx, cy] = pixelStack.pop();
                let x = cx, y = cy;
                while (y >= 0 && matchColor(x, y)) y--;
                y++;
                let reachLeft = false, reachRight = false;
                while (y < canvasH && matchColor(x, y)) {
                    visited[y * canvasW + x] = 1;
                    if (x > 0) {
                        if (matchColor(x - 1, y) && !visited[y * canvasW + x - 1]) {
                            if (!reachLeft) { pixelStack.push([x - 1, y]); reachLeft = true; }
                        } else if (reachLeft) reachLeft = false;
                    }
                    if (x < canvasW - 1) {
                        if (matchColor(x + 1, y) && !visited[y * canvasW + x + 1]) {
                            if (!reachRight) { pixelStack.push([x + 1, y]); reachRight = true; }
                        } else if (reachRight) reachRight = false;
                    }
                    y++;
                }
            }

            const fillCvs = document.createElement('canvas'); fillCvs.width = canvasW; fillCvs.height = canvasH;
            const fillCtx = fillCvs.getContext('2d');
            const fillImgData = fillCtx.createImageData(canvasW, canvasH);
            const fd = fillImgData.data;
            for (let i = 0; i < canvasW * canvasH; i++) {
                if (visited[i]) { fd[i * 4] = fillR; fd[i * 4 + 1] = fillG; fd[i * 4 + 2] = fillB; fd[i * 4 + 3] = fillA; }
            }
            fillCtx.putImageData(fillImgData, 0, 0);

            ctx.globalCompositeOperation = 'source-over';
            if (gap > 0) {
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) { ctx.drawImage(fillCvs, Math.cos(a) * gap, Math.sin(a) * gap); }
            } else { ctx.drawImage(fillCvs, 0, 0); }
        }

        // ✨ 캔버스 타이밍 오류를 막기 위한 메시지 대기열(Queue) 복구
        let messageQueue = [];
        let isProcessingQueue = false;
        let isAnimationSkipped = false;
        let animationCache = [];
        // ✨ 타임랩스 재생 시 한 애니메이션 프레임에서 처리할 최대 아이템 수 (프리즈 방지)
        const MAX_ITEMS_PER_FRAME = 400;
        // ✨ 재생 '세대' 토큰: 새 타임랩스나 clear가 오면 증가시켜, 이전 후원의 뒤늦은 재생 콜백이
        //    다음 후원의 캔버스에 그려 순서가 꼬이는 것을 막는다.
        let timelapseGen = 0;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => { console.log("🟢 웹소켓 연결 성공!"); };
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'clear') {
                    isAnimationSkipped = true; // ✨ 스킵 버튼을 누르면 애니메이션 즉시 중단
                }
                messageQueue.push(data);
                processMessageQueue(); // 받은 즉시 순서대로 실행하도록 지시
            };
            ws.onclose = () => { setTimeout(connectWebSocket, 3000); };
            ws.onerror = (err) => { ws.close(); };
        }

        async function processMessageQueue() {
            if (isProcessingQueue) return;
            isProcessingQueue = true;

            // 큐에 쌓인 명령들을 하나가 완전히 끝날 때까지 기다렸다가(await) 다음으로 넘어갑니다.
            while (messageQueue.length > 0) {
                const data = messageQueue.shift();
                await handleSocketMessage(data);
            }

            isProcessingQueue = false;
        }

        async function handleSocketMessage(data) {
            const loadingIndicator = document.getElementById('loading-indicator');

            if (data.type === 'alert') {
                document.getElementById('donor-name-display').innerText = data.name;
                document.getElementById('drawing-title-display').innerText = data.title;
                if (data.profileImage) { profileImgDiv.style.backgroundImage = `url('${data.profileImage}')`; }
                else { profileImgDiv.style.backgroundImage = 'none'; }

                alertContainer.classList.add('show');
                const audio = new Audio(`${API_BASE}/coin.mp3`);
                audio.play().catch(e => console.log("오디오 재생 에러:", e));
            }
            else if (data.type === 'clear') {
                isAnimationSkipped = true;
                canvasContainer.style.opacity = '0';
                if (loadingIndicator) loadingIndicator.style.display = 'none';
                Object.values(layerContexts).forEach(ctx => ctx.clearRect(0, 0, 1920, 1080));
                if (draftContext) draftContext.clearRect(0, 0, 1920, 1080);
                if (draftCanvas) draftCanvas.style.display = 'none';
                alertContainer.classList.remove('show');
            }
            else if (data.type === 'init_animation_cache') {
                animationCache = [];
                // ✨ 서버에서 받아온 전체 프레임 개수 저장
                window.totalAnimFrames = data.totalFrames || 0;
                window.loadedAnimFrames = 0;

                if (loadingIndicator) {
                    loadingIndicator.style.display = 'block';
                    loadingIndicator.innerText = window.totalAnimFrames > 0
                        ? `🎬 움짤 데이터를 수신하는 중입니다... (0%)`
                        : `🎬 움짤 데이터를 수신하는 중입니다...`;
                }
            }
            else if (data.type === 'cache_frame') {
                const img = new Image();
                img.src = data.src;
                animationCache.push({ img: img, duration: data.duration });

                // ✨ 프레임을 하나 받을 때마다 퍼센트 업데이트
                window.loadedAnimFrames = (window.loadedAnimFrames || 0) + 1;
                if (window.totalAnimFrames > 0 && loadingIndicator) {
                    const percent = Math.round((window.loadedAnimFrames / window.totalAnimFrames) * 100);
                    loadingIndicator.innerText = `🎬 움짤 데이터를 수신하는 중입니다... (${percent}%)`;
                }
            }
            else if (data.type === 'play_animation') {
                isAnimationSkipped = false;

                // ✨ cache_frame에서는 img.src만 지정되고 디코딩은 비동기로 진행됩니다.
                // 디코딩 전에 drawImage하면 첫 루프가 빈 화면/깜빡임이 되므로, 모든 프레임의
                // 디코딩이 실제로 끝날 때까지 기다린 뒤 재생을 시작합니다.
                await Promise.all(animationCache.map(f =>
                    (f.img && f.img.decode) ? f.img.decode().catch(() => { }) : Promise.resolve()
                ));
                if (isAnimationSkipped) { animationCache = []; return; }
                if (loadingIndicator) loadingIndicator.style.display = 'none';

                if (!layerContexts['default'] || Object.keys(layerContexts).length > 1) {
                    canvasContainer.innerHTML = '<canvas id="default-canvas" width="1920" height="1080" style="position:absolute;top:0;left:0;z-index:1;"></canvas>';
                    layerContexts = { 'default': document.getElementById('default-canvas').getContext('2d') };
                }

                canvasContainer.style.opacity = '1';

                let ctx = layerContexts['default'];

                for (let loop = 0; loop < data.repeatCount; loop++) {
                    if (isAnimationSkipped) break;

                    for (let f of animationCache) {
                        if (isAnimationSkipped) break;

                        ctx.clearRect(0, 0, 1920, 1080);
                        ctx.drawImage(f.img, 0, 0, 1920, 1080);

                        let elapsed = 0;
                        while (elapsed < f.duration) {
                            if (isAnimationSkipped) break;
                            const sleepTime = Math.min(20, f.duration - elapsed);
                            await new Promise(res => setTimeout(res, sleepTime));
                            elapsed += sleepTime;
                        }
                    }
                }
                animationCache = [];
            }
            else if (data.type === 'fade_out') {
                canvasContainer.style.opacity = '0';
                alertContainer.classList.remove('show');
                if (loadingIndicator) loadingIndicator.style.display = 'none';
            }
            else if (data.type === 'play_timelapse') {
                isAnimationSkipped = false;
                const myGen = ++timelapseGen; // ✨ 이 재생의 세대 번호 (아래 alive()로 stale 여부 판단)
                const alive = () => !isAnimationSkipped && myGen === timelapseGen;

                if (data.alert) {
                    document.getElementById('donor-name-display').innerText = data.alert.name;
                    document.getElementById('drawing-title-display').innerText = data.alert.title;
                    if (data.alert.profileImage) {
                        profileImgDiv.style.backgroundImage = `url('${data.alert.profileImage}')`;
                    } else {
                        profileImgDiv.style.backgroundImage = 'none';
                    }
                    alertContainer.classList.add('show');
                    const audio = new Audio(`${API_BASE}/coin.mp3`);
                    audio.play().catch(e => console.log("오디오 재생 에러:", e));
                }

                const history = data.history;
                const totalItems = history.length;
                if (totalItems === 0) return;

                canvasContainer.style.opacity = '1';

                const initItem = history.find(i => i.type === 'init_layers');
                if (initItem) {
                    canvasContainer.innerHTML = '';
                    layerContexts = {};
                    initItem.layers.forEach((lInfo, index) => {
                        const cvs = document.createElement('canvas');
                        cvs.width = 1920; cvs.height = 1080;
                        cvs.style.position = 'absolute';
                        cvs.style.top = '0'; cvs.style.left = '0';
                        cvs.style.zIndex = index + 1;
                        cvs.style.opacity = lInfo.opacity !== undefined ? lInfo.opacity : 1;
                        cvs.style.mixBlendMode = lInfo.blendMode || 'normal';
                        canvasContainer.appendChild(cvs);
                        layerContexts[lInfo.id] = Object.assign(cvs.getContext('2d'), { canvasNode: cvs });
                    });
                } else if (Object.keys(layerContexts).length === 0) {
                    canvasContainer.innerHTML = '<canvas id="default-canvas" width="1920" height="1080" style="position:absolute;top:0;left:0;z-index:1;"></canvas>';
                    layerContexts['default'] = Object.assign(document.getElementById('default-canvas').getContext('2d'), { canvasNode: document.getElementById('default-canvas') });
                }

                // ✨ [핵심 수정] 타임랩스인지 즉시 표시인지 "자동 감지"
                // history 안에 'path'(선 긋기)나 'fill'(채우기) 데이터가 있는지 검사합니다.
                const hasDrawingProcess = history.some(item => 
                    item.type !== 'init_layers' && 
                    item.type !== 'raster_image' && 
                    item.shape !== 'raster_image' &&
                    item.type !== 'clear'
                );

                // ✨ 과정이 없으면 0초(즉시 표시), 과정이 있으면 8000ms(8초)
                const playbackDurationMs = hasDrawingProcess ? 8000 : 0;

                // ✨ 재생 전에 모든 이미지(구운 바닥·래스터·채우기 스냅샷)를 '병렬로' 미리 디코딩한다.
                //    안 하면 drawNextBatch 루프 안에서 이미지마다 순차로 대기하며 멈춰(특히 레이어 많을 때)
                //    재생이 느려지고 서버 재생창을 넘겨 다음 후원과 순서가 꼬인다. 미리 받으면 페이싱도 정확해짐.
                const imgCache = new Map();
                const preloadSrcs = new Set();
                history.forEach(it => {
                    if ((it.type === 'raster_image' || (it.type === 'draw_shape' && it.shape === 'raster_image')) && it.src) preloadSrcs.add(it.src);
                    if (it.type === 'fill' && it.snapshotSrc) preloadSrcs.add(it.snapshotSrc);
                });
                if (preloadSrcs.size > 0) {
                    if (loadingIndicator) { loadingIndicator.style.display = 'block'; loadingIndicator.innerText = '🎬 그림 데이터를 준비 중입니다...'; }
                    await Promise.all([...preloadSrcs].map(async src => {
                        const img = new Image();
                        img.src = src;
                        try { await img.decode(); } catch (e) { }
                        imgCache.set(src, img);
                    }));
                    if (loadingIndicator) loadingIndicator.style.display = 'none';
                }
                if (!alive()) return; // 준비 중 clear/다음 후원이 오면 이 재생은 폐기
                
                let currentIndex = 0;
                let exactFloatIndex = 0;
                let lastTime = null;

                const tmpCvs = document.createElement('canvas');
                tmpCvs.width = 1920; tmpCvs.height = 1080;
                const tmpCtx = tmpCvs.getContext('2d');

                async function drawNextBatch(currentTime) {
                    if (!alive()) return; // ✨ skip됐거나 다음 후원이 시작됐으면(세대 불일치) 즉시 중단

                    if (!lastTime) lastTime = currentTime;
                    const deltaTime = currentTime - lastTime;
                    lastTime = currentTime;

                    // ✨ 재생 시간이 0초면 그리기 진행 인덱스를 끝까지 올려버림 (즉시 렌더링)
                    if (playbackDurationMs === 0) {
                        exactFloatIndex = totalItems;
                    } else {
                        exactFloatIndex += (totalItems / playbackDurationMs) * deltaTime;
                    }

                    const limit = Math.min(Math.floor(exactFloatIndex), totalItems);
                    // ✨ 한 프레임에 수천 개의 획을 몰아 그리면 OBS 브라우저 소스가 멈춥니다(프리즈).
                    // 프레임당 처리량에 상한을 두고, 못 그린 나머지는 다음 프레임에서 이어 그립니다.
                    // (진행도는 벽시계 기준이라 '그리는 과정' 노출은 그대로 유지됩니다)
                    const batchLimit = Math.min(limit, currentIndex + MAX_ITEMS_PER_FRAME);

                    for (; currentIndex < batchLimit; currentIndex++) {
                        if (!alive()) return; // ✨ 매 아이템마다 세대 확인 → stale 재생이 다음 후원 캔버스를 덮지 못하게
                        const item = history[currentIndex];
                        if (item.type === 'init_layers') continue;

                        let ctx;
                        if (item.layerId && layerContexts[item.layerId]) {
                            ctx = layerContexts[item.layerId];
                        } else if (Object.keys(layerContexts).length > 0) {
                            ctx = layerContexts[Object.keys(layerContexts)[0]];
                        }
                        if (!ctx) continue;

                        ctx.globalCompositeOperation = 'source-over';
                        ctx.globalAlpha = 1.0;

                        if (item.type === 'clear' || (item.type === 'draw_shape' && item.shape === 'clear')) {
                            ctx.clearRect(0, 0, 1920, 1080);
                        }
                        else if (item.type === 'raster_image' || (item.type === 'draw_shape' && item.shape === 'raster_image')) {
                            // ✨ 미리 디코딩해둔 이미지를 즉시 그린다(루프 내 대기 없음 → 빠르고 페이싱 정확)
                            const img = imgCache.get(item.src);
                            if (img) {
                                ctx.save();
                                if (item.width >= 1920 && item.height >= 1080) ctx.clearRect(0, 0, 1920, 1080);
                                ctx.translate(item.cx, item.cy); ctx.rotate(item.angle || 0);
                                ctx.drawImage(img, -item.width / 2, -item.height / 2, item.width, item.height);
                                ctx.restore();
                            }
                        }
                        else if (item.type === 'fill') {
                            if (item.snapshotSrc) {
                                // ✨ 미리 디코딩해둔 채우기 스냅샷을 즉시 복원 (경계 크롭이라 가볍고, 대기 없음)
                                const img = imgCache.get(item.snapshotSrc);
                                if (img) ctx.drawImage(img, item.snapshotX || 0, item.snapshotY || 0);
                            } else {
                                // 구버전 데이터 호환: 스냅샷이 없으면 기존 방식으로 재계산
                                const px = item.point ? item.point.x : item.x;
                                const py = item.point ? item.point.y : item.y;
                                const tol = item.tolerance !== undefined ? item.tolerance : 50;
                                const gap = item.gap !== undefined ? item.gap : (item.gapSize !== undefined ? item.gapSize : 1);
                                doFloodFill(ctx, px, py, item.color, tol, gap, item.sampleAllLayers, layerContexts);
                            }
                        }
                        else if (item.type === 'path' || !item.type) {
                            if (!item.points || item.points.length === 0) continue;
                            const brushType = item.brushType || 'default';
                            const spacing = item.spacing || 0.1;
                            if (item.color === 'erase') {
                                if (item.points.length === 1) {
                                    await renderBrushStroke(ctx, item.points[0].x, item.points[0].y, item.points[0].w, item.points[0].x, item.points[0].y, item.points[0].w, item.color, true, brushType, spacing);
                                } else {
                                    for (let i = 1; i < item.points.length; i++) {
                                        await renderBrushStroke(ctx, item.points[i - 1].x, item.points[i - 1].y, item.points[i - 1].w, item.points[i].x, item.points[i].y, item.points[i].w, item.color, true, brushType, spacing);
                                    }
                                }
                            } else {
                                tmpCtx.clearRect(0, 0, 1920, 1080);
                                const rgbColor = item.color.startsWith('#') ? item.color : '#ffffff';
                                const opaqueColor = `rgba(${parseInt(rgbColor.slice(1, 3), 16)}, ${parseInt(rgbColor.slice(3, 5), 16)}, ${parseInt(rgbColor.slice(5, 7), 16)}, 1)`;
                                if (item.points.length === 1) {
                                    await renderBrushStroke(tmpCtx, item.points[0].x, item.points[0].y, item.points[0].w, item.points[0].x, item.points[0].y, item.points[0].w, opaqueColor, false, brushType, spacing);
                                } else {
                                    for (let i = 1; i < item.points.length; i++) {
                                        await renderBrushStroke(tmpCtx, item.points[i - 1].x, item.points[i - 1].y, item.points[i - 1].w, item.points[i].x, item.points[i].y, item.points[i].w, opaqueColor, false, brushType, spacing);
                                    }
                                }
                                ctx.globalAlpha = item.opacity !== undefined ? item.opacity : 1.0;
                                ctx.drawImage(tmpCvs, 0, 0);
                            }
                        }
                        else if (['line', 'rect', 'circle', 'text'].includes(item.type) || item.type === 'draw_shape') {
                            ctx.strokeStyle = item.color; ctx.fillStyle = item.color; ctx.lineWidth = item.width || 5; ctx.beginPath();
                            let shape = item.shape || item.type;
                            if (shape === 'line') { ctx.moveTo(item.start.x, item.start.y); ctx.lineTo(item.end.x, item.end.y); ctx.stroke(); }
                            else if (shape === 'rect') { if (item.filled) ctx.fillRect(item.start.x, item.start.y, item.end.x - item.start.x, item.end.y - item.start.y); ctx.strokeRect(item.start.x, item.start.y, item.end.x - item.start.x, item.end.y - item.start.y); }
                            else if (shape === 'circle') { let r = Math.hypot(item.end.x - item.start.x, item.end.y - item.start.y); ctx.arc(item.start.x, item.start.y, r, 0, Math.PI * 2); if (item.filled) ctx.fill(); ctx.stroke(); }
                        }
                    }

                    if (currentIndex < totalItems) {
                        requestAnimationFrame(drawNextBatch);
                    } else if (alive() && data.playbackId != null) {
                        // ✨ 재생 완료 → 서버에 알림. 서버는 이 신호를 받고 다음 단계(노출 유지→페이드)로 진행.
                        //    (서버가 고정 8초가 아니라 실제 완료를 기다리므로 레이어 많아도 과정이 잘리지 않음)
                        try { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'playback_done', playbackId: data.playbackId })); } catch (e) { }
                    }
                }

                requestAnimationFrame(drawNextBatch);
            }
            else {
                if (data.shape === 'init_layers') {
                    canvasContainer.innerHTML = '';
                    layerContexts = {};
                    data.layers.forEach((lInfo, index) => {
                        const cvs = document.createElement('canvas');
                        cvs.width = 1920; cvs.height = 1080;
                        cvs.style.position = 'absolute';
                        cvs.style.top = '0'; cvs.style.left = '0';
                        cvs.style.zIndex = index + 1;
                        cvs.style.opacity = lInfo.opacity;
                        cvs.style.mixBlendMode = lInfo.blendMode || 'normal';
                        canvasContainer.appendChild(cvs);
                        layerContexts[lInfo.id] = Object.assign(cvs.getContext('2d'), { canvasNode: cvs });
                    });
                    canvasContainer.style.opacity = '1';
                    return;
                }

                let ctx;
                if (data.layerId && layerContexts[data.layerId]) {
                    ctx = layerContexts[data.layerId];
                } else {
                    ctx = layerContexts['default'];
                    if (!ctx) {
                        canvasContainer.innerHTML = '<canvas id="default-canvas" width="1920" height="1080" style="position:absolute;top:0;left:0;z-index:1;"></canvas>';
                        ctx = Object.assign(document.getElementById('default-canvas').getContext('2d'), { canvasNode: document.getElementById('default-canvas') });
                        layerContexts['default'] = ctx;
                        canvasContainer.style.opacity = '1';
                    }
                }

                if (data.type === 'fill') {
                    if (data.snapshotSrc) {
                        // ✨ 채우기 결과 스냅샷 복원 (재계산 없음)
                        await new Promise(res => {
                            const img = new Image();
                            img.onload = () => { ctx.drawImage(img, data.snapshotX || 0, data.snapshotY || 0); res(); };
                            img.onerror = res;
                            img.src = data.snapshotSrc;
                        });
                    } else {
                        const tol = data.tolerance !== undefined ? data.tolerance : 50;
                        const gap = data.gap !== undefined ? data.gap : 1;
                        const sampleAll = data.sampleAllLayers !== undefined ? data.sampleAllLayers : false;
                        doFloodFill(ctx, data.point.x, data.point.y, data.color, tol, gap, sampleAll, layerContexts);
                    }
                }
                else if (data.type === 'start_path') {
                    lastPoint = data.point;
                    if (data.color !== 'erase') {
                        const dCtx = getDraftLayer();
                        dCtx.clearRect(0, 0, 1920, 1080);
                        draftCanvas.style.mixBlendMode = ctx.canvasNode ? ctx.canvasNode.style.mixBlendMode : 'normal';
                        draftCanvas.style.opacity = data.opacity !== undefined ? data.opacity : 1;
                        draftCanvas.style.display = 'block';

                        let rgbColor = data.color.startsWith('#') ? data.color : '#ffffff';
                        let drawColor = `rgba(${parseInt(rgbColor.slice(1, 3), 16)}, ${parseInt(rgbColor.slice(3, 5), 16)}, ${parseInt(rgbColor.slice(5, 7), 16)}, 1)`;
                        renderBrushStroke(dCtx, lastPoint.x, lastPoint.y, lastPoint.w, lastPoint.x, lastPoint.y, lastPoint.w, drawColor, false);
                    } else {
                        renderBrushStroke(ctx, lastPoint.x, lastPoint.y, lastPoint.w, lastPoint.x, lastPoint.y, lastPoint.w, data.color, true);
                    }
                }
                else if (data.type === 'draw_lines') {
                    if (!lastPoint) return;

                    if (data.color === 'erase') {
                        for (let pt of data.points) {
                            renderBrushStroke(ctx, lastPoint.x, lastPoint.y, lastPoint.w, pt.x, pt.y, pt.w, data.color, true);
                            lastPoint = pt;
                        }
                    } else {
                        const dCtx = getDraftLayer();
                        let rgbColor = data.color.startsWith('#') ? data.color : '#ffffff';
                        let drawColor = `rgba(${parseInt(rgbColor.slice(1, 3), 16)}, ${parseInt(rgbColor.slice(3, 5), 16)}, ${parseInt(rgbColor.slice(5, 7), 16)}, 1)`;
                        for (let pt of data.points) {
                            renderBrushStroke(dCtx, lastPoint.x, lastPoint.y, lastPoint.w, pt.x, pt.y, pt.w, drawColor, false);
                            lastPoint = pt;
                        }
                    }
                }
                else if (data.type === 'draw_line') {
                    if (!lastPoint) return;
                    if (data.color === 'erase') {
                        renderBrushStroke(ctx, lastPoint.x, lastPoint.y, lastPoint.w, data.point.x, data.point.y, data.point.w, data.color, true);
                    } else {
                        const dCtx = getDraftLayer();
                        let rgbColor = data.color.startsWith('#') ? data.color : '#ffffff';
                        let drawColor = `rgba(${parseInt(rgbColor.slice(1, 3), 16)}, ${parseInt(rgbColor.slice(3, 5), 16)}, ${parseInt(rgbColor.slice(5, 7), 16)}, 1)`;
                        renderBrushStroke(dCtx, lastPoint.x, lastPoint.y, lastPoint.w, data.point.x, data.point.y, data.point.w, drawColor, false);
                    }
                    lastPoint = data.point;
                }
                else if (data.type === 'end_path') {
                    if (data.color !== 'erase' && draftCanvas && draftCanvas.style.display !== 'none') {
                        ctx.globalAlpha = data.opacity !== undefined ? data.opacity : 1;
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.drawImage(draftCanvas, 0, 0);
                        ctx.globalAlpha = 1.0;

                        draftCanvas.style.display = 'none';
                        draftContext.clearRect(0, 0, 1920, 1080);
                    }
                    lastPoint = null;
                    ctx.globalCompositeOperation = 'source-over';
                }
                else if (data.type === 'draw_shape') {
                    if (data.shape === 'clear') {
                        ctx.clearRect(0, 0, 1920, 1080);
                        return;
                    }

                    if (data.shape === 'raster_image') {
                        await new Promise(resolve => {
                            const img = new Image();
                            img.onload = () => {
                                ctx.save();
                                ctx.globalCompositeOperation = 'source-over';
                                ctx.translate(data.cx, data.cy); ctx.rotate(data.angle);
                                ctx.drawImage(img, -data.width / 2, -data.height / 2, data.width, data.height);
                                ctx.restore();
                                resolve();
                            };
                            img.onerror = resolve;
                            img.src = data.src;
                        });
                    } else {
                        ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.beginPath();
                        ctx.strokeStyle = data.color; ctx.lineWidth = data.width;
                        ctx.globalCompositeOperation = 'source-over';

                        ctx.fillStyle = data.color;
                        if (data.shape === 'line') { ctx.moveTo(data.start.x, data.start.y); ctx.lineTo(data.end.x, data.end.y); ctx.stroke(); }
                        else if (data.shape === 'rect') { ctx.rect(data.start.x, data.start.y, data.end.x - data.start.x, data.end.y - data.start.y); if (data.filled) ctx.fill(); ctx.stroke(); }
                        else if (data.shape === 'circle') { let radius = Math.hypot(data.end.x - data.start.x, data.end.y - data.start.y); ctx.arc(data.start.x, data.start.y, radius, 0, Math.PI * 2); if (data.filled) ctx.fill(); ctx.stroke(); }
                        else if (data.shape === 'text') {
                            ctx.font = `bold ${data.width}px 'Malgun Gothic', sans-serif`;
                            ctx.fillStyle = data.color; ctx.textBaseline = 'top';
                            const lines = data.end.text.split('\n'); let curY = data.start.y;
                            for (let line of lines) { ctx.fillText(line, data.start.x, curY); curY += data.width * 1.2; }
                        }
                    }
                }
            }
        }

        connectWebSocket();
    </script>
