<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시청자용 그리기 (프로페셔널 에디터)</title>
    <script type="text/javascript" src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Malgun Gothic', sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
        button { cursor: pointer; border: none; border-radius: 4px; outline: none; transition: 0.2s; }
        input[type="text"], input[type="number"] { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; }
        input[type="text"]::placeholder, input[type="number"]::placeholder { color: #999; }

        .app-header { background: #2d2d2d; border-bottom: 1px solid #444; display: flex; flex-direction: column; justify-content: center; padding: 10px 20px; flex-shrink: 0; gap: 8px; }
        .header-top { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .header-group { display: flex; align-items: center; gap: 10px; }
        .btn-header, .file-label { background: #444; color: white; padding: 8px 15px; font-size: 13px; font-weight: bold; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
        .btn-header:hover, .file-label:hover { background: #555; }
        input[type="file"] { display: none; }
        #btn-send { background: #ff9800; color: white; border: none; font-size: 15px; padding: 8px 20px; font-weight: bold; }
        #btn-send:hover { background: #fb8c00; }
        .disclaimer { font-size: 11px; color: #888; text-align: right; width: 100%; }
        #profile-preview { width: 34px; height: 34px; border-radius: 50%; background-color: white; background-size: cover; background-position: center; border: 1px solid #555;}
        
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left { width: 80px; background: #252526; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; overflow-y: visible; flex-shrink: 0; position: relative; }
        .tool-btn { width: 60px; height: 45px; background: #333; color: #ccc; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #444; }
        .tool-btn:hover:not(.active-tool) { background: #444; }
        .tool-btn.active-tool { background: #007acc; color: white; font-weight: bold; border-color: #007acc; }

        .shape-container { position: relative; width: 100%; display: flex; justify-content: center; }
        .shape-flyout { display: none; position: absolute; left: 70px; top: 0; background: #252526; border: 1px solid #555; border-radius: 4px; padding: 5px; gap: 5px; z-index: 100; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .shape-flyout.show { display: flex; flex-direction: row; }
        .sub-tool { width: 40px; height: 40px; padding: 5px; }
        .sub-tool svg { stroke: currentColor; fill: none; stroke-width: 2; width: 24px; height: 24px; }
        .control-group { display: flex; flex-direction: column; align-items: center; width: 80%; gap: 5px; font-size: 11px; color: #aaa; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        #color-picker { width: 50px; height: 50px; padding: 0; border: 2px solid #555; border-radius: 8px; cursor: pointer; background: transparent; }

        .workspace { flex: 1; position: relative; background: #111; overflow: hidden; }
        #scroll-container { width: 100%; height: 100%; overflow: auto; position: relative; }
        #layer-wrapper { width: 1920px; height: 1080px; background: transparent; position: absolute; top: 50px; left: 50px; transform-origin: top left; touch-action: none; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .checker-bg { background-color: #ffffff !important; background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0), linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0) !important; background-size: 30px 30px !important; background-position: 0 0, 15px 15px !important; }
        #broadcast-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8; }
        #offline-text { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 48px; font-weight: bold; z-index: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .drawing-layer { position: absolute; top: 0; left: 0; cursor: crosshair; z-index: 1; }

        .sidebar-right { width: 240px; background: #252526; border-left: 1px solid #444; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; flex-shrink: 0; gap: 15px; }
        .panel-section { background: #333; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        .panel-title { font-size: 12px; color: #aaa; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .layer-item { display: flex; justify-content: space-between; align-items: center; background: #444; padding: 8px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; }
        .layer-item.active { background: #094771; border-color: #007acc; }
        .layer-name { font-size: 13px; flex-grow: 1; padding-left: 10px; color: white;}
        .sys-btn { background: #444; color: white; padding: 6px; font-size: 12px; width: 100%; border: 1px solid #555; font-weight: bold; cursor: pointer;}
        .toggle-label { font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #ccc; }
        .raster-btn { background: #e65100; color: white; border: none; padding: 4px 8px; font-size: 11px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-left: 5px;}
        .raster-btn:hover { background: #ff9800; }

        /* ✨ 리치 텍스트 트랜스폼 박스 및 핸들 UI */
        .text-transform-wrapper {
            position: absolute; display: flex; flex-direction: column; border: 1px dashed transparent;
            transform-origin: center center; cursor: move; user-select: none;
        }
        .text-transform-wrapper.active { border-color: #007acc; z-index: 999 !important; }
        
        .text-content {
            width: 100%; height: 100%; outline: none; white-space: pre-wrap; word-wrap: break-word;
            padding: 5px; box-sizing: border-box; cursor: text; display: flex;
        }
        .text-content:empty:before { content: "텍스트 입력..."; color: #aaa; }

        /* 회전 및 크기조절 핸들 */
        .handle { position: absolute; width: 12px; height: 12px; background: #fff; border: 2px solid #007acc; border-radius: 50%; display: none; }
        .text-transform-wrapper.active .handle { display: block; }
        .handle-rotate { top: -30px; left: calc(50% - 6px); cursor: crosshair; } /* 회전 핸들 */
        .handle-rotate::after { content: ''; position: absolute; top: 12px; left: 5px; width: 2px; height: 16px; background: #007acc; }
        .handle-se { bottom: -6px; right: -6px; cursor: nwse-resize; } /* 우측 하단 크기조절 */

        /* ✨ 플로팅 텍스트 스타일 툴바 */
        #floating-toolbar {
            position: absolute; display: none; background: #333; padding: 8px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 2000; gap: 8px; align-items: center; border: 1px solid #555;
        }
        .toolbar-btn { background: #444; color: white; border: 1px solid #666; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .toolbar-btn:hover { background: #555; }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="header-top">
            <div class="header-group">
                <button id="btn-save" class="btn-header">파일 저장</button>
                <label class="file-label">파일 불러오기<input type="file" id="file-input" accept=".json"></label>
                <button id="btn-clear-all" class="btn-header" style="background-color: #ff4757; color: white; border: none; padding: 8px 15px; margin-left: 10px; border-radius: 4px;">🗑️ 전체 삭제</button>
            </div>
            <div class="header-group" id="login-container"><div id="naverIdLogin"></div></div>
            <div class="header-group" id="donation-container" style="display: none;">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;">
                    <div id="profile-preview"></div>
                    <label style="font-size: 10px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 3px;">
                        <input type="checkbox" id="use-profile" checked style="margin:0; width:10px; height:10px;"> 프사 전송
                    </label>
                </div>
                <input type="text" id="custom-nickname" placeholder="닉네임" style="width: 100px; font-weight: bold;">
                <input type="text" id="drawing-title" placeholder="그림 제목" style="width: 180px;">
                <button id="btn-send">화면에 띄우기 (전송)</button>
            </div>
        </div>
        <div class="disclaimer">※ 텍스트 도구는 글씨를 드래그하여 부분 색상을 바꿀 수 있으며, 전송하려면 레이어 패널에서 [래스터화]를 눌러야 합니다.</div>
    </div>

    <!-- ✨ 글자 드래그 시 나타나는 플로팅 툴바 -->
    <div id="floating-toolbar">
        <input type="color" id="tb-color" title="글자 색상">
        <button class="toolbar-btn" id="tb-bold">B</button>
        <button class="toolbar-btn" id="tb-italic">I</button>
        <div style="width: 1px; height: 20px; background: #666; margin: 0 4px;"></div>
        <button class="toolbar-btn" id="tb-align-left" title="가로 왼쪽">←</button>
        <button class="toolbar-btn" id="tb-align-center" title="가로 중앙">↔</button>
        <button class="toolbar-btn" id="tb-align-right" title="가로 오른쪽">→</button>
        <div style="width: 1px; height: 20px; background: #666; margin: 0 4px;"></div>
        <button class="toolbar-btn" id="tb-valign-top" title="세로 상단">↑</button>
        <button class="toolbar-btn" id="tb-valign-middle" title="세로 중앙">↕</button>
        <button class="toolbar-btn" id="tb-valign-bottom" title="세로 하단">↓</button>
    </div>

    <div class="app-body">
        <div class="sidebar-left">
            <input type="color" id="color-picker" value="#ffffff">
            <div class="control-group"><label>투명도 <span id="opacity-val">100%</span></label><input type="range" id="brush-opacity" min="0.05" max="1" step="0.05" value="1"></div>
            <div class="control-group"><label>굵기 <span id="width-val">5</span></label><input type="range" id="line-width" min="1" max="50" value="5"></div>
            <div class="control-group"><label>떨림방지</label><input type="range" id="smoothing-level" min="0" max="20" value="7"></div>
            <div style="width: 80%; height: 1px; background: #444; margin: 5px 0;"></div>
            <button class="tool-btn active-tool" data-tool="pen">펜</button>
            <button class="tool-btn" data-tool="eraser">지우개</button>
            
            <button class="tool-btn" data-tool="text" style="font-size: 16px; font-weight: bold;">T</button>

            <div class="shape-container">
                <button class="tool-btn" id="btn-shape">도형 ▶</button>
                <div id="shape-flyout" class="shape-flyout">
                    <button class="tool-btn sub-tool" data-tool="line" title="직선"><svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"></line></svg></button>
                    <button class="tool-btn sub-tool" data-tool="rect" title="사각형"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"></rect></svg></button>
                    <button class="tool-btn sub-tool" data-tool="circle" title="원"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle></svg></button>
                </div>
            </div>
            <div style="width: 80%; height: 1px; background: #444; margin: 5px 0;"></div>
            <button class="tool-btn" id="btn-undo" style="height:35px;">이전</button>
            <button class="tool-btn" id="btn-redo" style="height:35px;">다음</button>
        </div>

        <div class="workspace">
            <div id="scroll-container">
                <div id="layer-wrapper">
                    <div id="offline-text">현재 방송 중 아님</div>
                    <iframe id="broadcast-bg" src="https://chzzk.naver.com/live/bc2dbff369307b5c446224cce192c8b1" frameborder="0" allow="autoplay; fullscreen"></iframe>
                    <img id="rough-image" style="display: none; position: absolute; top: 0; left: 0; transform-origin: top left; z-index: 0; opacity: 0.5; pointer-events: none;">
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="panel-section">
                <div class="panel-title">화면 제어</div>
                <div style="display: flex; gap: 5px; align-items: center; justify-content: space-between;">
                    <button class="sys-btn" id="btn-zoom-out">-</button>
                    <span id="zoom-text" style="font-size: 12px; font-weight: bold; width: 40px; text-align: center;">50%</span>
                    <button class="sys-btn" id="btn-zoom-in">+</button>
                </div>
                <label class="toggle-label" style="margin-top: 5px;"><input type="checkbox" id="toggle-bg" checked> 방송 배경 표시</label>
            </div>
            <!-- 러프 이미지 컨트롤 생략 없이 포함 -->
            <div class="panel-section">
                <div class="panel-title" style="color: #4CAF50;">참고 이미지 (전송 제외)</div>
                <label class="sys-btn" style="text-align: center; background: #2e7d32; border-color: #1b5e20; cursor: pointer;">
                    📁 이미지 불러오기<input type="file" id="rough-file" accept="image/*" style="display: none;">
                </label>
                <div id="rough-controls" style="display: none; flex-direction: column; gap: 8px; margin-top: 8px;">
                    <label style="font-size: 11px; color: #aaa; display: flex; justify-content: space-between;">투명도 <span id="rough-opacity-val">50%</span></label>
                    <input type="range" id="rough-opacity" min="0" max="1" step="0.05" value="0.5" style="width: 100%;">
                    <button id="btn-move-rough" class="sys-btn" style="background: #ff9800; border-color: #e65100;">✋ 위치 이동 (끄기)</button>
                    <button id="btn-delete-rough" class="sys-btn" style="background: #ff4757; border-color: #c0392b;">🗑️ 러프 닫기</button>
                </div>
            </div>
            <div class="panel-section" style="flex: 1; overflow-y: hidden; display: flex; flex-direction: column;">
                <div class="panel-title">레이어 패널</div>
                <button id="btn-add-layer" class="sys-btn" style="background: #007acc; border-color: #007acc; margin-bottom: 10px;">새 레이어</button>
                <div id="layer-list" style="display: flex; flex-direction: column-reverse; gap: 5px; overflow-y: auto; flex: 1;"></div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수 설정
        const CANVAS_WIDTH = 1920; const CANVAS_HEIGHT = 1080;
        const CHZZK_CHANNEL_ID = 'bc2dbff369307b5c446224cce192c8b1'; 
        const API_BASE = window.location.origin;
        
        const layerWrapper = document.getElementById('layer-wrapper');
        const layerListDiv = document.getElementById('layer-list');
        const zoomText = document.getElementById('zoom-text');
        let zoomLevel = 0.5; layerWrapper.style.transform = `scale(${zoomLevel})`; 

        let layers = []; let layerCounter = 0; let activeLayerId = null;
        let isDrawing = false; let currentWidth = 5; let currentTool = 'pen'; 
        let smX = 0, smY = 0, smW = 0; let lastX = 0, lastY = 0;
        let shapeStartX = 0, shapeStartY = 0; let canvasSnapshot = null; 
        let history = []; let redoStack = []; let currentPath = []; 

        let currentColorHex = '#ffffff'; let currentOpacity = 1; let currentColor = 'rgba(255, 255, 255, 1)';

        // UI 컨트롤 이벤트
        function updateCurrentColor() {
            const r = parseInt(currentColorHex.slice(1, 3), 16); const g = parseInt(currentColorHex.slice(3, 5), 16); const b = parseInt(currentColorHex.slice(5, 7), 16);
            currentColor = `rgba(${r}, ${g}, ${b}, ${currentOpacity})`;
        }
        document.getElementById('color-picker').onchange = (e) => { currentColorHex = e.target.value; updateCurrentColor(); };
        document.getElementById('brush-opacity').oninput = (e) => { currentOpacity = parseFloat(e.target.value); document.getElementById('opacity-val').innerText = `${Math.round(currentOpacity * 100)}%`; updateCurrentColor(); };
        document.getElementById('line-width').oninput = (e) => { currentWidth = parseInt(e.target.value); document.getElementById('width-val').innerText = currentWidth; };
        
        // 도구 선택
        const btnShape = document.getElementById('btn-shape'); const shapeFlyout = document.getElementById('shape-flyout');
        const allToolBtns = document.querySelectorAll('.tool-btn[data-tool]');
        btnShape.addEventListener('click', (e) => { shapeFlyout.classList.toggle('show'); e.stopPropagation(); });
        document.addEventListener('click', (e) => { if (!btnShape.contains(e.target) && !shapeFlyout.contains(e.target)) shapeFlyout.classList.remove('show'); });
        allToolBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                allToolBtns.forEach(b => b.classList.remove('active-tool')); btnShape.classList.remove('active-tool');
                if (e.currentTarget.classList.contains('sub-tool')) { btnShape.classList.add('active-tool'); shapeFlyout.classList.remove('show'); } 
                else { e.currentTarget.classList.add('active-tool'); }
                currentTool = e.currentTarget.getAttribute('data-tool');
                
                // 텍스트 툴 선택 시 기존 활성화된 텍스트 박스 선택 해제
                if(currentTool !== 'text') {
                    layers.forEach(l => { if(l.type === 'text' && l.element) l.element.classList.remove('active'); });
                }
            });
        });

        // 줌 및 화면 제어 (기존과 동일)
        document.getElementById('btn-zoom-in').onclick = () => { zoomLevel = Math.min(zoomLevel + 0.1, 5.0); layerWrapper.style.transform = `scale(${zoomLevel})`; zoomText.innerText = `${Math.round(zoomLevel * 100)}%`; };
        document.getElementById('btn-zoom-out').onclick = () => { zoomLevel = Math.max(zoomLevel - 0.1, 0.1); layerWrapper.style.transform = `scale(${zoomLevel})`; zoomText.innerText = `${Math.round(zoomLevel * 100)}%`; };

        // --- 레이어 및 래스터화 시스템 ---
        function createLayer() {
            layerCounter++; const lId = `layer_${layerCounter}`;
            const cvs = document.createElement('canvas'); cvs.id = lId; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';
            layerWrapper.appendChild(cvs); const context = cvs.getContext('2d'); context.lineCap = 'round'; context.lineJoin = 'round';
            layers.push({ id: lId, name: `레이어 ${layerCounter}`, canvas: cvs, ctx: context, visible: true, type: 'canvas' });
            selectLayer(lId); renderLayerUI();
        }

        function selectLayer(id) { 
            activeLayerId = id; 
            layers.forEach(l => { if(l.type === 'text' && l.element) l.element.classList.toggle('active', l.id === id); });
            renderLayerUI(); 
        }

        // ✨ 핵심: 리치 텍스트를 고화질 이미지(Canvas)로 굽는 마법의 래스터화 함수
        async function rasterizeText(layerId) {
            const layer = layers.find(l => l.id === layerId);
            if (!layer || layer.type !== 'text') return;
            
            const contentDiv = layer.element.querySelector('.text-content');
            if (!contentDiv.innerHTML.trim() || contentDiv.innerHTML === '텍스트 입력...') {
                layer.element.remove(); layers = layers.filter(l => l.id !== layerId); renderLayerUI(); return;
            }

            // 현재 텍스트 박스의 정확한 크기와 회전값 추출
            const rect = layer.element.getBoundingClientRect();
            const w = layer.element.offsetWidth; const h = layer.element.offsetHeight;
            const computedStyle = window.getComputedStyle(layer.element);
            const transform = computedStyle.transform; // matrix(...)
            
            // 각도 추출 (행렬 계산)
            let angle = 0;
            if(transform !== 'none') {
                const values = transform.split('(')[1].split(')')[0].split(',');
                const a = values[0]; const b = values[1];
                angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
            }
            
            // ✨ SVG foreignObject를 이용해 HTML 자체를 스냅샷으로 만듭니다.
            const svgData = `
                <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
                    <foreignObject width="100%" height="100%">
                        <div xmlns="http://www.w3.org/1999/xhtml" style="
                            font-family: 'Malgun Gothic', sans-serif; font-size: ${contentDiv.style.fontSize}; 
                            color: ${contentDiv.style.color}; width: 100%; height: 100%; box-sizing: border-box;
                            display: flex; align-items: ${contentDiv.style.alignItems}; justify-content: ${contentDiv.style.justifyContent};
                            text-align: ${contentDiv.style.textAlign}; font-weight: bold; padding: 5px; white-space: pre-wrap; word-wrap: break-word;">
                            ${contentDiv.innerHTML}
                        </div>
                    </foreignObject>
                </svg>
            `;
            
            const img = new Image();
            img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
            
            img.onload = () => {
                // 그림용 캔버스로 교체
                const cvs = document.createElement('canvas'); cvs.id = layer.id; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';
                cvs.style.zIndex = layer.element.style.zIndex;
                const ctx = cvs.getContext('2d');
                
                // 중심점을 구해서 캔버스에 그리기
                const cx = layer.x + w/2; const cy = layer.y + h/2;
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle * Math.PI / 180);
                ctx.drawImage(img, -w/2, -h/2, w, h); ctx.restore();

                layer.element.replaceWith(cvs); 
                layer.type = 'canvas'; layer.canvas = cvs; layer.ctx = ctx; delete layer.element;

                // ✨ 서버 전송용 History에 '이미지' 포맷으로 저장
                history.push({
                    layerId: layer.id, type: 'raster_image',
                    src: img.src, cx: cx, cy: cy, width: w, height: h, angle: angle * Math.PI / 180
                });
                renderLayerUI();
            };
        }

        function renderLayerUI() {
            layerListDiv.innerHTML = '';
            layers.forEach(l => {
                const div = document.createElement('div'); div.className = `layer-item ${l.id === activeLayerId ? 'active' : ''}`; div.onclick = () => selectLayer(l.id);
                const btnGroup = document.createElement('div'); btnGroup.style.display = 'flex'; btnGroup.style.gap = '5px';
                
                const eyeBtn = document.createElement('span'); eyeBtn.innerText = l.visible ? '표시' : '숨김'; eyeBtn.style.cursor = 'pointer'; eyeBtn.style.fontSize = '11px'; eyeBtn.style.color = l.visible ? '#fff' : '#aaa'; eyeBtn.style.border = '1px solid #555'; eyeBtn.style.padding = '2px 5px'; eyeBtn.style.borderRadius = '3px'; eyeBtn.style.backgroundColor = l.visible ? '#007acc' : '#444';
                eyeBtn.onclick = (e) => { e.stopPropagation(); l.visible = !l.visible; l.type === 'canvas' ? l.canvas.style.display = l.visible ? 'block' : 'none' : l.element.style.display = l.visible ? 'block' : 'none'; renderLayerUI(); };
                btnGroup.appendChild(eyeBtn);

                if (l.type === 'text') {
                    const rasterBtn = document.createElement('button'); rasterBtn.innerText = '래스터화'; rasterBtn.className = 'raster-btn';
                    rasterBtn.onclick = (e) => { e.stopPropagation(); rasterizeText(l.id); }; btnGroup.appendChild(rasterBtn);
                }

                const nameSpan = document.createElement('span'); nameSpan.className = 'layer-name'; nameSpan.innerText = l.type === 'text' ? `[T] ${l.name}` : l.name;
                div.appendChild(btnGroup); div.appendChild(nameSpan); layerListDiv.appendChild(div);
            });
        }
        createLayer();

        // --- 플로팅 툴바 및 텍스트 스타일 제어 ---
        const floatingToolbar = document.getElementById('floating-toolbar');
        const tbColor = document.getElementById('tb-color');
        let activeTextContent = null; // 현재 편집중인 contenteditable

        // 글자를 드래그(선택)하면 툴바 띄우기
        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selection.rangeCount > 0 && !selection.isCollapsed) {
                const range = selection.getRangeAt(0);
                const container = range.commonAncestorContainer;
                // 선택 영역이 텍스트 박스 내부인지 확인
                if (container.nodeType === 3 ? container.parentNode.closest('.text-content') : container.closest('.text-content')) {
                    activeTextContent = container.nodeType === 3 ? container.parentNode.closest('.text-content') : container.closest('.text-content');
                    const rect = range.getBoundingClientRect();
                    floatingToolbar.style.display = 'flex';
                    // 툴바 위치 계산 (마우스 좌표와 줌 레벨 보정 필요 없이 화면 기준)
                    floatingToolbar.style.left = `${rect.left + (rect.width/2) - (floatingToolbar.offsetWidth/2)}px`;
                    floatingToolbar.style.top = `${rect.top - 50}px`;
                } else { floatingToolbar.style.display = 'none'; }
            } else { floatingToolbar.style.display = 'none'; }
        });

        // 툴바 버튼 이벤트 (document.execCommand 활용)
        tbColor.addEventListener('input', (e) => { document.execCommand('foreColor', false, e.target.value); });
        document.getElementById('tb-bold').onclick = () => document.execCommand('bold', false, null);
        document.getElementById('tb-italic').onclick = () => document.execCommand('italic', false, null);
        
        // 정렬 기능 (현재 선택된 텍스트 박스 전체에 적용)
        document.getElementById('tb-align-left').onclick = () => { if(activeTextContent) activeTextContent.style.justifyContent = 'flex-start'; };
        document.getElementById('tb-align-center').onclick = () => { if(activeTextContent) activeTextContent.style.justifyContent = 'center'; };
        document.getElementById('tb-align-right').onclick = () => { if(activeTextContent) activeTextContent.style.justifyContent = 'flex-end'; };
        document.getElementById('tb-valign-top').onclick = () => { if(activeTextContent) activeTextContent.style.alignItems = 'flex-start'; };
        document.getElementById('tb-valign-middle').onclick = () => { if(activeTextContent) activeTextContent.style.alignItems = 'center'; };
        document.getElementById('tb-valign-bottom').onclick = () => { if(activeTextContent) activeTextContent.style.alignItems = 'flex-end'; };

        // --- 그리기 및 텍스트 트랜스폼 로직 ---
        function getPointerPos(e) { const rect = layerWrapper.getBoundingClientRect(); return { x: (e.clientX - rect.left) / zoomLevel, y: (e.clientY - rect.top) / zoomLevel }; }

        let isTransforming = false; let transformTarget = null; let transformAction = null; 
        let startX, startY, startW, startH, startAngle;

        layerWrapper.addEventListener('pointerdown', (e) => {
            // ✨ 트랜스폼 핸들(회전, 크기조절) 클릭 시
            if (e.target.classList.contains('handle')) {
                isTransforming = true; transformTarget = e.target.parentElement;
                transformAction = e.target.classList.contains('handle-rotate') ? 'rotate' : 'resize';
                const pos = getPointerPos(e); startX = pos.x; startY = pos.y;
                startW = transformTarget.offsetWidth; startH = transformTarget.offsetHeight;
                
                const transform = window.getComputedStyle(transformTarget).transform;
                startAngle = 0;
                if(transform !== 'none') {
                    const values = transform.split('(')[1].split(')')[0].split(',');
                    startAngle = Math.atan2(values[1], values[0]) * (180/Math.PI);
                }
                return;
            }

            // 텍스트 상자 본문 클릭 시 무시 (편집하도록 냅둠)
            if (e.target.classList.contains('text-content')) return;

            const pos = getPointerPos(e);

            // ✨ 새로운 텍스트 레이어 생성
            if (currentTool === 'text') {
                layerCounter++; const lId = `layer_${layerCounter}`;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'text-transform-wrapper active';
                wrapper.style.left = `${pos.x}px`; wrapper.style.top = `${pos.y}px`;
                wrapper.style.width = '300px'; wrapper.style.height = '150px'; wrapper.style.zIndex = layerCounter;

                const content = document.createElement('div');
                content.className = 'text-content'; content.contentEditable = 'true';
                content.style.fontSize = `${currentWidth * 3}px`; content.style.color = currentColor;
                content.style.alignItems = 'flex-start'; content.style.justifyContent = 'flex-start'; content.style.textAlign = 'left';
                
                // 트랜스폼 핸들 추가
                const hRotate = document.createElement('div'); hRotate.className = 'handle handle-rotate';
                const hResize = document.createElement('div'); hResize.className = 'handle handle-se';
                
                wrapper.appendChild(content); wrapper.appendChild(hRotate); wrapper.appendChild(hResize);
                layerWrapper.appendChild(wrapper);
                
                // 배경 클릭 시 드래그 가능하게
                wrapper.addEventListener('pointerdown', (we) => {
                    if(we.target === wrapper && !isTransforming) {
                        isTransforming = true; transformTarget = wrapper; transformAction = 'move';
                        const wPos = getPointerPos(we); startX = wPos.x; startY = wPos.y;
                        startW = parseFloat(wrapper.style.left); startH = parseFloat(wrapper.style.top);
                    }
                });

                layers.push({ id: lId, name: `텍스트 ${layerCounter}`, type: 'text', element: wrapper, visible: true, x: pos.x, y: pos.y });
                selectLayer(lId); content.focus(); return;
            }

            // 기존 드로잉 로직
            const activeLayer = layers.find(l => l.id === activeLayerId);
            if (!activeLayer || !activeLayer.visible || activeLayer.type !== 'canvas') return; 
            isDrawing = true; 
            if (currentTool === 'pen' || currentTool === 'eraser') {
                let pressure = e.pointerType === 'pen' ? e.pressure : 1; if (e.pointerType === 'mouse' && e.pressure > 0) pressure = 1; 
                let targetWidth = Math.max(currentWidth * pressure, 1);
                smX = pos.x; smY = pos.y; smW = targetWidth; lastX = smX; lastY = smY; currentPath = [{x: smX, y: smY, w: smW}];
            } else { shapeStartX = pos.x; shapeStartY = pos.y; canvasSnapshot = activeLayer.ctx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); }
        });

        layerWrapper.addEventListener('pointermove', (e) => {
            const pos = getPointerPos(e);
            
            // ✨ 트랜스폼 액션 처리 (이동, 회전, 크기조절)
            if (isTransforming && transformTarget) {
                if (transformAction === 'move') {
                    transformTarget.style.left = `${startW + (pos.x - startX)}px`;
                    transformTarget.style.top = `${startH + (pos.y - startY)}px`;
                    // 데이터 동기화
                    const l = layers.find(l => l.element === transformTarget);
                    if(l) { l.x = parseFloat(transformTarget.style.left); l.y = parseFloat(transformTarget.style.top); }
                } 
                else if (transformAction === 'resize') {
                    transformTarget.style.width = `${Math.max(50, startW + (pos.x - startX))}px`;
                    transformTarget.style.height = `${Math.max(30, startH + (pos.y - startY))}px`;
                } 
                else if (transformAction === 'rotate') {
                    // 중심점 계산
                    const rect = transformTarget.getBoundingClientRect();
                    const centerX = (rect.left + rect.width/2 - layerWrapper.getBoundingClientRect().left) / zoomLevel;
                    const centerY = (rect.top + rect.height/2 - layerWrapper.getBoundingClientRect().top) / zoomLevel;
                    
                    // 마우스 좌표 기반 각도 계산 (상단 핸들 기준이므로 90도 보정)
                    const angle = Math.atan2(pos.y - centerY, pos.x - centerX) * (180 / Math.PI) + 90;
                    transformTarget.style.transform = `rotate(${angle}deg)`;
                }
                return;
            }

            if (!isDrawing) return;
            // (기존 드로잉 코드 생략 없이 유지) ...
            const activeLayer = layers.find(l => l.id === activeLayerId); const ctx = activeLayer.ctx;
            if (currentTool === 'pen' || currentTool === 'eraser') {
                let pressure = e.pointerType === 'pen' ? e.pressure : 1; if (e.pointerType === 'mouse' && e.pressure > 0) pressure = 1; 
                let targetWidth = Math.max(currentWidth * pressure, 1);
                const smoothingLevel = parseInt(document.getElementById('smoothing-level').value); const factor = 1 / (smoothingLevel + 1);
                smX = smX + (pos.x - smX) * factor; smY = smY + (pos.y - smY) * factor; smW = smW + (targetWidth - smW) * factor; 
                
                // 브러시 그리기 함수 (간소화)
                ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over'; ctx.fillStyle = currentTool === 'eraser' ? "rgba(0,0,0,1)" : currentColor;
                const dx = smX - lastX; const dy = smY - lastY; const distance = Math.hypot(dx, dy);
                const spacing = Math.max(1, Math.min(currentPath[currentPath.length-1].w, smW) * 0.1); const steps = Math.max(1, Math.floor(distance / spacing));
                for (let i = 0; i <= steps; i++) { const ratio = steps === 0 ? 1 : i / steps; ctx.beginPath(); ctx.arc(lastX + dx * ratio, lastY + dy * ratio, (currentPath[currentPath.length-1].w + (smW - currentPath[currentPath.length-1].w) * ratio) / 2, 0, Math.PI * 2); ctx.fill(); }

                lastX = smX; lastY = smY; currentPath.push({x: smX, y: smY, w: smW});
            } else {
                ctx.putImageData(canvasSnapshot, 0, 0); ctx.beginPath(); ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = currentColor; ctx.lineWidth = currentWidth;
                if (currentTool === 'line') { ctx.moveTo(shapeStartX, shapeStartY); ctx.lineTo(pos.x, pos.y); } 
                else if (currentTool === 'rect') { ctx.rect(shapeStartX, shapeStartY, pos.x - shapeStartX, pos.y - shapeStartY); } 
                else if (currentTool === 'circle') { let radius = Math.hypot(pos.x - shapeStartX, pos.y - shapeStartY); ctx.arc(shapeStartX, shapeStartY, radius, 0, Math.PI * 2); }
                ctx.stroke();
            }
        });

        window.addEventListener('pointerup', (e) => {
            isTransforming = false; transformTarget = null;
            if (!isDrawing) return;
            isDrawing = false; const pos = getPointerPos(e);
            if (currentTool === 'pen' || currentTool === 'eraser') {
                if (currentPath.length > 0) history.push({ layerId: activeLayerId, type: 'path', color: currentTool === 'eraser' ? 'erase' : currentColor, points: currentPath });
            } else { history.push({ layerId: activeLayerId, type: currentTool, color: currentColor, width: currentWidth, start: { x: shapeStartX, y: shapeStartY }, end: { x: pos.x, y: pos.y } }); }
            redoStack = []; canvasSnapshot = null; 
        });

        // --- 네이버 로그인 및 데이터 전송 로직 ---
        let loggedInUser = null; 
        const naverLogin = new naver.LoginWithNaverId({ clientId: "vvc6338uO8TYXNMje6Dj", callbackUrl: window.location.origin + "/draw", isPopup: false, loginButton: {color: "green", type: 3, height: 40} });
        naverLogin.init();

        window.addEventListener('load', function () {
            naverLogin.getLoginStatus(function (status) {
                if (status) {
                    const uniqueId = naverLogin.user.getId();
                    if (!uniqueId) return;
                    loggedInUser = { name: naverLogin.user.getNickName() || "치지직 시청자", email: uniqueId, profileImage: naverLogin.user.getProfileImage() || "" };
                    document.getElementById('login-container').style.display = 'none'; document.getElementById('donation-container').style.display = 'flex';
                    document.getElementById('custom-nickname').value = loggedInUser.name;
                    if (loggedInUser.profileImage) document.getElementById('profile-preview').style.backgroundImage = `url('${loggedInUser.profileImage}')`;
                }
            });
        });

        document.getElementById('btn-clear-all').onclick = () => {
            if (history.length === 0 && layers.filter(l => l.type === 'text').length === 0) return alert("지울 그림이 없습니다.");
            if (confirm("정말 모든 그림을 지우시겠습니까?\n(이 작업은 되돌릴 수 없습니다)")) {
                history = []; redoStack = [];
                layers.forEach(l => { if(l.type === 'canvas') l.ctx.clearRect(0, 0, l.canvas.width, l.canvas.height); else l.element.remove(); });
                layers = layers.filter(l => l.type === 'canvas'); renderLayerUI();
            }
        };

        document.getElementById('btn-send').onclick = async () => {
            const title = document.getElementById('drawing-title').value || "제목없음";
            const customName = document.getElementById('custom-nickname').value || loggedInUser.name;

            const unrasterized = layers.filter(l => l.type === 'text');
            if (unrasterized.length > 0) return alert("아직 래스터화(그림화) 되지 않은 텍스트 레이어가 있습니다.\n우측 패널에서 [래스터화] 버튼을 눌러주세요.");
            if (history.length === 0) return alert("그림을 그려주세요!");
            if (!loggedInUser) return alert("로그인이 필요합니다.");

            const finalProfileImage = (document.getElementById('use-profile').checked && loggedInUser.profileImage) ? loggedInUser.profileImage : "";
            const payload = { name: customName, email: loggedInUser.email, profileImage: finalProfileImage, title: title, drawingData: history };

            try {
                const res = await fetch(`${API_BASE}/api/submit-drawing`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { alert("전송 성공!"); document.getElementById('btn-clear-all').click(); } 
                else { alert("전송 실패"); }
            } catch (error) { alert("서버 연결에 실패했습니다."); }
        };
    </script>
</body>
</html>
