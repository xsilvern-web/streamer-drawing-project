<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시청자용 그리기 (전체화면 프로페셔널 에디터)</title>
    <script type="text/javascript" src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Malgun Gothic', sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
        button { cursor: pointer; border: none; border-radius: 4px; outline: none; transition: 0.2s; }
        input[type="text"], input[type="number"] { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; }
        input[type="text"]::placeholder, input[type="number"]::placeholder { color: #999; }

        .app-header { background: #2d2d2d; border-bottom: 1px solid #444; display: flex; flex-direction: column; justify-content: center; padding: 10px 20px; flex-shrink: 0; gap: 8px; }
        .header-top { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .header-group { display: flex; align-items: center; gap: 10px; }
        .btn-header, .file-label { background: #444; color: white; padding: 8px 15px; font-size: 13px; font-weight: bold; border: 1px solid #555; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-header:hover, .file-label:hover { background: #555; }
        input[type="file"] { display: none; }
        #btn-send { background: #ff9800; color: white; border: none; font-size: 15px; padding: 8px 20px; font-weight: bold; }
        #btn-send:hover { background: #fb8c00; }
        .disclaimer { font-size: 11px; color: #888; text-align: right; width: 100%; }

        #profile-preview { width: 34px; height: 34px; border-radius: 50%; background-color: white; background-size: cover; background-position: center; border: 1px solid #555;}
        
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left { width: 80px; background: #252526; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; overflow-y: visible; flex-shrink: 0; position: relative; }
        .tool-btn { width: 60px; height: 45px; background: #333; color: #ccc; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #444; }
        .tool-btn:hover:not(.active-tool) { background: #444; }
        .tool-btn.active-tool { background: #007acc; color: white; font-weight: bold; border-color: #007acc; }

        .shape-container { position: relative; width: 100%; display: flex; justify-content: center; }
        .shape-flyout { display: none; position: absolute; left: 70px; top: 0; background: #252526; border: 1px solid #555; border-radius: 4px; padding: 5px; gap: 5px; z-index: 100; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .shape-flyout.show { display: flex; flex-direction: row; }
        .sub-tool { width: 40px; height: 40px; padding: 5px; }
        .sub-tool svg { stroke: currentColor; fill: none; stroke-width: 2; width: 24px; height: 24px; }
        .control-group { display: flex; flex-direction: column; align-items: center; width: 80%; gap: 5px; font-size: 11px; color: #aaa; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        #color-picker { width: 50px; height: 50px; padding: 0; border: 2px solid #555; border-radius: 8px; cursor: pointer; background: transparent; }

        .workspace { flex: 1; position: relative; background: #111; overflow: hidden; }
        #scroll-container { width: 100%; height: 100%; overflow: auto; position: relative; }
        #layer-wrapper { width: 1920px; height: 1080px; background: transparent; position: absolute; top: 50px; left: 50px; transform-origin: top left; touch-action: none; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .checker-bg { background-color: #ffffff !important; background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0), linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0) !important; background-size: 30px 30px !important; background-position: 0 0, 15px 15px !important; }
        
        #broadcast-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8; display: none; }
        #offline-text { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 48px; font-weight: bold; z-index: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .drawing-layer { position: absolute; top: 0; left: 0; pointer-events: none; }

        .sidebar-right { width: 240px; background: #252526; border-left: 1px solid #444; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; flex-shrink: 0; gap: 15px; }
        .panel-section { background: #333; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        .panel-title { font-size: 12px; color: #aaa; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        .layer-item { display: flex; justify-content: space-between; align-items: center; background: #444; padding: 8px; border-radius: 4px; border: 1px solid transparent; cursor: grab; }
        .layer-item:active { cursor: grabbing; }
        .layer-item.active { background: #094771; border-color: #007acc; }
        .layer-item:hover:not(.active) { background: #555; }
        .layer-name { font-size: 13px; flex-grow: 1; padding-left: 10px; color: white;}
        
        .sys-btn { background: #444; color: white; padding: 6px; font-size: 12px; width: 100%; border: 1px solid #555; font-weight: bold; cursor: pointer;}
        .sys-btn:hover { background: #555; }
        .toggle-label { font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #ccc; }
        
        .raster-btn { background: #e65100; color: white; border: none; padding: 4px 6px; font-size: 11px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-left: 2px;}
        .raster-btn:hover { background: #ff9800; }
        .del-btn { background: #d32f2f; color: white; border: none; padding: 4px 6px; font-size: 11px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-left: 2px;}
        .del-btn:hover { background: #f44336; }

        /* ✨ 만능 객체 트랜스폼 박스 */
        .transform-box { 
            position: absolute; display: flex; flex-direction: column; 
            border: 2px dashed transparent; 
            transform-origin: center center; user-select: none; box-sizing: border-box;
        }
        /* 패딩으로 계산 꼬이는것 방지, 가상요소로 여백 15px 드래그 영역 생성 */
        .transform-box::before { content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px; z-index: -1; cursor: move; }
        .transform-box.active { border-color: #007acc; z-index: 999 !important; }
        .transform-box:hover { border-color: rgba(0, 122, 204, 0.5); }
        
        .transform-box .content { width: 100%; height: 100%; cursor: default; }
        .transform-box.type-text .content { cursor: text; outline: none; white-space: pre-wrap; word-wrap: break-word; padding: 5px; }
        .transform-box.type-text .content:empty:before { content: "텍스트 입력..."; color: #aaa; }
        .transform-box.type-transform_box .content, .transform-box.type-rough .content { width: 100%; height: 100%; display: block; object-fit: fill; pointer-events: none; }

        .handle { position: absolute; width: 12px; height: 12px; background: #fff; border: 2px solid #007acc; border-radius: 50%; display: none; z-index: 10; }
        .transform-box.active .handle { display: block; }
        .handle-nw { top: -6px; left: -6px; cursor: nwse-resize; } .handle-ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .handle-sw { bottom: -6px; left: -6px; cursor: nesw-resize; } .handle-se { bottom: -6px; right: -6px; cursor: nwse-resize; }

        .rotate-area { position: absolute; width: 24px; height: 24px; background: transparent; display: none; z-index: 5; border-radius: 50%; cursor: alias; }
        .transform-box.active .rotate-area { display: block; }
        .rot-nw { top: -20px; left: -20px; } .rot-ne { top: -20px; right: -20px; }
        .rot-sw { bottom: -20px; left: -20px; } .rot-se { bottom: -20px; right: -20px; }

        /* 리치 텍스트 서식 툴바 */
        #floating-toolbar { position: fixed; display: none; background: #252526; padding: 8px 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 2000; gap: 8px; align-items: center; border: 1px solid #444; }
        .toolbar-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="header-top">
            <div class="header-group">
                <button id="btn-save" class="btn-header">파일 저장</button>
                <label class="file-label">파일 불러오기<input type="file" id="file-input" accept=".json"></label>
                <button id="btn-clear-all" class="btn-header" style="background-color: #ff4757; color: white; border: none; padding: 8px 15px; margin-left: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">🗑️ 전체 삭제</button>
            </div>
            
            <div class="header-group" id="login-container">
                <div id="naverIdLogin"></div>
            </div>

            <div class="header-group" id="donation-container" style="display: none;">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;">
                    <div id="profile-preview"></div>
                    <label style="font-size: 10px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 3px;">
                        <input type="checkbox" id="use-profile" checked style="margin:0; width:10px; height:10px;"> 프사 전송
                    </label>
                </div>
                <input type="text" id="custom-nickname" placeholder="닉네임" style="width: 100px; font-weight: bold;">
                <input type="text" id="drawing-title" placeholder="그림 제목" style="width: 180px;">
                <button id="btn-send">화면에 띄우기 (전송)</button>
            </div>
        </div>
        <div class="disclaimer">
            ※ [조작 커서 ↖] 도구로 객체를 선택 및 이동하세요. (Shift 누르고 크기조절 시 비율 유지) / <b>일반 그림 조작 단축키: Ctrl + T</b>
        </div>
    </div>

    <div id="floating-toolbar">
        <select id="tb-fontfamily" style="background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;">
            <option value="'Malgun Gothic', sans-serif">맑은 고딕</option>
            <option value="Arial">Arial</option>
        </select>
        <input type="number" id="tb-fontsize" style="width:50px; text-align:center; background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;" value="40" title="폰트 크기(px)">
        <input type="color" id="tb-color" style="width:30px; height:30px; padding:0; border:none; cursor:pointer;" title="글자 색상">
        <button class="toolbar-btn" id="tb-bold">B</button>
        <button class="toolbar-btn" id="tb-italic" style="font-style: italic;">I</button>
    </div>

    <div class="app-body">
        <div class="sidebar-left">
            <input type="color" id="color-picker" value="#ffffff">
            <div class="control-group"><label>투명도 <span id="opacity-val">100%</span></label><input type="range" id="brush-opacity" min="0.05" max="1" step="0.05" value="1"></div>
            <div class="control-group"><label>굵기 <span id="width-val">5</span></label><input type="range" id="line-width" min="1" max="50" value="5"></div>
            <div class="control-group"><label>떨림방지</label><input type="range" id="smoothing-level" min="0" max="20" value="7"></div>
            <div style="width: 80%; height: 1px; background: #444; margin: 5px 0;"></div>
            
            <button class="tool-btn active-tool" data-tool="cursor" style="font-size: 20px;" title="선택 및 조작">↖</button>

            <button class="tool-btn" data-tool="pen">펜</button>
            <button class="tool-btn" data-tool="eraser">지우개</button>
            <button class="tool-btn" data-tool="text" style="font-size: 16px; font-weight: bold;">T</button>

            <div class="shape-container">
                <button class="tool-btn" id="btn-shape">도형 ▶</button>
                <div id="shape-flyout" class="shape-flyout">
                    <button class="tool-btn sub-tool" data-tool="line" title="직선"><svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"></line></svg></button>
                    <button class="tool-btn sub-tool" data-tool="rect" title="사각형"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"></rect></svg></button>
                    <button class="tool-btn sub-tool" data-tool="circle" title="원"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle></svg></button>
                </div>
            </div>
            <div style="width: 80%; height: 1px; background: #444; margin: 5px 0;"></div>
            <button class="tool-btn" id="btn-undo" style="height:35px;" title="단축키: Ctrl+Z">이전</button>
            <button class="tool-btn" id="btn-redo" style="height:35px;" title="단축키: Ctrl+Y">다음</button>
        </div>

        <div class="workspace">
            <div id="scroll-container">
                <div id="layer-wrapper" class="checker-bg">
                    <div id="offline-text">현재 방송 중 아님</div>
                    <iframe id="broadcast-bg" src="https://chzzk.naver.com/live/bc2dbff369307b5c446224cce192c8b1" frameborder="0" allow="autoplay; fullscreen"></iframe>
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="panel-section">
                <div class="panel-title">화면 제어</div>
                <div style="display: flex; gap: 5px; align-items: center; justify-content: space-between;">
                    <button class="sys-btn" id="btn-zoom-out">-</button>
                    <span id="zoom-text" style="font-size: 12px; font-weight: bold; width: 40px; text-align: center;">100%</span>
                    <button class="sys-btn" id="btn-zoom-in">+</button>
                </div>
                <label class="toggle-label" style="margin-top: 5px;"><input type="checkbox" id="toggle-bg"> 방송 배경 표시</label>
            </div>

            <div class="panel-section">
                <div class="panel-title" style="color: #4CAF50;">참고 이미지 (전송 제외)</div>
                <label class="sys-btn" style="text-align: center; background: #2e7d32; border-color: #1b5e20; cursor: pointer;">
                    📁 이미지 불러오기
                    <input type="file" id="rough-file" accept="image/*" style="display: none;">
                </label>
                <div id="rough-controls" style="display: none; flex-direction: column; gap: 8px; margin-top: 8px;">
                    <label style="font-size: 11px; color: #aaa; display: flex; justify-content: space-between;">투명도 <span id="rough-opacity-val">50%</span></label>
                    <input type="range" id="rough-opacity" min="0" max="1" step="0.05" value="0.5" style="width: 100%;">
                    <button id="btn-delete-rough" class="sys-btn" style="background: #ff4757; border-color: #c0392b;">🗑️ 모든 러프 삭제</button>
                </div>
            </div>

            <div class="panel-section" style="flex: 1; overflow-y: hidden; display: flex; flex-direction: column;">
                <div class="panel-title">레이어 패널 (드래그로 순서 변경)</div>
                <button id="btn-add-layer" class="sys-btn" style="background: #007acc; border-color: #007acc; margin-bottom: 10px;">새 레이어</button>
                <div id="layer-list" style="display: flex; flex-direction: column-reverse; gap: 5px; overflow-y: auto; flex: 1;"></div>
            </div>
        </div>
    </div>

    <script>
        const CANVAS_WIDTH = 1920; const CANVAS_HEIGHT = 1080;
        const CHZZK_CHANNEL_ID = 'bc2dbff369307b5c446224cce192c8b1'; 
        const API_BASE = window.location.origin;
        
        const layerWrapper = document.getElementById('layer-wrapper');
        const layerListDiv = document.getElementById('layer-list');
        const zoomText = document.getElementById('zoom-text');
        const scrollContainer = document.getElementById('scroll-container');
        
        let zoomLevel = 1.0; layerWrapper.style.transform = `scale(${zoomLevel})`; 

        let layers = []; let layerCounter = 0; let activeLayerId = null;
        let isDrawing = false; let currentWidth = 5; let currentTool = 'cursor'; 
        let smX = 0, smY = 0, smW = 0; let lastX = 0, lastY = 0;
        let shapeStartX = 0, shapeStartY = 0; let canvasSnapshot = null; 
        
        let history = []; let redoStack = []; let currentPath = []; 

        let currentColorHex = '#ffffff';
        let currentOpacity = 1;
        let currentColor = 'rgba(255, 255, 255, 1)';

        function updateCurrentColor() {
            const r = parseInt(currentColorHex.slice(1, 3), 16);
            const g = parseInt(currentColorHex.slice(3, 5), 16);
            const b = parseInt(currentColorHex.slice(5, 7), 16);
            currentColor = `rgba(${r}, ${g}, ${b}, ${currentOpacity})`;
        }

        document.getElementById('color-picker').onchange = (e) => { currentColorHex = e.target.value; updateCurrentColor(); };
        document.getElementById('brush-opacity').oninput = (e) => { 
            currentOpacity = parseFloat(e.target.value); 
            document.getElementById('opacity-val').innerText = `${Math.round(currentOpacity * 100)}%`;
            updateCurrentColor();
        };
        document.getElementById('line-width').oninput = (e) => { 
            currentWidth = parseInt(e.target.value); document.getElementById('width-val').innerText = currentWidth;
        };
        
        const btnShape = document.getElementById('btn-shape');
        const shapeFlyout = document.getElementById('shape-flyout');
        const allToolBtns = document.querySelectorAll('.tool-btn[data-tool]');

        btnShape.addEventListener('click', (e) => { shapeFlyout.classList.toggle('show'); e.stopPropagation(); });
        document.addEventListener('click', (e) => { if (!btnShape.contains(e.target) && !shapeFlyout.contains(e.target)) shapeFlyout.classList.remove('show'); });

        allToolBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                allToolBtns.forEach(b => b.classList.remove('active-tool')); btnShape.classList.remove('active-tool');
                if (e.currentTarget.classList.contains('sub-tool')) { btnShape.classList.add('active-tool'); shapeFlyout.classList.remove('show'); } 
                else { e.currentTarget.classList.add('active-tool'); }
                currentTool = e.currentTarget.getAttribute('data-tool');
                
                layers.forEach(l => {
                    if (l.type === 'canvas') l.canvas.style.pointerEvents = (currentTool === 'pen' || currentTool === 'eraser' || currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle') ? 'auto' : 'none';
                });

                if (currentTool !== 'cursor') {
                    document.querySelectorAll('.transform-box').forEach(box => box.classList.remove('active'));
                }
            });
        });

        const toggleBgBtn = document.getElementById('toggle-bg');
        const broadcastBg = document.getElementById('broadcast-bg');
        const offlineText = document.getElementById('offline-text');

        async function checkLiveStatus() {
            if (!toggleBgBtn.checked) {
                broadcastBg.style.display = 'none'; offlineText.style.display = 'none'; layerWrapper.classList.add('checker-bg');
                return;
            }
            try {
                const response = await fetch(`https://api.chzzk.naver.com/polling/v2/channels/${CHZZK_CHANNEL_ID}/live-status`);
                const data = await response.json();
                if (data.content && data.content.status === 'OPEN') { broadcastBg.style.display = 'block'; offlineText.style.display = 'none'; } 
                else { broadcastBg.style.display = 'none'; offlineText.style.display = 'block'; }
                layerWrapper.classList.remove('checker-bg');
            } catch (error) { broadcastBg.style.display = 'block'; offlineText.style.display = 'none'; layerWrapper.classList.remove('checker-bg'); }
        }
        toggleBgBtn.addEventListener('change', checkLiveStatus);
        checkLiveStatus();

        function updateZoom(newZoom) {
            zoomLevel = Math.max(0.1, Math.min(newZoom, 5.0)); 
            layerWrapper.style.transform = `scale(${zoomLevel})`; zoomText.innerText = `${Math.round(zoomLevel * 100)}%`;
        }
        document.getElementById('btn-zoom-in').onclick = () => updateZoom(zoomLevel + 0.1);
        document.getElementById('btn-zoom-out').onclick = () => updateZoom(zoomLevel - 0.1);
        scrollContainer.addEventListener('wheel', (e) => {
            if (e.altKey) { e.preventDefault(); if (e.deltaY < 0) updateZoom(zoomLevel + 0.01); else updateZoom(zoomLevel - 0.01); }
        }, { passive: false });

        function updateLayersZIndex() {
            layers.forEach((l, index) => {
                const z = index + 1;
                if (l.type === 'canvas') l.canvas.style.zIndex = z;
                else if (l.element) l.element.style.zIndex = z;
            });
        }

        function createLayer() {
            layerCounter++; const lId = `layer_${layerCounter}`;
            const cvs = document.createElement('canvas'); cvs.id = lId; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';
            cvs.style.pointerEvents = 'none'; 
            layerWrapper.appendChild(cvs);
            const context = cvs.getContext('2d'); context.lineCap = 'round'; context.lineJoin = 'round';
            layers.push({ id: lId, name: `레이어 ${layerCounter}`, canvas: cvs, ctx: context, visible: true, type: 'canvas' });
            
            updateLayersZIndex();
            selectLayer(lId); renderLayerUI();
        }

        function createTransformObject(type, x, y, width, height, customContent = null) {
            layerCounter++; const lId = `layer_${layerCounter}`;
            
            const wrapper = document.createElement('div');
            wrapper.className = `transform-box type-${type} active`;
            wrapper.style.left = `${x - width/2}px`; wrapper.style.top = `${y - height/2}px`;
            wrapper.style.width = `${width}px`; wrapper.style.height = `${height}px`; 
            
            if (type === 'rough') wrapper.style.zIndex = 0; 
            
            let content;
            if (customContent) {
                content = customContent;
                content.classList.add('content');
            } else if (type === 'text') {
                content = document.createElement('div');
                content.className = 'content'; content.contentEditable = 'true';
                content.style.fontSize = `${currentWidth * 6}px`; content.style.color = currentColor;
            }

            const handles = ['nw', 'ne', 'sw', 'se'];
            handles.forEach(dir => {
                const h = document.createElement('div'); h.className = `handle handle-${dir}`; wrapper.appendChild(h);
                const r = document.createElement('div'); r.className = `rotate-area rot-${dir}`; wrapper.appendChild(r);
            });
            
            wrapper.appendChild(content); layerWrapper.appendChild(wrapper);
            
            if (type !== 'rough') {
                layers.push({ id: lId, name: type === 'transform_box' ? `변형 이미지` : `텍스트 ${layerCounter}`, type: type, element: wrapper, visible: true });
                updateLayersZIndex();
                selectLayer(lId);
            }
            if(type === 'text') content.focus();
            
            return wrapper;
        }

        document.getElementById('rough-file').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (event) => {

        // ✨ 텍스트 & 변형박스 완벽 래스터화 (확정 시 일반 캔버스로 변환하여 펜/지우개 사용가능)

                    const box = layer.element; const boxW = box.offsetWidth; const boxH = box.offsetHeight;

        // ✨ 캔버스 전체 범위 변환을 위한 Bounding Box 추출 함수
        function getBoundingBox(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height); const data = imgData.data;
            let minX = width, minY = height, maxX = 0, maxY = 0; let hasPixel = false;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (data[(y * width + x) * 4 + 3] > 0) {
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                        hasPixel = true;
                    }

            }
            if (!hasPixel) return null;
            return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
        }

        // ✨ Ctrl+T 기능

            tempCvs.getContext('2d').putImageData(layer.ctx.getImageData(bbox.x, bbox.y, bbox.w, bbox.h), 0, 0);

            layer.ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); layer.canvas.remove();
            delete layer.canvas; delete layer.ctx;

            const box = createTransformObject('transform_box', bbox.x + bbox.w/2, bbox.y + bbox.h/2, bbox.w, bbox.h, tempCvs);

        document.getElementById('btn-add-layer').onclick = createLayer;

        function renderBrushStroke(ctx, x1, y1, w1, x2, y2, w2, color, isEraser) {
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over'; ctx.fillStyle = isEraser ? "rgba(0,0,0,1)" : color;
            const dx = x2 - x1; const dy = y2 - y1; const distance = Math.hypot(dx, dy);

            for (let i = 0; i <= steps; i++) {

        }

        // --- 마우스 및 조작 이벤트 ---
        function getPointerPos(e) { return { x: (e.clientX - layerWrapper.getBoundingClientRect().left) / zoomLevel, y: (e.clientY - layerWrapper.getBoundingClientRect().top) / zoomLevel }; }

        let transformState = null;

        layerWrapper.addEventListener('pointerdown', (e) => {
            const pos = getPointerPos(e);

                    if (e.target === box || e.target.classList.contains('handle') || e.target.classList.contains('rotate-area') || e.target.tagName==='CANVAS' && box.classList.contains('type-transform_box')) {
                        const wrapperCx = parseFloat(box.style.left) + box.offsetWidth/2; const wrapperCy = parseFloat(box.style.top) + box.offsetHeight/2;
                        let angle = 0; const transform = window.getComputedStyle(box).transform;
                        if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]) * (180/Math.PI); }

                document.querySelectorAll('.transform-box').forEach(b => b.classList.remove('active'));
                createTransformObject('text', pos.x, pos.y, 350, 150); return;
            }

            const activeLayer = layers.find(l => l.id === activeLayerId);

        });

        layerWrapper.addEventListener('pointermove', (e) => {
            const pos = getPointerPos(e);

                } 
                else if (transformState.action.includes('rot-')) {
                    const angle = Math.atan2(pos.y - transformState.startCy, pos.x - transformState.startCx) * (180 / Math.PI);
                    transformState.target.style.transform = `rotate(${angle + 45}deg)`;
                }
                else if (transformState.action.includes('handle-')) {
                    const rad = -transformState.startAngle * Math.PI / 180;
                    const dx = pos.x - transformState.startX; const dy = pos.y - transformState.startY;
                    const ldx = dx * Math.cos(rad) - dy * Math.sin(rad); const ldy = dx * Math.sin(rad) + dy * Math.cos(rad);

                    let dw = 0; let dh = 0;
                    if (transformState.action.includes('e')) dw = ldx; if (transformState.action.includes('w')) dw = -ldx;

                    if (newW < 50) { newW = 50; dw = 50 - transformState.startW; if(e.shiftKey) dh = dw / aspect; }
                    if (newH < 30) { newH = 30; dh = 30 - transformState.startH; if(e.shiftKey) dw = dh * aspect; }
                    newW = transformState.startW + dw; newH = transformState.startH + dh;

                    let localCxShift = 0; let localCyShift = 0;
                    if (transformState.action.includes('e')) localCxShift = dw/2; if (transformState.action.includes('w')) localCxShift = -dw/2;
                    if (transformState.action.includes('s')) localCyShift = dh/2; if (transformState.action.includes('n')) localCyShift = -dh/2;

                    const gRad = transformState.startAngle * Math.PI / 180;
                    const globalCx = transformState.startCx + (localCxShift * Math.cos(gRad) - localCyShift * Math.sin(gRad));
                    const globalCy = transformState.startCy + (localCxShift * Math.sin(gRad) + localCyShift * Math.cos(gRad));

                    transformState.target.style.width = `${newW}px`; transformState.target.style.height = `${newH}px`;
                    transformState.target.style.left = `${globalCx - newW/2}px`; transformState.target.style.top = `${globalCy - newH/2}px`;
                }
                return;
            }

            if (!isDrawing) return;
            const activeLayer = layers.find(l => l.id === activeLayerId); const ctx = activeLayer.ctx;

            if (currentTool === 'pen' || currentTool === 'eraser') {

                let targetWidth = Math.max(currentWidth * pressure, 1);
                const smoothingLevel = parseInt(document.getElementById('smoothing-level').value); const factor = 1 / (smoothingLevel + 1);
                smX = smX + (pos.x - smX) * factor; smY = smY + (pos.y - smY) * factor; smW = smW + (targetWidth - smW) * factor; 
                renderBrushStroke(ctx, lastX, lastY, currentPath[currentPath.length-1].w, smX, smY, smW, currentColor, currentTool === 'eraser');

        });

        // ✨ 개선된 비동기 화면 갱신 (Undo/Redo 지원)
        async function redrawCanvas() {
            layers.forEach(l => { if(l.type === 'canvas') l.ctx.clearRect(0, 0, l.canvas.width, l.canvas.height); });
            for (let item of history) {
                const targetLayer = layers.find(l => l.id === item.layerId); if(!targetLayer || targetLayer.type !== 'canvas') continue;
                const ctx = targetLayer.ctx;
                
                if (item.type === 'clear') {
                    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                }
                else if (item.type === 'raster_image') {

                    await new Promise(r => { img.onload = r; img.onerror = r; });

                    for (let i = 1; i < item.points.length; i++) {

                    else if (item.type === 'rect') { ctx.lineWidth = item.width; ctx.strokeRect(item.start.x, item.start.y, item.end.x - item.start.x, item.end.y - item.start.y); }

                }

        function redo() { if (redoStack.length > 0) { history.push(redoStack.pop()); redrawCanvas(); } }
        document.getElementById('btn-undo').onclick = undo; document.getElementById('btn-redo').onclick = redo;

        // 단축키 제어 (Alt+T 로 변경)

        document.getElementById('btn-save').onclick = () => {
            const savedTransformObjects = [];
            layers.forEach(l => {
                if (l.type === 'text' || l.type === 'transform_box') {
                    const box = l.element;
                    let angle = 0; const transform = window.getComputedStyle(box).transform;
                    if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                    
                    const obj = { id: l.id, name: l.name, type: l.type, x: parseFloat(box.style.left) + box.offsetWidth/2, y: parseFloat(box.style.top) + box.offsetHeight/2, width: box.offsetWidth, height: box.offsetHeight, angle: angle, zIndex: box.style.zIndex, visible: l.visible };
                    
                    if (l.type === 'text') { obj.html = box.querySelector('.content').innerHTML; } 
                    else if (l.type === 'transform_box') { obj.src = box.querySelector('canvas.content').toDataURL(); }
                    savedTransformObjects.push(obj);
                }
            });
            
            document.querySelectorAll('.transform-box.type-rough').forEach((box, i) => {
                let angle = 0; const transform = window.getComputedStyle(box).transform;
                if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                const img = box.querySelector('img');
                savedTransformObjects.push({ id: 'rough_' + i, name: '참고이미지', type: 'rough', x: parseFloat(box.style.left) + box.offsetWidth/2, y: parseFloat(box.style.top) + box.offsetHeight/2, width: box.offsetWidth, height: box.offsetHeight, angle: angle, zIndex: box.style.zIndex, src: img.src });
            });

            const saveData = { 
                layerCount: layerCounter, 
                layersInfo: layers.filter(l => l.type === 'canvas').map(l => ({ id: l.id, name: l.name, visible: l.visible })), 
                drawingHistory: history, transformObjects: savedTransformObjects 
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(saveData));
            const a = document.createElement('a'); a.href = dataStr; a.download = "drawing_advanced.json"; document.body.appendChild(a); a.click(); a.remove();
        };

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    Array.from(layerWrapper.querySelectorAll('canvas, .transform-box')).forEach(c => c.remove());
                    layers = []; layerCounter = data.layerCount || 0;
                    
                    data.layersInfo.forEach(lInfo => {
                        const cvs = document.createElement('canvas'); cvs.id = lInfo.id; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';
                        cvs.style.pointerEvents = (currentTool === 'cursor') ? 'none' : 'auto';
                        cvs.style.display = lInfo.visible === false ? 'none' : 'block';
                        layerWrapper.appendChild(cvs); 
                        layers.push({ id: lInfo.id, name: lInfo.name, canvas: cvs, ctx: cvs.getContext('2d'), visible: lInfo.visible !== false, type: 'canvas' });
                    });
                    
                    if (data.transformObjects) {
                        data.transformObjects.forEach(obj => {
                            let customContent = null;
                            if (obj.type === 'transform_box') {
                                customContent = document.createElement('canvas'); customContent.width = obj.width; customContent.height = obj.height;
                                const ctx = customContent.getContext('2d'); const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, obj.width, obj.height); img.src = obj.src;
                                customContent.className = 'content';
                            } else if (obj.type === 'rough') {
                                customContent = new Image(); customContent.src = obj.src; customContent.className = 'content';
                                customContent.style.opacity = document.getElementById('rough-opacity').value;
                                document.getElementById('rough-controls').style.display = 'flex';
                            }
                            
                            const box = createTransformObject(obj.type, obj.x, obj.y, obj.width, obj.height, customContent);
                            box.style.transform = `rotate(${obj.angle}rad)`; box.style.zIndex = obj.zIndex;
                            
                            if (obj.type === 'text') { box.querySelector('.content').innerHTML = obj.html || "텍스트 입력..."; }
                            if (obj.type !== 'rough') {
                                const l = layers.find(l => l.element === box);
                                if (l) { l.id = obj.id; l.name = obj.name; l.visible = obj.visible !== false; box.style.display = l.visible ? 'flex' : 'none'; }
                            }
                        });
                    }

                    history = data.drawingHistory || []; redoStack = []; 
                    updateLayersZIndex(); if(layers.length > 0) selectLayer(layers[layers.length - 1].id); redrawCanvas(); renderLayerUI(); e.target.value = ''; 
                } catch(err) { alert("잘못된 형식의 파일입니다."); }
            }; reader.readAsText(file); 
        });

        // 툴바 액션
        let activeTextContent = null;
        document.getElementById('tb-color').addEventListener('input', (e) => document.execCommand('foreColor', false, e.target.value));
        document.getElementById('tb-bold').onclick = () => document.execCommand('bold', false, null);
        document.getElementById('tb-italic').onclick = () => document.execCommand('italic', false, null);
        document.getElementById('tb-fontfamily').addEventListener('change', (e) => document.execCommand('fontName', false, e.target.value));
        
        document.getElementById('tb-fontsize').addEventListener('change', (e) => {
            if(!activeTextContent) return;
            document.execCommand('styleWithCSS', false, true); document.execCommand('fontSize', false, '7'); 
            const fonts = activeTextContent.querySelectorAll('font[size="7"], span[style*="font-size"]');
            fonts.forEach(f => { if (f.getAttribute('size') === '7' || f.style.fontSize.includes('xxx-large')) { f.removeAttribute('size'); f.style.fontSize = `${e.target.value}px`; } });
        });

        const floatingToolbar = document.getElementById('floating-toolbar');
        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selection.rangeCount > 0 && !selection.isCollapsed) {
                const range = selection.getRangeAt(0); const container = range.commonAncestorContainer;
                const textContent = container.nodeType === 3 ? container.parentNode.closest('.content[contenteditable="true"]') : container.closest('.content[contenteditable="true"]');
                if (textContent) {
                    activeTextContent = textContent; const rect = range.getBoundingClientRect();
                    floatingToolbar.style.display = 'flex'; floatingToolbar.style.left = `${rect.left}px`; floatingToolbar.style.top = `${rect.top - 50}px`;
                } else { activeTextContent = null; floatingToolbar.style.display = 'none'; }
            } else floatingToolbar.style.display = 'none';
        });

        let loggedInUser = null; let isDonationEnabled = true; 
        const btnSend = document.getElementById('btn-send'); const profilePreview = document.getElementById('profile-preview'); const useProfileCheckbox = document.getElementById('use-profile');

        const naverLogin = new naver.LoginWithNaverId({ clientId: "vvc6338uO8TYXNMje6Dj", callbackUrl: window.location.origin + "/draw", isPopup: false, loginButton: {color: "green", type: 3, height: 40} });
        naverLogin.init();

        window.addEventListener('load', function () {
            naverLogin.getLoginStatus(function (status) {
                if (status) {
                    const uniqueId = naverLogin.user.getId();
                    if (!uniqueId) { document.getElementById('login-container').style.display = 'flex'; document.getElementById('donation-container').style.display = 'none'; return; }
                    loggedInUser = { name: naverLogin.user.getNickName() || naverLogin.user.getName() || "치지직 시청자", email: uniqueId, profileImage: naverLogin.user.getProfileImage() || "" };
                    
                    document.getElementById('login-container').style.display = 'none'; document.getElementById('donation-container').style.display = 'flex';
                    document.getElementById('custom-nickname').value = loggedInUser.name;
                    if (loggedInUser.profileImage) profilePreview.style.backgroundImage = `url('${loggedInUser.profileImage}')`; else profilePreview.style.backgroundImage = 'none';
                } else { document.getElementById('login-container').style.display = 'flex'; document.getElementById('donation-container').style.display = 'none'; loggedInUser = null; }
            });
        });

        useProfileCheckbox.addEventListener('change', (e) => { profilePreview.style.opacity = e.target.checked ? "1" : "0.3"; });

        async function checkDonationStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/settings`); const data = await response.json();
                if (data.is_donation_enabled) { isDonationEnabled = true; btnSend.style.backgroundColor = '#ff9800'; btnSend.style.cursor = 'pointer'; btnSend.innerText = '화면에 띄우기 (전송)'; } 
                else { isDonationEnabled = false; btnSend.style.backgroundColor = '#777'; btnSend.style.cursor = 'not-allowed'; btnSend.innerText = '현재 그림 받기가 닫혀있습니다'; }
            } catch (error) { console.log("서버 상태 확인 불가"); }
        }
        checkDonationStatus(); setInterval(checkDonationStatus, 10000); 

        function clearMyCanvas() {
            history = []; redoStack = [];
            layers.forEach(l => { if(l.type === 'canvas') l.ctx.clearRect(0, 0, l.canvas.width, l.canvas.height); else if (l.element) l.element.remove(); });
            layers = layers.filter(l => l.type === 'canvas'); 
            updateLayersZIndex(); redrawCanvas(); renderLayerUI();
        }

        document.getElementById('btn-clear-all').onclick = () => {
            if (history.length === 0 && layers.filter(l => l.type !== 'canvas').length === 0) return alert("지울 그림이 없습니다.");
            if (confirm("정말 모든 그림을 지우시겠습니까?\n(이 작업은 되돌릴 수 없습니다)")) clearMyCanvas();
        };

        // ✨ 개선된 전송 로직 (래스터화 검증 간소화, history만 전송)
        btnSend.onclick = async () => {
            const title = document.getElementById('drawing-title').value || "제목없음";
            const customName = document.getElementById('custom-nickname').value || (loggedInUser ? loggedInUser.name : "익명");

            if (layers.some(l => l.type === 'text' || l.type === 'transform_box')) return alert("확정되지 않은 텍스트/그림 객체가 있습니다.\n우측 패널에서 레이어 [확정] 버튼을 눌러주세요.");
            if (!loggedInUser) return alert("로그인이 필요합니다.");
            if (history.length === 0) return alert("그림을 그려주세요!");

            const finalProfileImage = (useProfileCheckbox.checked && loggedInUser.profileImage) ? loggedInUser.profileImage : "";
            const payload = { name: customName, email: loggedInUser.email, profileImage: finalProfileImage, title: title, drawingData: history };

            try {
                const res = await fetch(`${API_BASE}/api/submit-drawing`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { alert("전송 성공!"); clearMyCanvas(); document.getElementById('drawing-title').value = ''; } 
                else { const data = await res.json(); alert("전송 실패: " + (data.detail || "서버 오류")); }
            } catch (error) { console.error("Error:", error); alert("서버 연결에 실패했습니다."); }
        };
    </script>
</body>
</html>
