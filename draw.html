<script>
        const CANVAS_WIDTH = 1920; const CANVAS_HEIGHT = 1080;
        const CHZZK_CHANNEL_ID = 'bc2dbff369307b5c446224cce192c8b1'; 
        const API_BASE = window.location.origin;
        
        const layerWrapper = document.getElementById('layer-wrapper');
        const layerListDiv = document.getElementById('layer-list');
        const zoomText = document.getElementById('zoom-text');
        const scrollContainer = document.getElementById('scroll-container');
        
        let baseScale = 1.0; 
        let zoomLevel = 1.0; 

        // ✨ 캔버스를 스크롤 영역에 맞게 동적 크기 조절 및 중앙 정렬
        function resizeCanvasToFit() {
            const wsRect = scrollContainer.getBoundingClientRect();
            const scaleX = wsRect.width / CANVAS_WIDTH;
            const scaleY = wsRect.height / CANVAS_HEIGHT;
            baseScale = Math.min(scaleX, scaleY) * 0.98; // 여백을 위해 98%로 피팅
            updateZoom(zoomLevel); 
        }

        function updateZoom(newZoom) {
            zoomLevel = Math.max(0.1, Math.min(newZoom, 5.0)); 
            const finalScale = baseScale * zoomLevel;
            layerWrapper.style.transform = `scale(${finalScale})`; 
            
            // 중앙 정렬 로직
            const wsRect = scrollContainer.getBoundingClientRect();
            const scaledWidth = CANVAS_WIDTH * finalScale;
            const scaledHeight = CANVAS_HEIGHT * finalScale;
            layerWrapper.style.left = Math.max(0, (wsRect.width - scaledWidth) / 2) + 'px';
            layerWrapper.style.top = Math.max(0, (wsRect.height - scaledHeight) / 2) + 'px';
            
            zoomText.innerText = `${Math.round(zoomLevel * 100)}%`;
        }

        window.addEventListener('resize', resizeCanvasToFit);

        // 좌표 계산 시 baseScale을 곱하도록 수정
        function getPointerPos(e) { 
            const rect = layerWrapper.getBoundingClientRect();
            return { 
                x: (e.clientX - rect.left) / (baseScale * zoomLevel), 
                y: (e.clientY - rect.top) / (baseScale * zoomLevel) 
            }; 
        }

        // ✨ 상단 옵션바 제어 함수
        function updateTopOptionBar(tool) {
            const optText = document.getElementById('opt-text');

        function copyFrame(sourceId) {
            syncToFrame();

            if(!srcF) return;

            const newFId = `frame_${Date.now()}`;
            const newF = { 
                id: newFId, duration: srcF.duration, layers: [], 
                layerCounter: srcF.layerCounter, 
                history: JSON.parse(JSON.stringify(srcF.history)),

            srcF.layers.forEach(l => {

                    newL.canvas = cvs; newL.ctx = ctx; newL.id = cvs.id;

        function deleteFrame(fId) {

        function createTransformObject(type, x, y, width, height, customContent = null) {
            layerCounter++; const lId = `layer_${layerCounter}`;
            
            const wrapper = document.createElement('div');
            wrapper.className = `transform-box type-${type} active`;
            wrapper.style.left = `${x - width/2}px`; wrapper.style.top = `${y - height/2}px`;

                const r = document.createElement('div'); r.className = `rotate-area rot-${dir}`; wrapper.appendChild(r);
            });
            
            wrapper.appendChild(content); layerWrapper.appendChild(wrapper);
            
            if (type !== 'rough') {
                layers.push({ id: lId, name: type === 'transform_box' ? `변형 이미지` : `텍스트 ${layerCounter}`, type: type, element: wrapper, visible: true });

            if(type === 'text') content.focus();
            
            return wrapper;
        }

        document.getElementById('rough-file').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (event) => {

        function applyTransform(layerId) {
            const layer = layers.find(l => l.id === layerId);
            if (!layer) return;

            if (layer.type === 'text') {
                const contentDiv = layer.element.querySelector('.content');
                if (!contentDiv.innerText.trim() || contentDiv.innerText === '텍스트 입력...') { deleteLayer(layerId); return; }

                const w = contentDiv.offsetWidth; const h = contentDiv.offsetHeight;
                const style = window.getComputedStyle(contentDiv);
                const cssText = `font-family: ${style.fontFamily}; font-size: ${style.fontSize}; font-weight: ${style.fontWeight}; color: ${style.color}; line-height: ${style.lineHeight}; text-align: ${style.textAlign}; white-space: pre-wrap; word-wrap: break-word; width: ${w}px; height: ${h}px; box-sizing: border-box; margin: 0; padding: 5px; display: block;`;

                const clone = contentDiv.cloneNode(true);
                clone.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml'); clone.removeAttribute('contenteditable'); clone.style.cssText = cssText;
                const scale = window.devicePixelRatio || 2; clone.style.transform = `scale(${scale})`; clone.style.transformOrigin = 'top left';

                const xmlString = new XMLSerializer().serializeToString(clone);
                const svgData = `<svg xmlns="http://www.w3.org/2000/svg" width="${w * scale}" height="${h * scale}"><foreignObject width="100%" height="100%">${xmlString}</foreignObject></svg>`;
                
                const img = new Image(); img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
                img.onload = () => {
                    const box = layer.element; const boxW = box.offsetWidth; const boxH = box.offsetHeight;
                    const cx = parseFloat(box.style.left) + boxW/2; const cy = parseFloat(box.style.top) + boxH/2;
                    let angle = 0; const transform = window.getComputedStyle(box).transform;
                    if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                    
                    const cvs = document.createElement('canvas'); cvs.id = layer.id; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; 
                    cvs.className = 'drawing-layer'; cvs.style.pointerEvents = (currentTool === 'cursor') ? 'none' : 'auto';
                    
                    const ctx = cvs.getContext('2d'); ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
                    ctx.drawImage(img, -boxW/2, -boxH/2, boxW, boxH); ctx.restore();
                    
                    layer.element.replaceWith(cvs); layer.type = 'canvas'; layer.canvas = cvs; layer.ctx = ctx; delete layer.element;
                    layer.name = layer.name.replace('텍스트', '래스터');
                    
                    history.push({ layerId: layer.id, type: 'raster_image', src: img.src, cx: cx, cy: cy, width: boxW, height: boxH, angle: angle });
                    redoStack = []; updateLayersZIndex(); renderLayerUI();
                };
            } 
            else if (layer.type === 'transform_box') {
                const box = layer.element; const contentCvs = box.querySelector('canvas.content');
                const boxW = box.offsetWidth; const boxH = box.offsetHeight;
                const cx = parseFloat(box.style.left) + boxW/2; const cy = parseFloat(box.style.top) + boxH/2;
                let angle = 0; const transform = window.getComputedStyle(box).transform;
                if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }

                const cvs = document.createElement('canvas'); cvs.id = layer.id; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; 
                cvs.className = 'drawing-layer'; cvs.style.pointerEvents = (currentTool === 'cursor') ? 'none' : 'auto';
                
                const ctx = cvs.getContext('2d'); ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
                ctx.drawImage(contentCvs, -boxW/2, -boxH/2, boxW, boxH); ctx.restore();
                
                layer.element.replaceWith(cvs); layer.type = 'canvas'; layer.canvas = cvs; layer.ctx = ctx; delete layer.element;
                layer.name = layer.name.replace('변형 이미지', '래스터');

                history.push({ layerId: layer.id, type: 'clear' });
                history.push({ layerId: layer.id, type: 'raster_image', src: contentCvs.toDataURL(), cx: cx, cy: cy, width: boxW, height: boxH, angle: angle });
                redoStack = []; updateLayersZIndex(); renderLayerUI();
            }
        }

        function getBoundingBox(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height); const data = imgData.data;
            let minX = width, minY = height, maxX = 0, maxY = 0; let hasPixel = false;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (data[(y * width + x) * 4 + 3] > 0) {
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                        hasPixel = true;
                    }
                }
            }
            if (!hasPixel) return null;
            return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
        }

        function activateTransform(layer) {
            const bbox = getBoundingBox(layer.ctx, CANVAS_WIDTH, CANVAS_HEIGHT);
            if (!bbox) return alert('변형할 그림이 없습니다.');

            const tempCvs = document.createElement('canvas'); tempCvs.width = bbox.w; tempCvs.height = bbox.h;
            tempCvs.getContext('2d').putImageData(layer.ctx.getImageData(bbox.x, bbox.y, bbox.w, bbox.h), 0, 0);

            layer.ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); layer.canvas.remove();
            delete layer.canvas; delete layer.ctx;

            const box = createTransformObject('transform_box', bbox.x + bbox.w/2, bbox.y + bbox.h/2, bbox.w, bbox.h, tempCvs);
            
            const l = layers.find(l => l.id === layerCounter); 
            layer.type = 'transform_box'; layer.element = box;
            layers = layers.filter(ll => ll.id !== l.id); 
            layer.name = "변형 이미지";
            
            document.querySelector('.tool-btn[data-tool="cursor"]').click();
            updateLayersZIndex(); renderLayerUI();
        }

            renderLayerUI();

                    updateLayersZIndex(); renderLayerUI();

                div.ondragstart = (e) => { e.dataTransfer.setData('text/plain', l.id); div.style.opacity = '0.5'; };

                div.ondragleave = (e) => { div.style.borderTop = '1px solid transparent'; };
                div.ondrop = (e) => {
                    e.preventDefault(); div.style.borderTop = '1px solid transparent';
                    const draggedId = e.dataTransfer.getData('text/plain'); if(draggedId === l.id) return;
                    const draggedIndex = layers.findIndex(layer => layer.id === draggedId); const targetIndex = layers.findIndex(layer => layer.id === l.id);
                    if (draggedIndex > -1 && targetIndex > -1) { const [draggedLayer] = layers.splice(draggedIndex, 1); layers.splice(targetIndex, 0, draggedLayer); updateLayersZIndex(); renderLayerUI(); }
                };

                    layersInfo: f.layers.filter(l => l.type === 'canvas').map(l => ({ id: l.id, name: l.name, visible: l.visible })),
                    transformObjects: savedTransformObjects
                };
            });

            const roughObjects = [];
            document.querySelectorAll('.transform-box.type-rough').forEach((box, i) => {
                let angle = 0; const transform = window.getComputedStyle(box).transform;
                if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                const img = box.querySelector('img');
                roughObjects.push({ id: 'rough_' + i, name: '참고이미지', type: 'rough', x: parseFloat(box.style.left) + box.offsetWidth/2, y: parseFloat(box.style.top) + box.offsetHeight/2, width: box.offsetWidth, height: box.offsetHeight, angle: angle, zIndex: box.style.zIndex, src: img.src });
            });

            const saveData = { isMultiFrame: true, framesData: framesData, roughObjects: roughObjects };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(saveData));
            const a = document.createElement('a'); a.href = dataStr; a.download = "drawing_advanced_anim.json"; document.body.appendChild(a); a.click(); a.remove();
        };

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    Array.from(layerWrapper.querySelectorAll('canvas, .transform-box')).forEach(c => c.remove());
                    frames = []; currentFrameId = null;

                    if (data.isMultiFrame && data.framesData) {
                        data.framesData.forEach(fData => {
                            const newF = { id: fData.id, duration: fData.duration || 500, layers: [], layerCounter: fData.layerCounter, history: fData.history || [], redoStack: [], activeLayerId: null };
                            
                            fData.layersInfo.forEach(lInfo => {
                                const cvs = document.createElement('canvas'); cvs.id = lInfo.id; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';
                                cvs.style.pointerEvents = 'none'; cvs.style.display = 'none';
                                layerWrapper.appendChild(cvs); 
                                newF.layers.push({ id: lInfo.id, name: lInfo.name, canvas: cvs, ctx: cvs.getContext('2d'), visible: lInfo.visible !== false, type: 'canvas' });
                            });
                            
                            fData.transformObjects.forEach(obj => {
                                let customContent = null;
                                if (obj.type === 'transform_box') {
                                    customContent = document.createElement('canvas'); customContent.width = obj.width; customContent.height = obj.height;
                                    const ctx = customContent.getContext('2d'); const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, obj.width, obj.height); img.src = obj.src;
                                    customContent.className = 'content';
                                }
                                const wrapper = document.createElement('div');
                                wrapper.className = `transform-box type-${obj.type}`;
                                wrapper.style.left = `${obj.x - obj.width/2}px`; wrapper.style.top = `${obj.y - obj.height/2}px`; wrapper.style.width = `${obj.width}px`; wrapper.style.height = `${obj.height}px`; 
                                wrapper.style.transform = `rotate(${obj.angle}rad)`; wrapper.style.zIndex = obj.zIndex; wrapper.style.display = 'none';
                                
                                let content;
                                if (customContent) { content = customContent; content.classList.add('content'); } 
                                else if (obj.type === 'text') { content = document.createElement('div'); content.className = 'content'; content.contentEditable = 'true'; content.innerHTML = obj.html; }
                                
                                ['nw', 'ne', 'sw', 'se'].forEach(dir => {
                                    const h = document.createElement('div'); h.className = `handle handle-${dir}`; wrapper.appendChild(h);
                                    const r = document.createElement('div'); r.className = `rotate-area rot-${dir}`; wrapper.appendChild(r);
                                });
                                wrapper.appendChild(content); layerWrapper.appendChild(wrapper);
                                newF.layers.push({ id: obj.id, name: obj.name, type: obj.type, element: wrapper, visible: obj.visible !== false });
                            });

                            if(newF.layers.length > 0) newF.activeLayerId = newF.layers[newF.layers.length-1].id;
                            frames.push(newF);
                        });
                        
                        if (data.roughObjects) {
                            data.roughObjects.forEach(obj => {
                                const customContent = new Image(); customContent.src = obj.src; customContent.className = 'content';
                                customContent.style.opacity = document.getElementById('rough-opacity').value;
                                document.getElementById('rough-controls').style.display = 'flex';
                                const box = createTransformObject(obj.type, obj.x, obj.y, obj.width, obj.height, customContent);
                                box.style.transform = `rotate(${obj.angle}rad)`; box.style.zIndex = obj.zIndex;
                            });
                        }
                        
                        if (frames.length > 0) {
                            selectFrame(frames[0].id);
                            frames.forEach(f => {
                                currentFrameId = f.id; layers = f.layers; history = f.history; redrawCanvas();
                            });
                            selectFrame(frames[frames.length - 1].id);
                        }
                    }
                    e.target.value = ''; 
                } catch(err) { alert("잘못된 형식의 파일입니다."); }
            }; reader.readAsText(file); 
        });

        // 텍스트 서식 툴바 연동
        let activeTextContent = null;
        document.getElementById('tb-color')?.addEventListener('input', (e) => document.execCommand('foreColor', false, e.target.value));
        document.getElementById('tb-bold')?.addEventListener('click', () => document.execCommand('bold', false, null));
        document.getElementById('tb-italic')?.addEventListener('click', () => document.execCommand('italic', false, null));
        document.getElementById('tb-fontfamily')?.addEventListener('change', (e) => document.execCommand('fontName', false, e.target.value));
        
        document.getElementById('tb-fontsize')?.addEventListener('change', (e) => {
            if(!activeTextContent) return;
            document.execCommand('styleWithCSS', false, true); document.execCommand('fontSize', false, '7'); 
            const fonts = activeTextContent.querySelectorAll('font[size="7"], span[style*="font-size"]');
            fonts.forEach(f => { if (f.getAttribute('size') === '7' || f.style.fontSize.includes('xxx-large')) { f.removeAttribute('size'); f.style.fontSize = `${e.target.value}px`; } });
        });

        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selection.rangeCount > 0 && !selection.isCollapsed) {
                const range = selection.getRangeAt(0); const container = range.commonAncestorContainer;
                const textContent = container.nodeType === 3 ? container.parentNode.closest('.content[contenteditable="true"]') : container.closest('.content[contenteditable="true"]');
                if (textContent) {
                    activeTextContent = textContent;
                } else { activeTextContent = null; }
            }
        });

        // --- 초기화 ---
        createNewFrame(); 
        resizeCanvasToFit(); // 초기 화면 100% 피팅 연산 시작

        let loggedInUser = null; 
        let isDonationEnabled = true; 
        const btnSend = document.getElementById('btn-send');
        const profilePreview = document.getElementById('profile-preview');
        const useProfileCheckbox = document.getElementById('use-profile');

        const naverLogin = new naver.LoginWithNaverId({ clientId: "vvc6338uO8TYXNMje6Dj", callbackUrl: window.location.origin + "/draw", isPopup: false, loginButton: {color: "green", type: 3, height: 40} });
        naverLogin.init();

        window.addEventListener('load', function () {
            naverLogin.getLoginStatus(function (status) {
                if (status) {
                    const uniqueId = naverLogin.user.getId();
                    if (!uniqueId) { document.getElementById('login-container').style.display = 'flex'; document.getElementById('donation-container').style.display = 'none'; return; }
                    loggedInUser = { name: naverLogin.user.getNickName() || naverLogin.user.getName() || "치지직 시청자", email: uniqueId, profileImage: naverLogin.user.getProfileImage() || "" };
                    
                    document.getElementById('login-container').style.display = 'none'; document.getElementById('donation-container').style.display = 'flex';
                    document.getElementById('custom-nickname').value = loggedInUser.name;

                    if (loggedInUser.profileImage) { profilePreview.style.backgroundImage = `url('${loggedInUser.profileImage}')`; } 
                    else { profilePreview.style.backgroundImage = 'none'; }
                } else { document.getElementById('login-container').style.display = 'flex'; document.getElementById('donation-container').style.display = 'none'; loggedInUser = null; }
            });
        });

        useProfileCheckbox.addEventListener('change', (e) => { profilePreview.style.opacity = e.target.checked ? "1" : "0.3"; });

        async function checkDonationStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/settings`); const data = await response.json();
                if (data.is_donation_enabled) { isDonationEnabled = true; btnSend.style.backgroundColor = '#ff9800'; btnSend.style.cursor = 'pointer'; btnSend.innerText = '화면에 띄우기 (전송)'; } 
                else { isDonationEnabled = false; btnSend.style.backgroundColor = '#777'; btnSend.style.cursor = 'not-allowed'; btnSend.innerText = '현재 그림 받기가 닫혀있습니다'; }
            } catch (error) { console.log("서버 상태 확인 불가"); }
        }

        checkDonationStatus(); setInterval(checkDonationStatus, 10000); 

        function clearMyCanvas() {
            frames.forEach(f => {
                f.layers.forEach(l => { 
                    if(l.type === 'canvas') l.canvas.remove(); 
                    else if (l.element) l.element.remove(); 
                });
            });
            frames = [];
            createNewFrame();
        }

        document.getElementById('btn-clear-all').onclick = () => {
            if (confirm("정말 모든 프레임과 그림을 지우시겠습니까?\n(이 작업은 되돌릴 수 없습니다)")) clearMyCanvas();
        };
        document.getElementById('btn-export-png').onclick = () => {
            syncToFrame(); // 현재 작업 중인 프레임 정보를 동기화

            // 제목 입력란의 값을 파일명으로 사용 (없으면 'drawing'으로 기본 설정)
            const baseFileName = document.getElementById('drawing-title').value || "drawing";

            // 텍스트 객체 중 확정되지 않은 것이 있는지 검사
            let hasUnrasterized = false;
            frames.forEach(f => {
                if (f.layers.some(l => l.type === 'text')) hasUnrasterized = true;
            });
            if (hasUnrasterized) {
                alert("확정되지 않은 텍스트 객체가 있습니다.\n우측 패널에서 텍스트 레이어의 [확정] 버튼을 누른 후 내보내주세요.");
                return;
            }

            // 개별 프레임을 렌더링하고 다운로드하는 내부 함수
            const downloadFrame = (frameData, index, totalFrames) => {
                const offCanvas = document.createElement('canvas');
                offCanvas.width = CANVAS_WIDTH;
                offCanvas.height = CANVAS_HEIGHT;
                const offCtx = offCanvas.getContext('2d');

                // 러프 이미지를 제외하고 보이는 레이어만 Z-index 순서대로 정렬
                const sortedLayers = [...frameData.layers].filter(l => l.visible && l.type !== 'rough').sort((a, b) => {
                    const zA = a.type === 'canvas' ? parseInt(a.canvas.style.zIndex || 0) : parseInt(a.element.style.zIndex || 0);
                    const zB = b.type === 'canvas' ? parseInt(b.canvas.style.zIndex || 0) : parseInt(b.element.style.zIndex || 0);
                    return zA - zB;
                });

                // 오프스크린 캔버스에 레이어 순서대로 그려넣기 (합성)
                sortedLayers.forEach(l => {
                    if (l.type === 'canvas') {
                        offCtx.drawImage(l.canvas, 0, 0);
                    } else if (l.type === 'raster_image' || l.type === 'transform_box') {
                        const box = l.element;
                        const contentCvs = box.querySelector('canvas.content');
                        if (contentCvs) {
                            const w = box.offsetWidth;
                            const h = box.offsetHeight;
                            const cx = parseFloat(box.style.left) + w / 2;
                            const cy = parseFloat(box.style.top) + h / 2;
                            let angle = 0;
                            const transform = window.getComputedStyle(box).transform;
                            if (transform !== 'none') {
                                const vals = transform.split('(')[1].split(')')[0].split(',');
                                angle = Math.atan2(vals[1], vals[0]);
                            }

                            offCtx.save();
                            offCtx.translate(cx, cy);
                            offCtx.rotate(angle);
                            offCtx.drawImage(contentCvs, -w / 2, -h / 2, w, h);
                            offCtx.restore();
                        }
                    }
                });

                // a 태그를 생성하여 다운로드 트리거
                const link = document.createElement('a');
                // 프레임이 여러 개인 경우에만 _1, _2 접미사 추가
                link.download = totalFrames > 1 ? `${baseFileName}_${index + 1}.png` : `${baseFileName}.png`;
                link.href = offCanvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // 프레임 배열을 순회하며 다운로드 실행
            // 브라우저의 다중 다운로드 차단 방지를 위해 300ms 간격으로 순차적 실행
            frames.forEach((f, index) => {
                setTimeout(() => {
                    downloadFrame(f, index, frames.length);
                }, index * 300);
            });
        };


        let isPlaying = false;
        let playTimeout = null;
        let playbackIndex = 0;

        function startAnimationPlayback() {
            if (frames.length === 0) return;
            isPlaying = true;
            
            const playBtn = document.getElementById('btn-play-anim');
            playBtn.innerText = '⏹ 정지';
            playBtn.style.background = '#d32f2f';
            playBtn.style.borderColor = '#b71c1c';
            
            // 재생 시작 전 현재 편집 중인 정보 동기화
            syncToFrame();
            
            // 현재 활성화된 프레임부터 재생 시작 (없으면 처음부터)
            playbackIndex = frames.findIndex(f => f.id === currentFrameId);
            if(playbackIndex === -1) playbackIndex = 0;
            
            // 재생 중에는 캔버스 조작 방지 (선택 도구로 강제 변경)
            document.querySelector('.tool-btn[data-tool="cursor"]').click();
            
            playNextFrame();
        }

        function stopAnimationPlayback() {
            isPlaying = false;
            clearTimeout(playTimeout);
            
            const playBtn = document.getElementById('btn-play-anim');
            playBtn.innerText = '▶ 재생';
            playBtn.style.background = '#4CAF50';
            playBtn.style.borderColor = '#388E3C';
        }

        function playNextFrame() {
            if (!isPlaying) return;
            if (frames.length === 0) {
                stopAnimationPlayback();
                return;
            }
            
            // 인덱스가 프레임 개수를 넘어가면 처음(0)으로 루프
            if (playbackIndex >= frames.length) playbackIndex = 0;
            
            const frameToPlay = frames[playbackIndex];
            selectFrame(frameToPlay.id);
            
            // 해당 프레임의 노출 시간(duration)만큼 대기 후 다음 프레임 호출
            playTimeout = setTimeout(() => {
                playbackIndex++;
                playNextFrame();
            }, frameToPlay.duration || 500);
        }

        document.getElementById('btn-play-anim').addEventListener('click', () => {
            if (isPlaying) {
                stopAnimationPlayback();
            } else {
                startAnimationPlayback();
            }
        });

        // 프레임 추가/삭제 시 재생 중이면 충돌 방지를 위해 정지 처리
        const originalCreateNewFrame = createNewFrame;
        createNewFrame = function() {
            if(isPlaying) stopAnimationPlayback();
            originalCreateNewFrame();
        };

        const originalDeleteFrame = deleteFrame;
        deleteFrame = function(fId) {
            if(isPlaying) stopAnimationPlayback();
            originalDeleteFrame(fId);
        };
        
        const originalCopyFrame = copyFrame;
        copyFrame = function(sourceId) {
            if(isPlaying) stopAnimationPlayback();
            originalCopyFrame(sourceId);
        };

        btnSend.onclick = async () => {
            syncToFrame(); 

            const title = document.getElementById('drawing-title').value || "제목없음";
            const customName = document.getElementById('custom-nickname').value || (loggedInUser ? loggedInUser.name : "익명");
            if (!loggedInUser) return alert("로그인이 필요합니다.");

            const isAnimationMode = document.getElementById('chk-animation-mode').checked;
            let finalPayload;

            if (isAnimationMode) {
                let hasUnrasterized = false;
                frames.forEach(f => { if (f.layers.some(l => l.type === 'text' || l.type === 'transform_box')) hasUnrasterized = true; });
                if (hasUnrasterized) return alert("확정되지 않은 텍스트/그림 객체가 포함된 프레임이 있습니다.\n모든 프레임을 확인하여 [확정]을 눌러주세요.");

                const animationPayload = [];
                const offCanvas = document.createElement('canvas'); offCanvas.width = CANVAS_WIDTH; offCanvas.height = CANVAS_HEIGHT;
                const offCtx = offCanvas.getContext('2d');

                frames.forEach(f => {
                    offCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                    
                    const sortedLayers = [...f.layers].filter(l => l.visible && l.type !== 'rough').sort((a,b) => {
                        const zA = a.type === 'canvas' ? parseInt(a.canvas.style.zIndex) : parseInt(a.element.style.zIndex);
                        const zB = b.type === 'canvas' ? parseInt(b.canvas.style.zIndex) : parseInt(b.element.style.zIndex);
                        return zA - zB;
                    });

                    sortedLayers.forEach(l => {
                        if (l.type === 'canvas') { offCtx.drawImage(l.canvas, 0, 0); } 
                        else if (l.type === 'raster_image') {
                            const box = l.element; const contentCvs = box.querySelector('canvas.content');
                            const w = box.offsetWidth; const h = box.offsetHeight;
                            const cx = parseFloat(box.style.left) + w/2; const cy = parseFloat(box.style.top) + h/2;
                            let angle = 0; const transform = window.getComputedStyle(box).transform;
                            if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                            
                            offCtx.save(); offCtx.translate(cx, cy); offCtx.rotate(angle);
                            offCtx.drawImage(contentCvs, -w/2, -h/2, w, h); offCtx.restore();
                        }
                    });

                    animationPayload.push({ src: offCanvas.toDataURL('image/png'), duration: f.duration });
                });

                finalPayload = { isAnimation: true, frames: animationPayload };
            } else {
                if (layers.some(l => l.type === 'text' || l.type === 'transform_box')) return alert("확정되지 않은 텍스트/그림 객체가 있습니다.\n우측 패널에서 레이어 [확정] 버튼을 눌러주세요.");
                
                let singleHistoryPayload = [...history];
                layers.forEach(l => {
                    if (l.type === 'raster_image') {
                        const box = l.element; const contentCvs = box.querySelector('canvas.content');
                        const w = box.offsetWidth; const h = box.offsetHeight;
                        const cx = parseFloat(box.style.left) + w/2; const cy = parseFloat(box.style.top) + h/2;
                        let angle = 0; const transform = window.getComputedStyle(box).transform;
                        if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                        
                        singleHistoryPayload.push({ type: 'raster_image', src: contentCvs.toDataURL('image/png'), cx: cx, cy: cy, width: w, height: h, angle: angle });
                    }
                });

                if (singleHistoryPayload.length === 0) return alert("그림을 그려주세요!");
                finalPayload = singleHistoryPayload;
            }

            const finalProfileImage = (useProfileCheckbox.checked && loggedInUser.profileImage) ? loggedInUser.profileImage : "";
            const payload = { name: customName, email: loggedInUser.email, profileImage: finalProfileImage, title: title, drawingData: finalPayload };

            try {
                const res = await fetch(`${API_BASE}/api/submit-drawing`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { 
                    alert("전송 성공!"); clearMyCanvas(); document.getElementById('drawing-title').value = ''; 
                } else { 
                    const data = await res.json(); alert("전송 실패: " + (data.detail || "서버 오류")); 
                }
            } catch (error) { console.error("Error:", error); alert("서버 연결에 실패했습니다."); }
        };
    </script>
</body>
</html>
