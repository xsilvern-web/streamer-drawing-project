<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시청자용 그리기 (전체화면 프로페셔널 에디터)</title>
    <script type="text/javascript" src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Malgun Gothic', sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
        button { cursor: pointer; border: none; border-radius: 4px; outline: none; transition: 0.2s; }
        input[type="text"], input[type="number"] { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; }
        
        /* 헤더 UI */
        .app-header { background: #2d2d2d; border-bottom: 1px solid #444; display: flex; flex-direction: column; justify-content: center; padding: 10px 20px; flex-shrink: 0; gap: 8px; }
        .header-top { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .header-group { display: flex; align-items: center; gap: 10px; }
        .btn-header, .file-label { background: #444; color: white; padding: 8px 15px; font-size: 13px; font-weight: bold; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
        .btn-header:hover, .file-label:hover { background: #555; }
        input[type="file"] { display: none; }
        #btn-send { background: #ff9800; color: white; border: none; font-size: 15px; padding: 8px 20px; font-weight: bold; }
        #btn-send:hover { background: #fb8c00; }
        #profile-preview { width: 34px; height: 34px; border-radius: 50%; background-color: white; background-size: cover; background-position: center; border: 1px solid #555;}
        
        /* 레이아웃 */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left { width: 80px; background: #252526; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; overflow-y: visible; flex-shrink: 0; position: relative; }
        .tool-btn { width: 60px; height: 45px; background: #333; color: #ccc; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #444; }
        .tool-btn:hover:not(.active-tool) { background: #444; }
        .tool-btn.active-tool { background: #007acc; color: white; font-weight: bold; border-color: #007acc; }

        .control-group { display: flex; flex-direction: column; align-items: center; width: 80%; gap: 5px; font-size: 11px; color: #aaa; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        #color-picker { width: 50px; height: 50px; padding: 0; border: 2px solid #555; border-radius: 8px; cursor: pointer; background: transparent; }

        /* 워크스페이스 및 캔버스 */
        .workspace { flex: 1; position: relative; background: #111; overflow: hidden; }
        #scroll-container { width: 100%; height: 100%; overflow: auto; position: relative; }
        #layer-wrapper { width: 1920px; height: 1080px; background: transparent; position: absolute; top: 50px; left: 50px; transform-origin: top left; touch-action: none; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .checker-bg { background-color: #ffffff !important; background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0), linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0) !important; background-size: 30px 30px !important; background-position: 0 0, 15px 15px !important; }
        #broadcast-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8; display: none; } /* 기본값 none */
        #offline-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 48px; font-weight: bold; z-index: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .drawing-layer { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* 우측 패널 */
        .sidebar-right { width: 240px; background: #252526; border-left: 1px solid #444; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; flex-shrink: 0; gap: 15px; }
        .panel-section { background: #333; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        .panel-title { font-size: 12px; color: #aaa; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .sys-btn { background: #444; color: white; padding: 6px; font-size: 12px; width: 100%; border: 1px solid #555; font-weight: bold; cursor: pointer;}
        .layer-item { display: flex; justify-content: space-between; align-items: center; background: #444; padding: 8px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; }
        .layer-item.active { background: #094771; border-color: #007acc; }
        .raster-btn { background: #e65100; color: white; border: none; padding: 4px 8px; font-size: 11px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-left: 5px;}
        
        /* ✨ 만능 객체 트랜스폼 박스 (텍스트, 래스터이미지, 러프이미지 공용) */
        .transform-box { 
            position: absolute; display: flex; flex-direction: column; 
            padding: 12px; /* 이 패딩 공간이 '테두리를 잡고 이동'하는 영역이 됩니다 */
            border: 2px dashed transparent; 
            transform-origin: center center; user-select: none; box-sizing: border-box;
        }
        .transform-box.active { border-color: #007acc; z-index: 999 !important; }
        
        /* 내부 컨텐츠가 마우스 이벤트를 가로채지 않도록 이동 영역(선) 확보 */
        .transform-box:hover { border-color: rgba(0, 122, 204, 0.5); cursor: move; }
        .transform-box .content { width: 100%; height: 100%; cursor: default; }
        .transform-box.type-text .content { cursor: text; outline: none; white-space: pre-wrap; word-wrap: break-word; }
        .transform-box.type-text .content:empty:before { content: "텍스트 입력..."; color: #aaa; }
        .transform-box.type-image .content { width: 100%; height: 100%; display: block; object-fit: fill; pointer-events: none; }

        /* 크기 조절 핸들 */
        .handle { position: absolute; width: 12px; height: 12px; background: #fff; border: 2px solid #007acc; border-radius: 50%; display: none; z-index: 10; }
        .transform-box.active .handle { display: block; }
        .handle-nw { top: -6px; left: -6px; cursor: nwse-resize; } .handle-ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .handle-sw { bottom: -6px; left: -6px; cursor: nesw-resize; } .handle-se { bottom: -6px; right: -6px; cursor: nwse-resize; }

        /* 대각선 바깥쪽 회전 핸들 영역 */
        .rotate-area { position: absolute; width: 24px; height: 24px; background: transparent; display: none; z-index: 5; border-radius: 50%; cursor: alias; }
        .transform-box.active .rotate-area { display: block; }
        .rot-nw { top: -20px; left: -20px; } .rot-ne { top: -20px; right: -20px; }
        .rot-sw { bottom: -20px; left: -20px; } .rot-se { bottom: -20px; right: -20px; }

        /* 플로팅 툴바 */
        #floating-toolbar { position: fixed; display: none; background: #252526; padding: 8px 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 2000; gap: 8px; align-items: center; border: 1px solid #444; }
        .toolbar-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="header-top">
            <div class="header-group">
                <button id="btn-save" class="btn-header">파일 저장</button>
                <label class="file-label">파일 불러오기<input type="file" id="file-input" accept=".json"></label>
                <button id="btn-clear-all" class="btn-header" style="background-color: #ff4757; color: white; border: none; margin-left: 10px;">🗑️ 전체 삭제</button>
            </div>
            <div class="header-group" id="login-container"><div id="naverIdLogin"></div></div>
            <div class="header-group" id="donation-container" style="display: none;">
                <div id="profile-preview"></div>
                <input type="text" id="custom-nickname" placeholder="닉네임" style="width: 100px; font-weight: bold;">
                <input type="text" id="drawing-title" placeholder="그림 제목" style="width: 180px;">
                <button id="btn-send">화면에 띄우기 (전송)</button>
            </div>
        </div>
        <div class="disclaimer">※ [선택/조작 커서]를 이용해 객체의 테두리 선을 잡아 이동하고, 꼭짓점으로 크기와 회전을 조작하세요.</div>
    </div>

    <!-- 리치 텍스트 서식 툴바 -->
    <div id="floating-toolbar">
        <select id="tb-fontfamily" style="background:#333; color:white; padding:4px;"><option value="'Malgun Gothic', sans-serif">맑은 고딕</option><option value="Arial">Arial</option></select>
        <input type="number" id="tb-fontsize" style="width:50px; text-align:center; background:#333; color:white; padding:4px;" value="40">
        <input type="color" id="tb-color" style="width:30px; height:30px; padding:0; border:none;">
        <button class="toolbar-btn" id="tb-bold">B</button>
        <button class="toolbar-btn" id="tb-italic" style="font-style: italic;">I</button>
    </div>

    <div class="app-body">
        <div class="sidebar-left">
            <input type="color" id="color-picker" value="#ffffff">
            <div class="control-group"><label>투명도 <span id="opacity-val">100%</span></label><input type="range" id="brush-opacity" min="0.05" max="1" step="0.05" value="1"></div>
            <div class="control-group"><label>굵기 <span id="width-val">5</span></label><input type="range" id="line-width" min="1" max="50" value="5"></div>
            <div style="width: 80%; height: 1px; background: #444; margin: 5px 0;"></div>
            
            <!-- ✨ 핵심: 조작 전용 커서 툴 추가 -->
            <button class="tool-btn active-tool" data-tool="cursor" style="font-size: 20px;" title="선택 및 조작">↖</button>
            
            <button class="tool-btn" data-tool="pen">펜</button>
            <button class="tool-btn" data-tool="eraser">지우개</button>
            <button class="tool-btn" data-tool="text" style="font-size: 16px; font-weight: bold;">T</button>
            
            <div style="width: 80%; height: 1px; background: #444; margin: 5px 0;"></div>
            <button class="tool-btn" id="btn-undo" style="height:35px;">이전</button>
        </div>

        <div class="workspace">
            <div id="scroll-container">
                <div id="layer-wrapper" class="checker-bg">
                    <div id="offline-text">현재 방송 중 아님</div>
                    <iframe id="broadcast-bg" src="https://chzzk.naver.com/live/bc2dbff369307b5c446224cce192c8b1" frameborder="0" allow="autoplay; fullscreen"></iframe>
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="panel-section">
                <div class="panel-title">화면 제어</div>
                <div style="display: flex; gap: 5px; align-items: center; justify-content: space-between;">
                    <button class="sys-btn" id="btn-zoom-out">-</button>
                    <!-- ✨ 기본 확대율 100%로 변경 -->
                    <span id="zoom-text" style="font-size: 12px; font-weight: bold; width: 40px; text-align: center;">100%</span>
                    <button class="sys-btn" id="btn-zoom-in">+</button>
                </div>
                <!-- ✨ 방송배경 끄기가 기본 -->
                <label class="toggle-label" style="margin-top: 5px;"><input type="checkbox" id="toggle-bg"> 방송 배경 표시</label>
            </div>
            
            <div class="panel-section">
                <div class="panel-title" style="color: #4CAF50;">참고 이미지 (전송 제외)</div>
                <label class="sys-btn" style="text-align: center; background: #2e7d32; border-color: #1b5e20;">
                    📁 불러오기 (크기/이동 가능)<input type="file" id="rough-file" accept="image/*" style="display: none;">
                </label>
                <div id="rough-controls" style="display: none; flex-direction: column; gap: 8px; margin-top: 8px;">
                    <button id="btn-delete-rough" class="sys-btn" style="background: #ff4757; border-color: #c0392b;">🗑️ 모든 참고 이미지 삭제</button>
                </div>
            </div>

            <div class="panel-section" style="flex: 1; overflow-y: hidden; display: flex; flex-direction: column;">
                <div class="panel-title">레이어 패널</div>
                <button id="btn-add-layer" class="sys-btn" style="background: #007acc; border-color: #007acc; margin-bottom: 10px;">새 레이어</button>
                <div id="layer-list" style="display: flex; flex-direction: column-reverse; gap: 5px; overflow-y: auto; flex: 1;"></div>
            </div>
        </div>
    </div>

    <script>
        const CANVAS_WIDTH = 1920; const CANVAS_HEIGHT = 1080;
        const CHZZK_CHANNEL_ID = 'bc2dbff369307b5c446224cce192c8b1'; 
        const API_BASE = window.location.origin;
        
        const layerWrapper = document.getElementById('layer-wrapper');
        const layerListDiv = document.getElementById('layer-list');
        const zoomText = document.getElementById('zoom-text');
        
        // ✨ 기본 줌 레벨 1.0 (100%)
        let zoomLevel = 1.0; layerWrapper.style.transform = `scale(${zoomLevel})`; 

        let layers = []; let layerCounter = 0; let activeLayerId = null;
        let isDrawing = false; let currentWidth = 5; let currentTool = 'cursor'; // 기본툴 커서
        let smX = 0, smY = 0, smW = 0; let lastX = 0, lastY = 0;
        let history = []; let redoStack = []; let currentPath = []; 
        let currentColorHex = '#ffffff'; let currentOpacity = 1; let currentColor = 'rgba(255, 255, 255, 1)';

        document.getElementById('color-picker').onchange = (e) => { 
            currentColorHex = e.target.value; 
            currentColor = `rgba(${parseInt(currentColorHex.slice(1,3),16)}, ${parseInt(currentColorHex.slice(3,5),16)}, ${parseInt(currentColorHex.slice(5,7),16)}, ${currentOpacity})`; 
        };
        document.getElementById('brush-opacity').oninput = (e) => { currentOpacity = parseFloat(e.target.value); document.getElementById('opacity-val').innerText = `${Math.round(currentOpacity * 100)}%`; document.getElementById('color-picker').dispatchEvent(new Event('change')); };
        document.getElementById('line-width').oninput = (e) => { currentWidth = parseInt(e.target.value); document.getElementById('width-val').innerText = currentWidth; };

        // 툴바 제어
        const allToolBtns = document.querySelectorAll('.tool-btn[data-tool]');
        allToolBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                allToolBtns.forEach(b => b.classList.remove('active-tool'));
                e.currentTarget.classList.add('active-tool');
                currentTool = e.currentTarget.getAttribute('data-tool');
                
                // 그리기 도구 선택 시 캔버스 클릭 활성화
                layers.forEach(l => {
                    if (l.type === 'canvas') l.canvas.style.pointerEvents = (currentTool === 'pen' || currentTool === 'eraser') ? 'auto' : 'none';
                });
                
                // 커서 툴이 아니면 객체 활성화 해제
                if(currentTool !== 'cursor') {
                    document.querySelectorAll('.transform-box').forEach(box => box.classList.remove('active'));
                }
            });
        });

        function updateZoom(newZoom) {
            zoomLevel = Math.max(0.1, Math.min(newZoom, 5.0)); 
            layerWrapper.style.transform = `scale(${zoomLevel})`; zoomText.innerText = `${Math.round(zoomLevel * 100)}%`;
        }
        document.getElementById('btn-zoom-in').onclick = () => updateZoom(zoomLevel + 0.1);
        document.getElementById('btn-zoom-out').onclick = () => updateZoom(zoomLevel - 0.1);

        const toggleBgBtn = document.getElementById('toggle-bg'); const broadcastBg = document.getElementById('broadcast-bg'); const offlineText = document.getElementById('offline-text');
        async function checkLiveStatus() {
            if (!toggleBgBtn.checked) { broadcastBg.style.display = 'none'; offlineText.style.display = 'none'; layerWrapper.classList.add('checker-bg'); return; }
            try {
                const res = await fetch(`https://api.chzzk.naver.com/polling/v2/channels/${CHZZK_CHANNEL_ID}/live-status`);
                const data = await res.json();
                if (data.content && data.content.status === 'OPEN') { broadcastBg.style.display = 'block'; offlineText.style.display = 'none'; } 
                else { broadcastBg.style.display = 'none'; offlineText.style.display = 'block'; }
                layerWrapper.classList.remove('checker-bg');
            } catch (e) { broadcastBg.style.display = 'block'; layerWrapper.classList.remove('checker-bg'); }
        }
        toggleBgBtn.addEventListener('change', checkLiveStatus);
        checkLiveStatus(); // 초기실행

        // 캔버스 레이어 생성
        function createLayer() {
            layerCounter++; const lId = `layer_${layerCounter}`;
            const cvs = document.createElement('canvas'); cvs.id = lId; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';
            cvs.style.pointerEvents = (currentTool === 'pen' || currentTool === 'eraser') ? 'auto' : 'none';
            layerWrapper.appendChild(cvs);
            const context = cvs.getContext('2d'); context.lineCap = 'round'; context.lineJoin = 'round';
            layers.push({ id: lId, name: `레이어 ${layerCounter}`, canvas: cvs, ctx: context, visible: true, type: 'canvas' });
            selectLayer(lId); renderLayerUI();
        }

        // ✨ 핵심: 만능 객체 트랜스폼 박스 생성 (텍스트, 이미지 등)
        function createTransformObject(type, x, y, width, height, customContent = null) {
            layerCounter++; const lId = `layer_${layerCounter}`;
            
            const wrapper = document.createElement('div');
            wrapper.className = `transform-box type-${type} active`;
            wrapper.style.left = `${x - width/2}px`; wrapper.style.top = `${y - height/2}px`;
            wrapper.style.width = `${width}px`; wrapper.style.height = `${height}px`; wrapper.style.zIndex = layerCounter;
            
            let content;
            if (customContent) {
                content = customContent;
                content.classList.add('content');
            } else if (type === 'text') {
                content = document.createElement('div');
                content.className = 'content'; content.contentEditable = 'true';
                content.style.fontSize = `${currentWidth * 6}px`; content.style.color = currentColor;
            }

            // 핸들 추가
            const handles = ['nw', 'ne', 'sw', 'se'];
            handles.forEach(dir => {
                const h = document.createElement('div'); h.className = `handle handle-${dir}`; wrapper.appendChild(h);
                const r = document.createElement('div'); r.className = `rotate-area rot-${dir}`; wrapper.appendChild(r);
            });
            
            wrapper.appendChild(content); layerWrapper.appendChild(wrapper);
            
            const layerData = { id: lId, name: type === 'rough' ? `참고이미지` : `텍스트 ${layerCounter}`, type: type, element: wrapper, visible: true };
            if (type !== 'rough') layers.push(layerData);
            
            selectLayer(lId);
            if(type === 'text') content.focus();
            
            return wrapper;
        }

        // 러프 이미지 불러오기 (트랜스폼 박스 적용)
        document.getElementById('rough-file').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = (event) => { 
                const img = new Image(); img.src = event.target.result;
                img.onload = () => {
                    // 이미지 비율 유지하며 적절한 사이즈로 화면 중앙 배치
                    const scale = Math.min(600 / img.width, 600 / img.height, 1);
                    createTransformObject('rough', CANVAS_WIDTH/2, CANVAS_HEIGHT/2, img.width * scale, img.height * scale, img);
                    document.getElementById('rough-controls').style.display = 'flex';
                }
            };
            reader.readAsDataURL(file); e.target.value = ''; 
        });
        document.getElementById('btn-delete-rough').addEventListener('click', () => {
            document.querySelectorAll('.transform-box.type-rough').forEach(el => el.remove());
            document.getElementById('rough-controls').style.display = 'none';
        });

        // ✨ 래스터화(이미지 굽기) - 캔버스를 트랜스폼 박스 안에 가두어 계속 조작 가능하게 유지
        function rasterizeText(layerId) {
            const layer = layers.find(l => l.id === layerId);
            if (!layer || layer.type !== 'text') return;
            
            const contentDiv = layer.element.querySelector('.content');
            if (!contentDiv.innerHTML.trim() || contentDiv.innerHTML === '텍스트 입력...') {
                layer.element.remove(); layers = layers.filter(l => l.id !== layerId); renderLayerUI(); return;
            }

            const w = layer.element.offsetWidth; const h = layer.element.offsetHeight;
            const svgData = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Malgun Gothic', sans-serif; font-size: ${contentDiv.style.fontSize}; color: ${contentDiv.style.color}; width: 100%; height: 100%; box-sizing: border-box; text-align: ${contentDiv.style.textAlign}; font-weight: bold; padding: 5px; white-space: pre-wrap; word-wrap: break-word;">${contentDiv.innerHTML}</div></foreignObject></svg>`;
            
            const img = new Image();
            img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
            
            img.onload = () => {
                const localCvs = document.createElement('canvas'); localCvs.width = w; localCvs.height = h;
                localCvs.className = 'content';
                const ctx = localCvs.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                
                contentDiv.replaceWith(localCvs); 
                layer.type = 'raster_image'; // 타입 변경
                layer.name = layer.name.replace('텍스트', '래스터');
                renderLayerUI();
            };
        }

        function selectLayer(id) { activeLayerId = id; renderLayerUI(); }

        function renderLayerUI() {
            layerListDiv.innerHTML = '';
            layers.forEach(l => {
                const div = document.createElement('div'); div.className = `layer-item ${l.id === activeLayerId ? 'active' : ''}`; div.onclick = () => selectLayer(l.id);
                const btnGroup = document.createElement('div'); btnGroup.style.display = 'flex'; btnGroup.style.gap = '5px';
                
                const eyeBtn = document.createElement('span'); eyeBtn.innerText = l.visible ? '표시' : '숨김'; eyeBtn.style.cursor = 'pointer'; eyeBtn.style.fontSize = '11px'; eyeBtn.style.color = l.visible ? '#fff' : '#aaa'; eyeBtn.style.border = '1px solid #555'; eyeBtn.style.padding = '2px 5px'; eyeBtn.style.borderRadius = '3px'; eyeBtn.style.backgroundColor = l.visible ? '#007acc' : '#444';
                eyeBtn.onclick = (e) => { e.stopPropagation(); l.visible = !l.visible; l.element ? l.element.style.display = l.visible ? 'flex' : 'none' : l.canvas.style.display = l.visible ? 'block' : 'none'; renderLayerUI(); };
                btnGroup.appendChild(eyeBtn);

                if (l.type === 'text') {
                    const rasterBtn = document.createElement('button'); rasterBtn.innerText = '래스터화'; rasterBtn.className = 'raster-btn';
                    rasterBtn.onclick = (e) => { e.stopPropagation(); rasterizeText(l.id); }; btnGroup.appendChild(rasterBtn);
                }

                const nameSpan = document.createElement('span'); nameSpan.className = 'layer-name'; nameSpan.innerText = l.name;
                div.appendChild(btnGroup); div.appendChild(nameSpan); layerListDiv.appendChild(div);
            });
        }
        document.getElementById('btn-add-layer').onclick = createLayer;

        // --- 수학 공식(Affine) 및 커서 제어 ---
        function getPointerPos(e) { const rect = layerWrapper.getBoundingClientRect(); return { x: (e.clientX - rect.left) / zoomLevel, y: (e.clientY - rect.top) / zoomLevel }; }
        let transformState = null;

        layerWrapper.addEventListener('pointerdown', (e) => {
            const pos = getPointerPos(e);
            
            // 1. 객체 핸들 및 조작 영역 클릭 (커서 툴일 때만 동작)
            if (currentTool === 'cursor') {
                const box = e.target.closest('.transform-box');
                if (box) {
                    // 모두 해제 후 현재 클릭한 박스 활성화
                    document.querySelectorAll('.transform-box').forEach(b => b.classList.remove('active'));
                    box.classList.add('active');

                    // 테두리(패딩)를 잡아 이동하거나 핸들을 잡아 조작
                    if (e.target === box || e.target.classList.contains('handle') || e.target.classList.contains('rotate-area')) {
                        const wrapperCx = parseFloat(box.style.left) + box.offsetWidth/2;
                        const wrapperCy = parseFloat(box.style.top) + box.offsetHeight/2;
                        let angle = 0;
                        const transform = window.getComputedStyle(box).transform;
                        if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]) * (180/Math.PI); }
                        
                        transformState = {
                            target: box, action: e.target === box ? 'move' : e.target.className, 
                            startX: pos.x, startY: pos.y, startW: box.offsetWidth, startH: box.offsetHeight,
                            startCx: wrapperCx, startCy: wrapperCy, startLeft: parseFloat(box.style.left), startTop: parseFloat(box.style.top), startAngle: angle
                        };
                    }
                } else {
                    document.querySelectorAll('.transform-box').forEach(b => b.classList.remove('active'));
                }
                return; // 커서 툴이면 그리기 무시
            }

            // 2. 텍스트 박스 내부 편집 중 클릭은 무시
            if (e.target.closest('.content[contenteditable="true"]')) return;

            // 3. 텍스트 생성
            if (currentTool === 'text') {
                document.querySelectorAll('.transform-box').forEach(b => b.classList.remove('active'));
                createTransformObject('text', pos.x, pos.y, 350, 150); return;
            }

            // 4. 캔버스 그리기 (펜, 지우개 등)
            const activeLayer = layers.find(l => l.id === activeLayerId);
            if (!activeLayer || !activeLayer.visible || activeLayer.type !== 'canvas') return; 
            isDrawing = true; 
            if (currentTool === 'pen' || currentTool === 'eraser') {
                let pressure = e.pointerType === 'pen' ? e.pressure : 1; if (e.pointerType === 'mouse' && e.pressure > 0) pressure = 1; 
                smX = pos.x; smY = pos.y; smW = Math.max(currentWidth * pressure, 1); lastX = smX; lastY = smY; currentPath = [{x: smX, y: smY, w: smW}];
            }
        });

        layerWrapper.addEventListener('pointermove', (e) => {
            const pos = getPointerPos(e);

            // ✨ 공용 트랜스폼 수학 조작
            if (transformState && transformState.target) {
                if (transformState.action === 'move') {
                    transformState.target.style.left = `${transformState.startLeft + (pos.x - transformState.startX)}px`;
                    transformState.target.style.top = `${transformState.startTop + (pos.y - transformState.startY)}px`;
                } 
                else if (transformState.action.includes('rot-')) {
                    const angle = Math.atan2(pos.y - transformState.startCy, pos.x - transformState.startCx) * (180 / Math.PI);
                    transformState.target.style.transform = `rotate(${angle + 45}deg)`;
                }
                else if (transformState.action.includes('handle-')) {
                    const rad = -transformState.startAngle * Math.PI / 180;
                    const dx = pos.x - transformState.startX; const dy = pos.y - transformState.startY;
                    const ldx = dx * Math.cos(rad) - dy * Math.sin(rad); const ldy = dx * Math.sin(rad) + dy * Math.cos(rad);

                    let newW = transformState.startW; let newH = transformState.startH;
                    let localCxShift = 0; let localCyShift = 0;

                    if (transformState.action.includes('e')) { newW += ldx; localCxShift += ldx/2; }
                    if (transformState.action.includes('w')) { newW -= ldx; localCxShift += ldx/2; }
                    if (transformState.action.includes('s')) { newH += ldy; localCyShift += ldy/2; }
                    if (transformState.action.includes('n')) { newH -= ldy; localCyShift += ldy/2; }

                    const gRad = transformState.startAngle * Math.PI / 180;
                    const globalCx = transformState.startCx + (localCxShift * Math.cos(gRad) - localCyShift * Math.sin(gRad));
                    const globalCy = transformState.startCy + (localCxShift * Math.sin(gRad) + localCyShift * Math.cos(gRad));

                    const finalW = Math.max(50, newW); const finalH = Math.max(30, newH);
                    transformState.target.style.width = `${finalW}px`; transformState.target.style.height = `${finalH}px`;
                    transformState.target.style.left = `${globalCx - finalW/2}px`; transformState.target.style.top = `${globalCy - finalH/2}px`;
                }
                return;
            }

            if (!isDrawing) return;
            const activeLayer = layers.find(l => l.id === activeLayerId); const ctx = activeLayer.ctx;

            if (currentTool === 'pen' || currentTool === 'eraser') {
                let pressure = e.pointerType === 'pen' ? e.pressure : 1; if (e.pointerType === 'mouse' && e.pressure > 0) pressure = 1; 
                let targetWidth = Math.max(currentWidth * pressure, 1);
                smX = smX + (pos.x - smX) * 0.125; smY = smY + (pos.y - smY) * 0.125; smW = smW + (targetWidth - smW) * 0.125; 
                
                ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over'; ctx.fillStyle = currentTool === 'eraser' ? "rgba(0,0,0,1)" : currentColor;
                const dx = smX - lastX; const dy = smY - lastY; const distance = Math.hypot(dx, dy);
                const steps = Math.max(1, Math.floor(distance / Math.max(1, Math.min(currentPath[currentPath.length-1].w, smW) * 0.1)));
                for (let i = 0; i <= steps; i++) { const ratio = i / steps; ctx.beginPath(); ctx.arc(lastX + dx * ratio, lastY + dy * ratio, (currentPath[currentPath.length-1].w + (smW - currentPath[currentPath.length-1].w) * ratio) / 2, 0, Math.PI * 2); ctx.fill(); }
                lastX = smX; lastY = smY; currentPath.push({x: smX, y: smY, w: smW});
            }
        });

        layerWrapper.addEventListener('pointerup', (e) => {
            if (transformState) { transformState = null; return; }
            if (!isDrawing) return; isDrawing = false;
            if (currentTool === 'pen' || currentTool === 'eraser') {
                if (currentPath.length > 0) history.push({ layerId: activeLayerId, type: 'path', color: currentTool === 'eraser' ? 'erase' : currentColor, points: currentPath });
            }
        });

        // 툴바 액션
        document.getElementById('tb-color').addEventListener('input', (e) => document.execCommand('foreColor', false, e.target.value));
        document.getElementById('tb-bold').onclick = () => document.execCommand('bold', false, null);
        document.getElementById('tb-italic').onclick = () => document.execCommand('italic', false, null);
        
        // 플로팅 툴바 이벤트 연결
        const floatingToolbar = document.getElementById('floating-toolbar');
        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selection.rangeCount > 0 && !selection.isCollapsed) {
                const range = selection.getRangeAt(0); const container = range.commonAncestorContainer;
                const textContent = container.nodeType === 3 ? container.parentNode.closest('.content[contenteditable="true"]') : container.closest('.content[contenteditable="true"]');
                if (textContent) {
                    const rect = range.getBoundingClientRect();
                    floatingToolbar.style.display = 'flex'; floatingToolbar.style.left = `${rect.left}px`; floatingToolbar.style.top = `${rect.top - 50}px`;
                } else floatingToolbar.style.display = 'none';
            } else floatingToolbar.style.display = 'none';
        });

        // 초기 세팅
        createLayer(); 

        // --- 전송 전 데이터 병합 로직 ---
        document.getElementById('btn-send').onclick = async () => {
            const title = document.getElementById('drawing-title').value || "제목없음";
            const customName = document.getElementById('custom-nickname').value || (loggedInUser ? loggedInUser.name : "익명");

            // 래스터화 안된 텍스트 확인
            if (layers.some(l => l.type === 'text')) return alert("아직 래스터화(그림화) 되지 않은 텍스트 레이어가 있습니다.\n우측 패널에서 [래스터화] 버튼을 눌러주세요.");

            // ✨ 최종 데이터 취합 (그리기 기록 + 위치 조작된 래스터 이미지 객체들)
            let finalPayload = [...history];
            layers.forEach(l => {
                if (l.type === 'raster_image') {
                    const box = l.element;
                    const w = box.offsetWidth; const h = box.offsetHeight;
                    const cx = parseFloat(box.style.left) + w/2; const cy = parseFloat(box.style.top) + h/2;
                    let angle = 0; const transform = window.getComputedStyle(box).transform;
                    if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                    const dataUrl = box.querySelector('canvas').toDataURL('image/png');
                    finalPayload.push({ type: 'raster_image', src: dataUrl, cx: cx, cy: cy, width: w, height: h, angle: angle });
                }
            });

            if (finalPayload.length === 0) return alert("그림을 그려주세요!");

// --- 전송 전 데이터 병합 및 서버 전송 로직 ---
        document.getElementById('btn-send').onclick = async () => {
            const title = document.getElementById('drawing-title').value || "제목없음";
            const customName = document.getElementById('custom-nickname').value || (loggedInUser ? loggedInUser.name : "익명");

            // 1. 래스터화 안된 텍스트 확인
            if (layers.some(l => l.type === 'text')) {
                return alert("아직 래스터화(그림화) 되지 않은 텍스트 레이어가 있습니다.\n우측 패널에서 [래스터화] 버튼을 눌러주세요.");
            }

            // 2. 로그인 확인
            if (!loggedInUser) {
                return alert("로그인이 필요합니다.");
            }

            // 3. ✨ 최종 데이터 취합 (그리기 기록 + 위치 조작된 래스터 이미지 객체들)
            let finalPayload = [...history];
            layers.forEach(l => {
                if (l.type === 'raster_image') {
                    const box = l.element;
                    const w = box.offsetWidth; const h = box.offsetHeight;
                    const cx = parseFloat(box.style.left) + w/2; const cy = parseFloat(box.style.top) + h/2;
                    let angle = 0; 
                    const transform = window.getComputedStyle(box).transform;
                    if(transform !== 'none') { 
                        const vals = transform.split('(')[1].split(')')[0].split(','); 
                        angle = Math.atan2(vals[1], vals[0]); 
                    }
                    const dataUrl = box.querySelector('canvas').toDataURL('image/png');
                    finalPayload.push({ type: 'raster_image', src: dataUrl, cx: cx, cy: cy, width: w, height: h, angle: angle });
                }
            });

            if (finalPayload.length === 0) {
                return alert("그림을 그려주세요!");
            }

            // 4. 프로필 사진 포함 여부 및 데이터 묶기
            const useProfileCheckbox = document.getElementById('use-profile');
            const finalProfileImage = (useProfileCheckbox && useProfileCheckbox.checked && loggedInUser.profileImage) ? loggedInUser.profileImage : "";
            
            const payload = { 
                name: customName, 
                email: loggedInUser.email, 
                profileImage: finalProfileImage, 
                title: title, 
                drawingData: finalPayload 
            };

            // 5. 서버로 실제 전송 (기존 main.py의 API로 POST)
            try {
                const res = await fetch(`${API_BASE}/api/submit-drawing`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) { 
                    alert("전송 성공!"); 
                    // 전송 성공 시 캔버스 전체 지우기 및 제목 초기화
                    document.getElementById('btn-clear-all').click(); 
                    document.getElementById('drawing-title').value = ''; 
                } else { 
                    const data = await res.json(); 
                    alert("전송 실패: " + (data.detail || "서버 오류")); 
                }
            } catch (error) { 
                console.error("Error:", error); 
                alert("서버 연결에 실패했습니다."); 
            }
        };
            console.log("전송할 최종 데이터: ", finalPayload);
            alert("전송 기능은 서버 연동 상태에서 동작합니다.");
        };
    </script>
