<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>시청자용 그리기 (애니메이션 지원 프로페셔널 에디터)</title>
    <script type="text/javascript" src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"
        charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.4.5/gifshot.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"],
        input[type="number"] {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #999;
        }

        .app-header {
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5px 15px; 
            flex-shrink: 0;
            gap: 8px;
        }

        .header-top {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .header-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-header,
        .file-label {
            background: #444;
            color: white;
            padding: 5px 10px; 
            font-size: 12px; 
            font-weight: bold;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-header:hover,
        .file-label:hover {
            background: #555;
        }

        input[type="file"] {
            display: none;
        }

        #btn-send {
            background: #ff9800;
            color: white;
            border: none;
            font-size: 15px;
            padding: 8px 20px;
            font-weight: bold;
        }

        #btn-send:hover {
            background: #fb8c00;
        }

        .disclaimer {
            font-size: 11px;
            color: #888;
            text-align: right;
            width: 100%;
        }

        #profile-preview {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: white;
            background-size: cover;
            background-position: center;
            border: 1px solid #555;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar-left,
        .sidebar-right {
            transition: margin 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 150;
        }

        .sidebar-left {
            width: 60px;
            background: #252526;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 10px;
            overflow-y: visible;
            flex-shrink: 0;
        }

        .sidebar-left.collapsed {
            margin-left: -60px;
        }

        .sidebar-right {
            width: 200px;
            background: #252526;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
            flex-shrink: 0;
            gap: 10px;
        }

        .sidebar-right.collapsed {
            margin-right: -200px;
        }

        .panel-toggle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 60px;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            font-size: 14px;
            font-weight: bold;
        }

        .panel-toggle:hover {
            background: #555;
            color: white;
        }

        .toggle-left {
            right: -20px;
            border-radius: 0 6px 6px 0;
            border-left: none;
        }

        .toggle-right {
            left: -20px;
            border-radius: 6px 0 0 6px;
            border-right: none;
        }

        .tool-btn {
            width: 45px;
            height: 35px;
            font-size: 11px;
            background: #333;
            color: #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
        }

        .tool-btn:hover:not(.active-tool) {
            background: #444;
        }

        .tool-btn.active-tool {
            background: #007acc;
            color: white;
            font-weight: bold;
            border-color: #007acc;
        }

        .shape-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .shape-flyout {
            display: none;
            position: absolute;
            left: 60px; 
            top: 0;
            background: #252526;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 5px;
            gap: 5px;
            z-index: 100;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .shape-flyout.show {
            display: flex;
            flex-direction: row;
        }

        .sub-tool {
            width: 35px;
            height: 35px;
            padding: 5px;
        }

        .sub-tool svg {
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            width: 20px;
            height: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            gap: 2px;
            font-size: 10px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 10px;
            margin: 0;
            cursor: pointer;
        }

        #color-picker {
            width: 35px;
            height: 35px;
            padding: 0;
            border: 2px solid #555;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111;
            overflow: hidden;
        }

        #scroll-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        #frame-panel { 
            height: 40px; flex-direction: row; align-items: center; padding: 0; 
            transition: margin 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; z-index: 150;
            background: #252526;
            border-top: 1px solid #444;
            display: flex;
        }
        #frame-panel.collapsed { margin-bottom: -40px; }
        
        .frame-header { 
            width: auto; height: 100%; display: flex; flex-direction: row; align-items: center;
            border-bottom: none; border-right: 1px solid #444; padding: 0 10px; gap: 6px; background: #333; 
        }
        
        #frame-list { padding: 0 10px; display: flex; flex: 1; overflow-x: auto; height: 100%; gap: 5px; align-items: center; }
        
        .frame-item { 
            width: 32px; height: 32px; display: flex; flex-direction: row; 
            padding: 0; align-items: center; justify-content: center; border-radius: 4px; 
            background: #444; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; box-sizing: border-box;
            font-size: 11px; font-weight: bold; color: #ccc;
        }
        .frame-item:hover { background: #555; color: white; }
        .frame-item.active {
            background: #094771;
            border-color: #007acc;
            color: white;
        }
        .frame-item.multi-selected {
            background: #005f9e; /* 다중 선택된 상태의 색상 */
            border-color: #4fc3f7;
            color: white;
        }
        .frame-context-menu {
            position: absolute;
            background: #252526;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px;
            display: none;
            z-index: 3000;
            flex-direction: column;
            gap: 6px;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.8);
        }

        #layer-wrapper {
            width: 1920px;
            height: 1080px;
            background: transparent;
            position: absolute;
            top: 50px;
            left: 50px;
            transform-origin: top left;
            touch-action: none;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            /* ✨ 화면 밖으로 삐져나가는 배경을 잘라주는 역할 유지 */
            overflow: hidden;
        }

        /* ✨ 캔버스 테두리를 모든 레이어의 최상단(가장 앞)으로 강제 배치 */
        #layer-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: 2px dashed rgba(255, 255, 255, 0.6);
            pointer-events: none; /* 테두리가 마우스 클릭이나 그리기를 방해하지 않도록 투과시킴 */
            z-index: 10000; /* 방송 화면이나 그림 레이어보다 무조건 앞으로 오게 설정 */
        }

        .checker-bg {
            background-color: #ffffff !important;
            background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0), linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0) !important;
            background-size: 30px 30px !important;
            background-position: 0 0, 15px 15px !important;
        }

        #broadcast-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            /* opacity: 0.8; 기존 코드 */
            opacity: 1; /* ✨ 방송 화면을 불투명하게 변경 */
            display: none;
        }

        #offline-text {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            z-index: 0;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        .drawing-layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .panel-section {
            background: #333;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .panel-title {
            font-size: 11px;
            color: #aaa;
            font-weight: bold;
            margin-bottom: 2px;
            border-bottom: 1px solid #444;
            padding-bottom: 3px;
        }

        /* 개별 레이어 아이템을 다시 슬림하게 변경 */
        .layer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #444;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: grab;
            gap: 6px;
        }

        .layer-item:active { cursor: grabbing; }
        .layer-item.active { background: #094771; border-color: #007acc; }
        .layer-item:hover:not(.active) { background: #555; }

        .layer-item.multi-selected {
            background: #005f9e;
            border-color: #4fc3f7;
        }

        /* ✨ 레이어 우클릭 옵션 메뉴 스타일 */
        .layer-context-menu {
            position: absolute;
            background: #252526;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px;
            display: none;
            z-index: 3000;
            flex-direction: column;
            gap: 6px;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.8);
        }

        .layer-name {
            font-size: 11px;
            flex-grow: 1;
            padding-left: 5px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sys-btn {
            background: #444;
            color: white;
            padding: 4px;
            font-size: 11px;
            width: 100%;
            border: 1px solid #555;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .sys-btn:hover { background: #555; }

        .toggle-label {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #ccc;
        }

        .raster-btn, .del-btn {
            color: white;
            border: none;
            padding: 4px 6px;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 2px;
        }
        .raster-btn { background: #e65100; }
        .raster-btn:hover { background: #ff9800; }
        .del-btn { background: #d32f2f; }
        .del-btn:hover { background: #f44336; }

        .transform-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            border: 2px dashed transparent;
            transform-origin: center center;
            user-select: none;
            box-sizing: border-box;
        }

        .transform-box::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            z-index: -1;
            cursor: move;
        }

        .transform-box.active {
            border-color: #007acc;
            z-index: 999 !important;
        }

        .transform-box:hover { border-color: rgba(0, 122, 204, 0.5); }
        .transform-box .content { width: 100%; height: 100%; cursor: default; }

        .transform-box.type-text .content {
            cursor: text;
            outline: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 5px;
        }

        .transform-box.type-text .content:empty:before { content: "텍스트 입력..."; color: #aaa; }
        .transform-box.type-transform_box .content {
            width: 100%; height: 100%; display: block; object-fit: fill; pointer-events: none;
        }

        .handle {
            position: absolute; width: 12px; height: 12px; background: #fff;
            border: 2px solid #007acc; border-radius: 50%; display: none; z-index: 10;
        }

        .transform-box.active .handle { display: block; }
        .handle-nw { top: -6px; left: -6px; cursor: nwse-resize; }
        .handle-ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .handle-sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
        .handle-se { bottom: -6px; right: -6px; cursor: nwse-resize; }

        .rotate-area {
            position: absolute; width: 24px; height: 24px; background: transparent;
            display: none; z-index: 5; border-radius: 50%; cursor: alias;
        }

        .transform-box.active .rotate-area { display: block; }
        .rot-nw { top: -20px; left: -20px; }
        .rot-ne { top: -20px; right: -20px; }
        .rot-sw { bottom: -20px; left: -20px; }
        .rot-se { bottom: -20px; right: -20px; }

        #floating-toolbar {
            position: fixed; display: none; background: #252526; padding: 8px 12px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8); z-index: 2000;
            gap: 8px; align-items: center; border: 1px solid #444;
        }

        .toolbar-btn {
            background: #333; color: white; border: 1px solid #555; padding: 5px 8px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
        }

        #top-option-bar {
            min-height: 30px; padding: 4px 20px; font-size: 11px; background: #2d2d2d; 
            border-bottom: 1px solid #444; display: flex; gap: 20px; align-items: center; flex-shrink: 0;
        }

        #top-wrapper {
            transition: margin 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; z-index: 150; display: flex; flex-direction: column; background: #2d2d2d; 
        }

        #top-wrapper.collapsed { margin-top: -100px; }

        .panel-toggle-h {
            position: absolute; left: 50%; transform: translateX(-50%); width: 60px; height: 15px;
            background: #333; color: #ccc; border: 1px solid #555; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 200; font-size: 10px; font-weight: bold;
        }

        .panel-toggle-h:hover { background: #555; color: white; }
        .toggle-top { bottom: -15px; border-radius: 0 0 6px 6px; border-top: none; }
        .toggle-bottom { top: -15px; border-radius: 6px 6px 0 0; border-bottom: none; }
    </style>
</head>

<body>
    <div id="notice-popup" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; font-family: 'Malgun Gothic', sans-serif;">
        <div style="background: #2d2d2d; border: 2px solid #007acc; border-radius: 10px; padding: 30px; width: 450px; max-width: 90%; color: #eee; box-shadow: 0 4px 20px rgba(0,0,0,0.8);">
            <h3 style="margin-top: 0; color: #ff9800; border-bottom: 1px solid #444; padding-bottom: 10px;">📢 시청자 공지사항</h3>
            <div id="notice-content" style="margin: 20px 0; font-size: 15px; white-space: pre-wrap; line-height: 1.6; max-height: 400px; overflow-y: auto;"></div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px;">
                <label style="font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" id="chk-hide-notice-today" style="width: 16px; height: 16px;">
                    오늘 하루 보지 않기
                </label>
                <button id="btn-close-notice" style="background: #007acc; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">확인하였습니다</button>
            </div>
        </div>
    </div>
    <div id="top-wrapper">
        <div class="app-header">
            <div class="header-top">
                <div class="header-group">
                    <button id="btn-save" class="btn-header">파일 저장</button>
                    <!-- ✨ 내역 압축 버튼 추가 -->
                    <button id="btn-compress-history" class="btn-header" style="background-color: #607d8b; color: white; border: none; border-radius: 4px; padding: 5px 10px; font-weight: bold;" title="용량이 너무 클 때 작업 내역을 1장으로 압축합니다">🗜️ 내역 압축</button>
                    <button id="btn-export-png" class="btn-header"
                        style="background-color: #4CAF50; color: white; border: none; border-radius: 4px; padding: 5px 10px; font-weight: bold;">PNG
                        내보내기</button>
                    <button id="btn-export-gif" class="btn-header" style="background-color: #9c27b0; color: white; border: none; margin-left: 5px;">GIF 내보내기</button>
                    <label class="file-label">파일 불러오기<input type="file" id="file-input" accept=".json"></label>
                    <button id="btn-clear-all" class="btn-header"
                        style="background-color: #ff4757; color: white; border: none; padding: 5px 10px; margin-left: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">🗑️
                        전체 지우기</button>
                </div>

                <div class="header-group" id="login-container">
                    <div id="naverIdLogin"></div>
                </div>

                <div class="header-group" id="donation-container" style="display: none;">
                    <div
                        style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;">
                        <div id="profile-preview"></div>
                        <label
                            style="font-size: 10px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 3px;">
                            <input type="checkbox" id="use-profile" checked style="margin:0; width:10px; height:10px;"> 프사 전송
                        </label>
                    </div>
                    <input type="text" id="custom-nickname" placeholder="닉네임" style="width: 100px; font-weight: bold;">
                    <input type="text" id="drawing-title" placeholder="그림 제목" style="width: 180px;">

                    <div style="display: flex; align-items: center; gap: 5px;">
                        <label style="color: #ff9800; font-weight: bold; margin-right: 5px; font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" id="chk-animation-mode" style="width: 15px; height: 15px;">
                            🎬 다중 프레임 전송
                        </label>
                        <input type="number" id="anim-repeat-count" value="5" min="1" max="20" style="width: 35px; height: 14px; font-size: 11px; text-align: center; display: none;" title="반복 횟수 (최대 20회)">
                        <span id="anim-repeat-text" style="font-size: 11px; color: #ff9800; font-weight: bold; display: none;">회 반복</span>
                        
                        <!-- ✨ 과정 생략 체크박스 추가 -->
                        <label id="label-skip-process" style="color: #4CAF50; font-weight: bold; margin-left: 10px; font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" id="chk-skip-process" style="width: 15px; height: 15px;">
                            ⚡ 과정 생략 (결과만)
                        </label>
                    </div>

                    <button id="btn-send">화면에 띄우기</button>
                    <button id="btn-send-test" style="background: #9c27b0; color: white; border: none; font-size: 15px; padding: 8px 20px; font-weight: bold; border-radius: 4px; margin-left: 5px;">테스트전송 개발자용 누르지마셈</button>
                </div>
            </div>
            <div class="disclaimer">
                ※ [조작 커서 ↖] 도구로 객체를 선택 및 이동하세요. (Shift 누르고 크기조절 시 비율 유지) / <b>일반 그림 조작 단축키: Alt + T</b>
            </div>
        </div>
        
        <div id="top-option-bar">
            <div style="font-size: 12px; font-weight: bold; color: #aaa;" id="current-tool-name">선택 및 조작</div>

            <div id="opt-text" style="display: none; gap: 10px; align-items: center;">
                <select id="tb-fontfamily"
                    style="background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;">

<script>
            const CANVAS_WIDTH = 1920; const CANVAS_HEIGHT = 1080;
            const CHZZK_CHANNEL_ID = 'bc2dbff369307b5c446224cce192c8b1';
            const API_BASE = window.location.origin;

            const layerWrapper = document.getElementById('layer-wrapper');
            const layerListDiv = document.getElementById('layer-list');
            const zoomText = document.getElementById('zoom-text');
            const scrollContainer = document.getElementById('scroll-container');

            let baseScale = 1.0;
            let zoomLevel = 1.0;

            function resizeCanvasToFit() {
                const wsRect = scrollContainer.getBoundingClientRect();
                const scaleX = wsRect.width / CANVAS_WIDTH;
                const scaleY = wsRect.height / CANVAS_HEIGHT;
                baseScale = Math.min(scaleX, scaleY) * 0.98;
                updateZoom(zoomLevel);
            }

            function updateZoom(newZoom) {
                zoomLevel = Math.max(0.1, Math.min(newZoom, 5.0));
                const finalScale = baseScale * zoomLevel;
                layerWrapper.style.transform = `scale(${finalScale})`;

                const wsRect = scrollContainer.getBoundingClientRect();
                const scaledWidth = CANVAS_WIDTH * finalScale;
                const scaledHeight = CANVAS_HEIGHT * finalScale;
                layerWrapper.style.left = Math.max(0, (wsRect.width - scaledWidth) / 2) + 'px';
                layerWrapper.style.top = Math.max(0, (wsRect.height - scaledHeight) / 2) + 'px';

                zoomText.innerText = `${Math.round(zoomLevel * 100)}%`;
            }

            window.addEventListener('resize', resizeCanvasToFit);

            function getPointerPos(e) {
                const rect = layerWrapper.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) / (baseScale * zoomLevel),
                    y: (e.clientY - rect.top) / (baseScale * zoomLevel)
                };
            }

            function updateTopOptionBar(tool) {
                const optText = document.getElementById('opt-text');
                const optFill = document.getElementById('opt-fill');
                const optBg = document.getElementById('opt-bg-control'); // ✨ 추가
                const toolNameDisplay = document.getElementById('current-tool-name');

                if(optText) optText.style.display = 'none';
                if(optFill) optFill.style.display = 'none';
                if(optBg) optBg.style.display = 'none'; // ✨ 추가
                
                const toolNames = {
                    'cursor': '선택 및 조작', 'pen': '펜', 'eraser': '지우개', 'text': '텍스트',
                    'line': '직선', 'rect': '사각형', 'circle': '원', 'fill': '채우기',
                    'eyedropper': '스포이드', 'bg_control': '방송배경 조작' // ✨ 추가
                };
                if(toolNameDisplay) toolNameDisplay.innerText = toolNames[tool] || tool;

                let needsOptionBar = false;

                if (tool === 'text') { if (optText) optText.style.display = 'flex'; needsOptionBar = true; }
                if (tool === 'fill') { if (optFill) optFill.style.display = 'flex'; needsOptionBar = true; }
                
                // ✨ 배경 조작 툴 선택 시 옵션바 켜기 & 방송배경 자동 활성화
                if (tool === 'bg_control') {
                    if (optBg) optBg.style.display = 'flex';
                    needsOptionBar = true;
                    if (!toggleBgBtn.checked) {
                        toggleBgBtn.checked = true;
                        checkLiveStatus();
                    }
                }

                if (needsOptionBar) {
                    const topWrapper = document.getElementById('top-wrapper');
                    const btnToggleTop = document.getElementById('btn-toggle-top');
                    if (topWrapper && topWrapper.classList.contains('collapsed')) {
                        topWrapper.classList.remove('collapsed');
                        if (btnToggleTop) btnToggleTop.innerText = '▲';
                    }
                }
            }

            let frames = [];
            let currentFrameId = null;
            let selectedFrameIds = new Set();
            let layers = []; let layerCounter = 0; let activeLayerId = null;
            let selectedLayerIds = new Set();
            let history = []; let redoStack = [];

            let isDrawing = false; let currentWidth = 5; let currentTool = 'cursor';


            let isDraggingBg = false;
            let dragStartBgX = 0, dragStartBgY = 0;
            let bgOffsetX = 0, bgOffsetY = 0, bgScale = 1.0;

            function updateBgTransform() {
                const bg = document.getElementById('broadcast-bg');
                if (bg) {
                    bg.style.transformOrigin = 'center center';
                    bg.style.transform = `translate(${bgOffsetX}px, ${bgOffsetY}px) scale(${bgScale})`;
                }
            }

            document.getElementById('btn-bg-zoom-in')?.addEventListener('click', () => {
                bgScale += 0.05;
                document.getElementById('bg-zoom-text').innerText = `${Math.round(bgScale * 100)}%`;
                updateBgTransform();
            });

            document.getElementById('btn-bg-zoom-out')?.addEventListener('click', () => {
                bgScale = Math.max(0.1, bgScale - 0.05);
                document.getElementById('bg-zoom-text').innerText = `${Math.round(bgScale * 100)}%`;
                updateBgTransform();
            });

            document.getElementById('btn-bg-reset')?.addEventListener('click', () => {
                bgScale = 1.0; bgOffsetX = 0; bgOffsetY = 0;
                document.getElementById('bg-zoom-text').innerText = `100%`;
                updateBgTransform();
            });



            let smX = 0, smY = 0, smW = 0; let lastX = 0, lastY = 0;
            let shapeStartX = 0, shapeStartY = 0; let canvasSnapshot = null;
            let currentPath = [];

            let currentColorHex = '#ffffff';
            let currentOpacity = 1;
            let currentColor = 'rgba(255, 255, 255, 1)';

            function updateCurrentColor() {
                const r = parseInt(currentColorHex.slice(1, 3), 16);
                const g = parseInt(currentColorHex.slice(3, 5), 16);
                const b = parseInt(currentColorHex.slice(5, 7), 16);
                currentColor = `rgba(${r}, ${g}, ${b}, ${currentOpacity})`;
            }

            document.getElementById('color-picker').onchange = (e) => { currentColorHex = e.target.value; updateCurrentColor(); };
            document.getElementById('brush-opacity').oninput = (e) => { currentOpacity = parseFloat(e.target.value); document.getElementById('opacity-val').innerText = `${Math.round(currentOpacity * 100)}%`; updateCurrentColor(); };
            const lineWidthSlider = document.getElementById('line-width');
            const widthInput = document.getElementById('width-input');

            // 슬라이더를 조절할 때 숫자 칸도 같이 업데이트
            lineWidthSlider.oninput = (e) => { 
                currentWidth = parseInt(e.target.value); 
                widthInput.value = currentWidth; 
            };

            // 숫자를 직접 입력했을 때 슬라이더와 펜 굵기 업데이트
            widthInput.addEventListener('change', (e) => {
                let val = parseInt(e.target.value);
                // 숫자가 아니거나 1보다 작으면 1로 고정
                if (isNaN(val) || val < 1) val = 1;
                // 최댓값을 100으로 고정 (원하시면 더 늘리실 수 있습니다)
                if (val > 100) val = 100; 
                
                currentWidth = val;
                widthInput.value = val;
                lineWidthSlider.value = val;
            });

            const btnShape = document.getElementById('btn-shape');
            const shapeFlyout = document.getElementById('shape-flyout');
            const allToolBtns = document.querySelectorAll('.tool-btn[data-tool]');

            btnShape.addEventListener('click', (e) => { shapeFlyout.classList.toggle('show'); e.stopPropagation(); });
            document.addEventListener('click', (e) => { if (!btnShape.contains(e.target) && !shapeFlyout.contains(e.target)) shapeFlyout.classList.remove('show'); });
            
            // ✨ 다른 곳을 클릭하면 레이어 우클릭 메뉴 숨기기
            document.addEventListener('click', (e) => {
                const lMenu = document.getElementById('layer-context-menu');
                if (lMenu && !e.target.closest('#layer-context-menu') && !e.target.closest('.layer-item')) {
                    lMenu.style.display = 'none';
                }
            });

            // ✨ 선택 레이어 병합 버튼 클릭 로직
            document.getElementById('ctx-btn-merge-layers')?.addEventListener('click', () => {
                document.getElementById('layer-context-menu').style.display = 'none';

                // 1. 선택된 레이어 중 현재 '보이는(눈 모양 켜진)' 레이어들만 추려냅니다.
                const layersToMerge = layers.filter(l => selectedLayerIds.has(l.id) && l.visible);
                if (layersToMerge.length < 2) return alert('병합하려면 보이는 레이어가 2개 이상 선택되어야 합니다.');

                // 2. 텍스트나 그림 객체가 '확정(래스터화)'되지 않았다면 경고
                if (layersToMerge.some(l => l.type !== 'canvas')) {
                    return alert('병합하기 전에 텍스트나 변형 이미지를 모두 [확정] 해주세요.');
                }

                // 3. 임시 캔버스를 만들어 합칩니다.
                const offCvs = document.createElement('canvas');
                offCvs.width = CANVAS_WIDTH;
                offCvs.height = CANVAS_HEIGHT;
                const offCtx = offCvs.getContext('2d');

                let lastMergedIndex = -1; // 병합된 레이어가 삽입될 기준 위치

                layersToMerge.forEach(l => {
                    const idx = layers.findIndex(layer => layer.id === l.id);
                    if (idx > lastMergedIndex) lastMergedIndex = idx; // 가장 위에 있던 레이어의 위치 기억

                    offCtx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
                    let mode = l.blendMode || 'normal';
                    if (mode === 'normal') mode = 'source-over';
                    offCtx.globalCompositeOperation = mode;
                    offCtx.drawImage(l.canvas, 0, 0);
                });

                // 4. 새로운 캔버스(합쳐진 레이어) 생성
                layerCounter++;
                const newLayerId = `layer_${layerCounter}`;
                const newCvs = document.createElement('canvas');
                newCvs.id = newLayerId;
                newCvs.width = CANVAS_WIDTH;
                newCvs.height = CANVAS_HEIGHT;
                newCvs.className = 'drawing-layer';
                newCvs.style.pointerEvents = (currentTool === 'cursor') ? 'none' : 'auto';
                
                const newCtx = newCvs.getContext('2d');
                newCtx.lineCap = 'round'; newCtx.lineJoin = 'round';
                newCtx.drawImage(offCvs, 0, 0);
                layerWrapper.appendChild(newCvs);

                const newLayer = {
                    id: newLayerId, name: `병합된 레이어`, canvas: newCvs, ctx: newCtx,
                    visible: true, opacity: 1, blendMode: 'normal', type: 'canvas'
                };

                // 5. 원본 레이어들 삭제 및 새 레이어 삽입
                layersToMerge.forEach(l => {
                    if (l.canvas) l.canvas.remove();
                    const idx = layers.findIndex(layer => layer.id === l.id);
                    layers.splice(idx, 1);
                    if (idx < lastMergedIndex) lastMergedIndex--; // 인덱스 밀림 보정
                });
                layers.splice(lastMergedIndex, 0, newLayer);

                // 6. 뒤로가기 복구를 위해 작업 기록(History)에 도장 찍기
                history.push({
                    type: 'raster_image', layerId: newLayerId,
                    src: newCvs.toDataURL('image/png'),
                    cx: CANVAS_WIDTH / 2, cy: CANVAS_HEIGHT / 2,
                    width: CANVAS_WIDTH, height: CANVAS_HEIGHT, angle: 0
                });

                // 7. UI 및 상태 동기화
                selectedLayerIds.clear();
                selectedLayerIds.add(newLayerId);
                updateLayersZIndex();
                selectLayer(newLayerId);
                updateOnionSkin();
            });


            function autoRasterizeAllTransforms() {
                const transformLayers = layers.filter(l => l.type === 'transform_box');
                transformLayers.forEach(l => {
                    applyTransform(l.id);
                });
            }

            allToolBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    allToolBtns.forEach(b => b.classList.remove('active-tool')); btnShape.classList.remove('active-tool');
                    if (e.currentTarget.classList.contains('sub-tool')) { btnShape.classList.add('active-tool'); shapeFlyout.classList.remove('show'); }
                    else { e.currentTarget.classList.add('active-tool'); }
                    currentTool = e.currentTarget.getAttribute('data-tool');

                    layers.forEach(l => {
                        if (l.type === 'canvas' && l.canvas) l.canvas.style.pointerEvents = (currentTool === 'pen' || currentTool === 'eraser' || currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle' || currentTool === 'fill') ? 'auto' : 'none';
                    });

                    if (currentTool !== 'cursor') {
                        document.querySelectorAll('.transform-box').forEach(box => box.classList.remove('active'));
                        autoRasterizeAllTransforms(); 
                    }

                    updateTopOptionBar(currentTool);
                });
            });

            const toggleBgBtn = document.getElementById('toggle-bg');
            const broadcastBg = document.getElementById('broadcast-bg');
            const offlineText = document.getElementById('offline-text');
            async function checkLiveStatus() {
                if (!toggleBgBtn.checked) { broadcastBg.style.display = 'none'; offlineText.style.display = 'none'; layerWrapper.classList.add('checker-bg'); return; }
                try {
                    const response = await fetch(`https://api.chzzk.naver.com/polling/v2/channels/${CHZZK_CHANNEL_ID}/live-status`);
                    const data = await response.json();
                    if (data.content && data.content.status === 'OPEN') { broadcastBg.style.display = 'block'; offlineText.style.display = 'none'; }
                    else { broadcastBg.style.display = 'none'; offlineText.style.display = 'block'; }
                    layerWrapper.classList.remove('checker-bg');
                } catch (error) { broadcastBg.style.display = 'block'; offlineText.style.display = 'none'; layerWrapper.classList.remove('checker-bg'); }
            }
            toggleBgBtn.addEventListener('change', checkLiveStatus);
            checkLiveStatus();

            document.getElementById('btn-zoom-in').onclick = () => updateZoom(zoomLevel + 0.1);
            document.getElementById('btn-zoom-out').onclick = () => updateZoom(zoomLevel - 0.1);
            scrollContainer.addEventListener('wheel', (e) => {
                if (e.altKey) { e.preventDefault(); if (e.deltaY < 0) updateZoom(zoomLevel + 0.01); else updateZoom(zoomLevel - 0.01); }
            }, { passive: false });

            function updateOnionSkin() {
                const prevCanvas = document.getElementById('onion-prev');
                const nextCanvas = document.getElementById('onion-next');
                if (!prevCanvas || !nextCanvas) return;

                const chkBox = document.getElementById('chk-onion-skin');
                const opacityInput = document.getElementById('onion-opacity');
                const isEnabled = chkBox ? chkBox.checked : false;
                const opacityVal = opacityInput ? opacityInput.value : 0.3;
                
                if (!isEnabled || !currentFrameId || isPlaying) {
                    prevCanvas.style.display = 'none';
                    nextCanvas.style.display = 'none';
                    return;
                }
                
                prevCanvas.style.display = 'block';
                nextCanvas.style.display = 'block';
                prevCanvas.style.opacity = opacityVal;
                nextCanvas.style.opacity = opacityVal;
                
                const prevCtx = prevCanvas.getContext('2d');
                const nextCtx = nextCanvas.getContext('2d');
                prevCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                nextCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                
                const currentIndex = frames.findIndex(f => f.id === currentFrameId);
                
                if (currentIndex > 0) renderFrameToCtx(frames[currentIndex - 1], prevCtx);
                if (currentIndex < frames.length - 1) renderFrameToCtx(frames[currentIndex + 1], nextCtx);
            }
            
            function renderFrameToCtx(frameData, ctx) {
                const sortedLayers = [...frameData.layers].filter(l => l.visible).sort((a, b) => {
                    const zA = parseInt(a.type === 'canvas' ? a.canvas?.style.zIndex : a.element?.style.zIndex) || 0;
                    const zB = parseInt(b.type === 'canvas' ? b.canvas?.style.zIndex : b.element?.style.zIndex) || 0;
                    return zA - zB;
                });
                
                sortedLayers.forEach(l => {
                    ctx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
                    let mode = l.blendMode || 'normal';
                    if (mode === 'normal') mode = 'source-over';
                    ctx.globalCompositeOperation = mode;

                    if (l.type === 'canvas' && l.canvas) {
                        ctx.drawImage(l.canvas, 0, 0);
                    } else if (l.type === 'raster_image' || l.type === 'transform_box') {
                        const box = l.element;
                        const contentCvs = box.querySelector('canvas.content');
                        if (contentCvs) {
                            const w = box.offsetWidth, h = box.offsetHeight;
                            const cx = parseFloat(box.style.left) + w / 2, cy = parseFloat(box.style.top) + h / 2;
                            let angle = 0;
                            const transform = window.getComputedStyle(box).transform;
                            if (transform !== 'none') {
                                const vals = transform.split('(')[1].split(')')[0].split(',');
                                angle = Math.atan2(vals[1], vals[0]);
                            }
                            ctx.save();
                            ctx.translate(cx, cy);
                            ctx.rotate(angle);
                            ctx.drawImage(contentCvs, -w / 2, -h / 2, w, h);
                            ctx.restore();
                        }
                    }
                    ctx.globalAlpha = 1.0;
                    ctx.globalCompositeOperation = 'source-over';
                });
            }

            document.getElementById('chk-onion-skin')?.addEventListener('change', updateOnionSkin);
            document.getElementById('onion-opacity')?.addEventListener('input', updateOnionSkin);

            function syncToFrame() {
                if (!currentFrameId) return;
                const f = frames.find(f => f.id === currentFrameId);
                if (f) {
                    f.layers = layers; f.layerCounter = layerCounter;
                    f.history = history; f.redoStack = redoStack; f.activeLayerId = activeLayerId;
                }
            }

            function selectFrame(fId) {
                if (currentFrameId === fId) return;
                syncToFrame();

                if (currentFrameId) {
                    const oldF = frames.find(f => f.id === currentFrameId);
                    if (oldF) {
                        oldF.layers.forEach(l => {
                            if (l.type === 'canvas' && l.canvas) l.canvas.style.display = 'none';
                            else if (l.element) l.element.style.display = 'none';
                        });
                    }
                }

                currentFrameId = fId;
                const newF = frames.find(f => f.id === currentFrameId);

                layers = newF.layers; layerCounter = newF.layerCounter;
                history = newF.history; redoStack = newF.redoStack; activeLayerId = newF.activeLayerId;

                layers.forEach(l => {
                    if (l.visible) {
                        if (l.type === 'canvas' && l.canvas) l.canvas.style.display = 'block';
                        else if (l.element) l.element.style.display = 'flex';
                    }
                });

                renderLayerUI();
                renderFrameUI();

                layers.forEach(l => {
                    if (l.type === 'canvas' && l.canvas) l.canvas.style.pointerEvents = (currentTool === 'cursor') ? 'none' : 'auto';
                });
                
                updateOnionSkin(); 
            }

            function createNewFrame() {
                const fId = `frame_${Date.now()}`;
                // ✨ 입력칸에서 기본 속도 값을 가져옴 (없으면 500)
                const defaultDurationInput = document.getElementById('default-frame-duration');
                const defaultDuration = defaultDurationInput ? parseInt(defaultDurationInput.value) || 500 : 500;

                const newFrame = {
                    id: fId, duration: defaultDuration,
                    layers: [], layerCounter: 0, history: [], redoStack: [], activeLayerId: null
                };
                frames.push(newFrame);
                selectFrame(fId);
                createLayer();
            }

            function copyFrame(sourceId) {
                syncToFrame();
                const srcF = frames.find(f => f.id === sourceId);
                if (!srcF) return;

                const newFId = `frame_${Date.now()}`;
                const newF = {
                    id: newFId, duration: srcF.duration, layers: [],
                    layerCounter: srcF.layerCounter,
                    history: JSON.parse(JSON.stringify(srcF.history)),
                    redoStack: [], activeLayerId: null
                };

                srcF.layers.forEach(l => {
                    const newL = { ...l };
                    if (l.type === 'canvas') {
                        const cvs = document.createElement('canvas');
                        cvs.id = l.id + '_c' + Date.now();
                        cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT;
                        cvs.className = 'drawing-layer';
                        if(l.canvas) {
                            cvs.style.zIndex = l.canvas.style.zIndex;
                            cvs.style.opacity = l.opacity !== undefined ? l.opacity : 1;
                            cvs.style.mixBlendMode = l.blendMode || 'normal';
                            const ctx = cvs.getContext('2d');
                            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                            ctx.drawImage(l.canvas, 0, 0);
                            newL.ctx = ctx;
                        }
                        cvs.style.pointerEvents = 'none';
                        cvs.style.display = 'none';
                        layerWrapper.appendChild(cvs);
                        newL.canvas = cvs; newL.id = cvs.id;
                    } else if (l.element) {
                        const box = l.element.cloneNode(true);
                        box.style.display = 'none';
                        box.style.opacity = l.opacity !== undefined ? l.opacity : 1;
                        box.style.mixBlendMode = l.blendMode || 'normal';
                        box.id = l.id + '_c' + Date.now();
                        layerWrapper.appendChild(box);
                        newL.element = box; newL.id = box.id;

                        const oldCvs = l.element.querySelector('canvas.content');
                        if (oldCvs) {
                            const newCvs = box.querySelector('canvas.content');
                            const newCtx = newCvs.getContext('2d');
                            newCtx.drawImage(oldCvs, 0, 0);
                        }
                    }
                    newF.layers.push(newL);
                });

                const idMap = {};
                srcF.layers.forEach((l, i) => idMap[l.id] = newF.layers[i].id);
                newF.history.forEach(h => { if (h.layerId && idMap[h.layerId]) h.layerId = idMap[h.layerId]; });
                if (srcF.activeLayerId && idMap[srcF.activeLayerId]) newF.activeLayerId = idMap[srcF.activeLayerId];

                frames.push(newF);
                renderFrameUI();
                selectFrame(newFId);
            }

            function deleteFrame(fIdOrIds) {
                // 단일 선택과 다중 선택(Set 또는 배열)을 모두 배열 형태로 변환하여 처리
                let idsToDelete = [];
                if (fIdOrIds instanceof Set) {
                    idsToDelete = Array.from(fIdOrIds);
                } else if (Array.isArray(fIdOrIds)) {
                    idsToDelete = fIdOrIds;
                } else {
                    idsToDelete = [fIdOrIds];
                }

                // 모든 프레임을 지우려고 하면 방어
                if (frames.length - idsToDelete.length <= 0) {
                    return alert('최소 1개의 프레임은 남겨두어야 합니다.');
                }

                // 프레임 개수에 따라 안내 팝업 문구 변경
                const msg = idsToDelete.length > 1 
                    ? `선택한 ${idsToDelete.length}개의 프레임을 삭제하시겠습니까?` 
                    : '해당 프레임을 삭제하시겠습니까?';
                    
                // 팝업은 여기서 딱 한 번만 뜹니다.
                if (!confirm(msg)) return;

                // 선택된 프레임들 일괄 삭제
                idsToDelete.forEach(id => {
                    const f = frames.find(frm => frm.id === id);
                    if (f) {
                        f.layers.forEach(l => {
                            if (l.type === 'canvas' && l.canvas) l.canvas.remove();
                            else if (l.element) l.element.remove();
                        });
                    }
                });

                // 프레임 목록 업데이트
                frames = frames.filter(frm => !idsToDelete.includes(frm.id));

                // 현재 보고 있던 화면이 삭제된 화면에 포함되어 있다면, 남은 프레임 중 마지막으로 이동
                if (idsToDelete.includes(currentFrameId)) {
                    selectFrame(frames[frames.length - 1].id);
                } else {
                    renderFrameUI();
                }
            }

            let contextMenuTargetId = null;

            function renderFrameUI() {
                const list = document.getElementById('frame-list');
                list.innerHTML = '';
                frames.forEach((f, idx) => {
                    const item = document.createElement('div');
                    item.className = `frame-item ${f.id === currentFrameId ? 'active' : ''}`;
                    item.draggable = true;
                    item.innerText = `${idx + 1}`; 

                    item.ondragstart = (e) => { e.dataTransfer.setData('text/plain', f.id); item.style.opacity = '0.5'; };
                    item.ondragend = (e) => { item.style.opacity = '1'; };
                    item.ondragover = (e) => { e.preventDefault(); item.style.borderLeft = '2px solid #007acc'; };
                    item.ondragleave = (e) => { item.style.borderLeft = '2px solid transparent'; };
                    item.ondrop = (e) => {
                        e.preventDefault(); item.style.borderLeft = '2px solid transparent';
                        const draggedId = e.dataTransfer.getData('text/plain'); if (draggedId === f.id) return;
                        const draggedIndex = frames.findIndex(frm => frm.id === draggedId);
                        const targetIndex = frames.findIndex(frm => frm.id === f.id);
                        if (draggedIndex > -1 && targetIndex > -1) {
                            const [draggedFrm] = frames.splice(draggedIndex, 1);
                            frames.splice(targetIndex, 0, draggedFrm);
                            renderFrameUI();
                        }
                    };

                    // ✨ 다중 선택 시각적 표시
                    if (selectedFrameIds.has(f.id) && f.id !== currentFrameId) {
                        item.classList.add('multi-selected');
                    }

                    item.onclick = (e) => {
                        if (e.ctrlKey) {
                            // Ctrl 클릭: 개별 다중 선택/해제
                            if (selectedFrameIds.has(f.id)) {
                                selectedFrameIds.delete(f.id);
                            } else {
                                selectedFrameIds.add(f.id);
                            }
                            // 만약 선택된 것이 현재 프레임이면 다른 것으로 이동할 수도 있지만, 여기서는 단순 선택만 유지
                            renderFrameUI(); 
                        } else if (e.shiftKey) {
                            // Shift 클릭: 범위 선택
                            const currentIndex = frames.findIndex(frm => frm.id === currentFrameId);
                            const targetIndex = idx;
                            if (currentIndex > -1 && targetIndex > -1) {
                                selectedFrameIds.clear();
                                const start = Math.min(currentIndex, targetIndex);
                                const end = Math.max(currentIndex, targetIndex);
                                for (let i = start; i <= end; i++) {
                                    selectedFrameIds.add(frames[i].id);
                                }
                            }
                            renderFrameUI();
                        } else {
                            // 일반 클릭: 다중 선택 해제 후 해당 프레임으로 이동
                            selectedFrameIds.clear();
                            selectedFrameIds.add(f.id);
                            selectFrame(f.id);
                        }
                    };

                    item.oncontextmenu = (e) => {
                        e.preventDefault();
                        // 우클릭한 프레임이 선택 그룹에 없다면 그룹을 초기화하고 클릭한 것만 선택
                        if (!selectedFrameIds.has(f.id)) {
                            selectedFrameIds.clear();
                            selectedFrameIds.add(f.id);
                            selectFrame(f.id); // 화면도 이동
                        }
                        
                        contextMenuTargetId = f.id;
                        const menu = document.getElementById('frame-context-menu');
                        menu.style.display = 'flex';
                        menu.style.left = `${e.pageX}px`;
                        menu.style.top = `${e.pageY - 120}px`; 
                        
                        // 다중 선택 상태라면 '여러 개'라고 표시, 단일이면 현재 값 표시
                        const durationInput = document.getElementById('ctx-duration');
                        if (selectedFrameIds.size > 1) {
                            durationInput.placeholder = "일괄변경";
                            durationInput.value = "";
                        } else {
                            durationInput.placeholder = "";
                            durationInput.value = f.duration || 500;
                        }
                    };

                    list.appendChild(item);
                });
                
                updateOnionSkin(); 
            }

            // ✨ 다중 선택된 프레임 속도 일괄 변경
            document.getElementById('ctx-duration')?.addEventListener('change', (e) => {
                const newDuration = parseInt(e.target.value);
                if (isNaN(newDuration) || newDuration < 10) return; // 최소 10ms 방어
                
                if (selectedFrameIds.size > 0) {
                    selectedFrameIds.forEach(id => {
                        const f = frames.find(frm => frm.id === id);
                        if (f) f.duration = newDuration;
                    });
                } else if (contextMenuTargetId) {
                    const f = frames.find(frm => frm.id === contextMenuTargetId);
                    if (f) f.duration = newDuration;
                }
            });

            // 복사/삭제 버튼 클릭 시 다중 선택 해제 (단일 타겟만 처리하거나, 추후 다중 복사/삭제 기능으로 확장 가능)
            document.getElementById('ctx-btn-copy')?.addEventListener('click', () => {
                if(contextMenuTargetId) copyFrame(contextMenuTargetId);
                selectedFrameIds.clear();
                document.getElementById('frame-context-menu').style.display = 'none';
            });
            
            document.getElementById('ctx-btn-copy')?.addEventListener('click', () => {
                if(contextMenuTargetId) copyFrame(contextMenuTargetId);
                selectedFrameIds.clear();
                document.getElementById('frame-context-menu').style.display = 'none';
            });

            // ✅ 삭제 버튼 이벤트 (다중 삭제 지원 및 중복 방지)
            document.getElementById('ctx-btn-del')?.addEventListener('click', () => {
                if (selectedFrameIds.size > 1) {
                    // 다중 선택 삭제
                    deleteFrame(selectedFrameIds);
                } else if (contextMenuTargetId) {
                    // 단일 선택 삭제
                    deleteFrame(contextMenuTargetId);
                }
                
                selectedFrameIds.clear(); // 삭제 후 선택 상태 초기화
                document.getElementById('frame-context-menu').style.display = 'none';
            });
            
            document.addEventListener('click', (e) => {
                if(!e.target.closest('#frame-context-menu') && !e.target.classList.contains('frame-item')) {
                    const menu = document.getElementById('frame-context-menu');
                    if (menu) menu.style.display = 'none';
                }
            });

            document.getElementById('btn-add-frame').onclick = createNewFrame;

            function updateLayersZIndex() {
                layers.forEach((l, index) => {
                    const z = index + 2; 
                    if (l.type === 'canvas' && l.canvas) l.canvas.style.zIndex = z;
                    else if (l.element) l.element.style.zIndex = z;
                });
            }

            function createLayer() {
                layerCounter++; const lId = `layer_${layerCounter}`;
                const cvs = document.createElement('canvas'); cvs.id = lId; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';
                cvs.style.pointerEvents = (currentTool === 'cursor') ? 'none' : 'auto';
                layerWrapper.appendChild(cvs);
                const context = cvs.getContext('2d'); context.lineCap = 'round'; context.lineJoin = 'round';
                
                layers.push({ id: lId, name: `레이어 ${layerCounter}`, canvas: cvs, ctx: context, visible: true, opacity: 1, blendMode: 'normal', type: 'canvas' });

                updateLayersZIndex();
                selectLayer(lId); renderLayerUI();
            }

            function createTransformObject(type, x, y, width, height, customContent = null) {
                layerCounter++; const lId = `layer_${layerCounter}`;

                const wrapper = document.createElement('div');
                wrapper.className = `transform-box type-${type} active`;
                wrapper.style.left = `${x - width / 2}px`; wrapper.style.top = `${y - height / 2}px`;
                wrapper.style.width = `${width}px`; wrapper.style.height = `${height}px`;

                let content;
                if (customContent) {
                    content = customContent; content.classList.add('content');
                } else if (type === 'text') {
                    content = document.createElement('div');
                    content.className = 'content'; content.contentEditable = 'true';
                    
                    // ✨ 펜 설정이 아닌 상단 텍스트 툴바의 값을 직접 가져와서 초기 생성에 반영합니다.

                                renderBrushStroke(ctx, p.x, p.y, p.w, p.x, p.y, p.w, item.color, true);
                            } else {
                                for (let i = 1; i < item.points.length; i++) {
                                    renderBrushStroke(ctx, item.points[i - 1].x, item.points[i - 1].y, item.points[i - 1].w, item.points[i].x, item.points[i].y, item.points[i].w, item.color, true);
                                }
                            }
                        } else {
                            tmpCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                            const rgbColor = item.color.startsWith('#') ? item.color : '#ffffff';
                            const opaqueColor = `rgba(${parseInt(rgbColor.slice(1, 3), 16)}, ${parseInt(rgbColor.slice(3, 5), 16)}, ${parseInt(rgbColor.slice(5, 7), 16)}, 1)`;

                            if (item.points.length === 1) {
                                const p = item.points[0];
                                renderBrushStroke(tmpCtx, p.x, p.y, p.w, p.x, p.y, p.w, opaqueColor, false);
                            } else {
                                for (let i = 1; i < item.points.length; i++) {
                                    renderBrushStroke(tmpCtx, item.points[i - 1].x, item.points[i - 1].y, item.points[i - 1].w, item.points[i].x, item.points[i].y, item.points[i].w, opaqueColor, false);
                                }
                            }
                            ctx.globalAlpha = item.opacity !== undefined ? item.opacity : 1;
                            ctx.drawImage(tmpCvs, 0, 0);
                            ctx.globalAlpha = 1;
                        }
                    } else {
                        ctx.beginPath(); ctx.strokeStyle = item.color;
                        if (item.type === 'line') { ctx.lineWidth = item.width; ctx.moveTo(item.start.x, item.start.y); ctx.lineTo(item.end.x, item.end.y); ctx.stroke(); }
                        else if (item.type === 'rect') { ctx.lineWidth = item.width; ctx.strokeRect(item.start.x, item.start.y, item.end.x - item.start.x, item.end.y - item.start.y); }
                        else if (item.type === 'circle') { ctx.lineWidth = item.width; let radius = Math.hypot(item.end.x - item.start.x, item.end.y - item.start.y); ctx.arc(item.start.x, item.start.y, radius, 0, Math.PI * 2); ctx.stroke(); }
                    }
                }

                layers.forEach(l => {
                    if (l.type === 'canvas' && l.canvas && l.ctx && buffers[l.id]) {
                        l.ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                        l.ctx.globalCompositeOperation = 'source-over';

                if (!activeTextContent) return;

                if (hasSelection) {
                    // 드래그한 텍스트 영역이 있을 때는 부분 적용

                        savedSelectionRange = selection.getRangeAt(0).cloneRange();

                    const sortedLayers = [...frameData.layers].filter(l => l.visible).sort((a, b) => {

                    });

                    sortedLayers.forEach(l => {
                        offCtx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
                        let mode = l.blendMode || 'normal';
                        if (mode === 'normal') mode = 'source-over';
                        offCtx.globalCompositeOperation = mode;

    if (hasUnrasterized) {

    }

    const btn = document.getElementById('btn-export-gif');
    const originalText = btn.innerText;
    btn.innerText = "GIF 생성 중...";
    btn.disabled = true;

    // 1. 모든 프레임을 이미지(DataURL)로 변환
    const images = [];
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = CANVAS_WIDTH;
    tempCanvas.height = CANVAS_HEIGHT;
    const tempCtx = tempCanvas.getContext('2d');

    for (let f of frames) {
        tempCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        
        // 프레임 렌더링 (기존 PNG 내보내기 로직 활용)
        const sortedLayers = [...f.layers].filter(l => l.visible).sort((a, b) => {
            const zA = a.type === 'canvas' ? parseInt(a.canvas?.style.zIndex || 0) : parseInt(a.element?.style.zIndex || 0);
            const zB = b.type === 'canvas' ? parseInt(b.canvas?.style.zIndex || 0) : parseInt(b.element?.style.zIndex || 0);
            return zA - zB;
        });

        sortedLayers.forEach(l => {
            tempCtx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
            let mode = l.blendMode || 'normal';
            if (mode === 'normal') mode = 'source-over';
            tempCtx.globalCompositeOperation = mode;

            if (l.type === 'canvas' && l.canvas) {
                tempCtx.drawImage(l.canvas, 0, 0);
            } else if (l.type === 'raster_image' || l.type === 'transform_box') {

                    const w = box.offsetWidth, h = box.offsetHeight;

                    tempCtx.drawImage(contentCvs, -w / 2, -h / 2, w, h);

                }
            }
        });
        images.push(tempCanvas.toDataURL('image/png'));
    }

    // 2. gifshot을 사용하여 GIF 생성

    const avgDuration = frames.reduce((acc, f) => acc + (f.duration || 500), 0) / frames.length;

    gifshot.createGIF({
        images: images,
        gifWidth: CANVAS_WIDTH / 2, // 1920은 너무 커서 처리 속도를 위해 절반으로 줄임 (선택사항)
        gifHeight: CANVAS_HEIGHT / 2,
        interval: avgDuration / 1000, // ms를 초 단위로 변환
        numWorkers: 4

        } else {

        }

    });
