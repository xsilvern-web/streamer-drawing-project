<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>시청자용 그리기 (애니메이션 지원 프로페셔널 에디터)</title>
    <script type="text/javascript" src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"
        charset="utf-8"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"],
        input[type="number"] {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #999;
        }

        .app-header {
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5px 15px; 
            flex-shrink: 0;
            gap: 8px;
        }

        .header-top {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
        }

        .header-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-header,
        .file-label {
            background: #444;
            color: white;
            padding: 5px 10px; 
            font-size: 12px; 
            font-weight: bold;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-header:hover,
        .file-label:hover {
            background: #555;
        }

        input[type="file"] {
            display: none;
        }

        #btn-send {
            background: #ff9800;
            color: white;
            border: none;
            font-size: 15px;
            padding: 8px 20px;
            font-weight: bold;
        }

        #btn-send:hover {
            background: #fb8c00;
        }

        .disclaimer {
            font-size: 11px;
            color: #888;
            text-align: right;
            width: 100%;
        }

        #profile-preview {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: white;
            background-size: cover;
            background-position: center;
            border: 1px solid #555;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar-left,
        .sidebar-right {
            transition: margin 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 150;
        }

        .sidebar-left {
            width: 60px;
            background: #252526;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 10px;
            overflow-y: visible;
            flex-shrink: 0;
        }

        .sidebar-left.collapsed {
            margin-left: -60px;
        }

        .sidebar-right {
            width: 200px;
            background: #252526;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
            flex-shrink: 0;
            gap: 10px;
        }

        .sidebar-right.collapsed {
            margin-right: -200px;
        }

        .panel-toggle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 60px;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            font-size: 14px;
            font-weight: bold;
        }

        .panel-toggle:hover {
            background: #555;
            color: white;
        }

        .toggle-left {
            right: -20px;
            border-radius: 0 6px 6px 0;
            border-left: none;
        }

        .toggle-right {
            left: -20px;
            border-radius: 6px 0 0 6px;
            border-right: none;
        }

        .tool-btn {
            width: 45px;
            height: 35px;
            font-size: 11px;
            background: #333;
            color: #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
        }

        .tool-btn:hover:not(.active-tool) {
            background: #444;
        }

        .tool-btn.active-tool {
            background: #007acc;
            color: white;
            font-weight: bold;
            border-color: #007acc;
        }

        .shape-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .shape-flyout {
            display: none;
            position: absolute;
            left: 60px; 
            top: 0;
            background: #252526;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 5px;
            gap: 5px;
            z-index: 100;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .shape-flyout.show {
            display: flex;
            flex-direction: row;
        }

        .sub-tool {
            width: 35px;
            height: 35px;
            padding: 5px;
        }

        .sub-tool svg {
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            width: 20px;
            height: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            gap: 2px;
            font-size: 10px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 10px;
            margin: 0;
            cursor: pointer;
        }

        #color-picker {
            width: 35px;
            height: 35px;
            padding: 0;
            border: 2px solid #555;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111;
            overflow: hidden;
        }

        #scroll-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        #frame-panel { 
            height: 40px; flex-direction: row; align-items: center; padding: 0; 
            transition: margin 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; z-index: 150;
            background: #252526;
            border-top: 1px solid #444;
            display: flex;
        }
        #frame-panel.collapsed { margin-bottom: -40px; }
        
        .frame-header { 
            width: auto; height: 100%; display: flex; flex-direction: row; align-items: center;
            border-bottom: none; border-right: 1px solid #444; padding: 0 10px; gap: 6px; background: #333; 
        }
        
        #frame-list { padding: 0 10px; display: flex; flex: 1; overflow-x: auto; height: 100%; gap: 5px; align-items: center; }
        
        .frame-item { 
            width: 32px; height: 32px; display: flex; flex-direction: row; 
            padding: 0; align-items: center; justify-content: center; border-radius: 4px; 
            background: #444; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; box-sizing: border-box;
            font-size: 11px; font-weight: bold; color: #ccc;
        }
        .frame-item:hover { background: #555; color: white; }
        .frame-item.active {
            background: #094771;
            border-color: #007acc;
            color: white;
        }

        .frame-context-menu {
            position: absolute;
            background: #252526;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px;
            display: none;
            z-index: 3000;
            flex-direction: column;
            gap: 6px;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.8);
        }

        #layer-wrapper {
            width: 1920px;
            height: 1080px;
            background: transparent;
            position: absolute;
            top: 50px;
            left: 50px;
            transform-origin: top left;
            touch-action: none;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .checker-bg {
            background-color: #ffffff !important;
            background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0), linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0) !important;
            background-size: 30px 30px !important;
            background-position: 0 0, 15px 15px !important;
        }

        #broadcast-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.8;
            display: none;
        }

        #offline-text {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            z-index: 0;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        .drawing-layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .panel-section {
            background: #333;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .panel-title {
            font-size: 11px;
            color: #aaa;
            font-weight: bold;
            margin-bottom: 2px;
            border-bottom: 1px solid #444;
            padding-bottom: 3px;
        }

        /* ✨ 개별 레이어 아이템의 투명도 조절용 UI 지원 구조 변경 */
        .layer-item {
            display: flex;
            flex-direction: column;
            background: #444;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: grab;
            gap: 6px;
        }

        .layer-item:active {
            cursor: grabbing;
        }

        .layer-item.active {
            background: #094771;
            border-color: #007acc;
        }

        .layer-item:hover:not(.active) {
            background: #555;
        }

        .layer-name {
            font-size: 11px;
            flex-grow: 1;
            padding-left: 5px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sys-btn {
            background: #444;
            color: white;
            padding: 4px;
            font-size: 11px;
            width: 100%;
            border: 1px solid #555;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .sys-btn:hover {
            background: #555;
        }

        .toggle-label {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #ccc;
        }

        .raster-btn, .del-btn {
            color: white;
            border: none;
            padding: 4px 6px;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 2px;
        }
        .raster-btn { background: #e65100; }
        .raster-btn:hover { background: #ff9800; }
        .del-btn { background: #d32f2f; }
        .del-btn:hover { background: #f44336; }

        .transform-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            border: 2px dashed transparent;
            transform-origin: center center;
            user-select: none;
            box-sizing: border-box;
        }

        .transform-box::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            z-index: -1;
            cursor: move;
        }

        .transform-box.active {
            border-color: #007acc;
            z-index: 999 !important;
        }

        .transform-box:hover {
            border-color: rgba(0, 122, 204, 0.5);
        }

        .transform-box .content {
            width: 100%;
            height: 100%;
            cursor: default;
        }

        .transform-box.type-text .content {
            cursor: text;
            outline: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 5px;
        }

        .transform-box.type-text .content:empty:before {
            content: "텍스트 입력...";
            color: #aaa;
        }

        .transform-box.type-transform_box .content {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill;
            pointer-events: none;
        }

        .handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #007acc;
            border-radius: 50%;
            display: none;
            z-index: 10;
        }

        .transform-box.active .handle {
            display: block;
        }

        .handle-nw { top: -6px; left: -6px; cursor: nwse-resize; }
        .handle-ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .handle-sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
        .handle-se { bottom: -6px; right: -6px; cursor: nwse-resize; }

        .rotate-area {
            position: absolute;
            width: 24px;
            height: 24px;
            background: transparent;
            display: none;
            z-index: 5;
            border-radius: 50%;
            cursor: alias;
        }

        .transform-box.active .rotate-area { display: block; }
        .rot-nw { top: -20px; left: -20px; }
        .rot-ne { top: -20px; right: -20px; }
        .rot-sw { bottom: -20px; left: -20px; }
        .rot-se { bottom: -20px; right: -20px; }

        #floating-toolbar {
            position: fixed;
            display: none;
            background: #252526;
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            z-index: 2000;
            gap: 8px;
            align-items: center;
            border: 1px solid #444;
        }

        .toolbar-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        #top-option-bar {
            min-height: 30px;
            padding: 4px 20px;
            font-size: 11px;
            background: #2d2d2d; 
            border-bottom: 1px solid #444; 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            flex-shrink: 0;
        }

        #top-wrapper {
            transition: margin 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 150;
            display: flex;
            flex-direction: column;
            background: #2d2d2d; 
        }

        #top-wrapper.collapsed {
            margin-top: -100px; 
        }

        .panel-toggle-h {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 15px;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            font-size: 10px;
            font-weight: bold;
        }

        .panel-toggle-h:hover {
            background: #555;
            color: white;
        }

        .toggle-top {
            bottom: -15px;
            border-radius: 0 0 6px 6px;
            border-top: none;
        }

        .toggle-bottom {
            top: -15px;
            border-radius: 6px 6px 0 0;
            border-bottom: none;
        }
    </style>
</head>

<body>
    <div id="top-wrapper">
        <div class="app-header">
            <div class="header-top">
                <div class="header-group">
                    <button id="btn-save" class="btn-header">파일 저장</button>
                    <button id="btn-export-png" class="btn-header"
                        style="background-color: #4CAF50; color: white; border: none; border-radius: 4px; padding: 5px 10px; font-weight: bold;">PNG
                        내보내기</button>
                    <label class="file-label">파일 불러오기<input type="file" id="file-input" accept=".json"></label>
                    <button id="btn-clear-all" class="btn-header"
                        style="background-color: #ff4757; color: white; border: none; padding: 5px 10px; margin-left: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">🗑️
                        전체 지우기</button>
                </div>

                <div class="header-group" id="login-container">
                    <div id="naverIdLogin"></div>
                </div>

                <div class="header-group" id="donation-container" style="display: none;">
                    <div
                        style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;">
                        <div id="profile-preview"></div>
                        <label
                            style="font-size: 10px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 3px;">
                            <input type="checkbox" id="use-profile" checked style="margin:0; width:10px; height:10px;"> 프사 전송
                        </label>
                    </div>
                    <input type="text" id="custom-nickname" placeholder="닉네임" style="width: 100px; font-weight: bold;">
                    <input type="text" id="drawing-title" placeholder="그림 제목" style="width: 180px;">

                    <label
                        style="color: #ff9800; font-weight: bold; margin-right: 5px; font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" id="chk-animation-mode" style="width: 15px; height: 15px;">
                        🎬 다중 프레임 전송
                    </label>

                    <button id="btn-send">화면에 띄우기</button>
                </div>
            </div>
            <div class="disclaimer">
                ※ [조작 커서 ↖] 도구로 객체를 선택 및 이동하세요. (Shift 누르고 크기조절 시 비율 유지) / <b>일반 그림 조작 단축키: Alt + T</b>
            </div>
        </div>
        
        <div id="top-option-bar">
            <div style="font-size: 12px; font-weight: bold; color: #aaa;" id="current-tool-name">선택 및 조작</div>

            <div id="opt-text" style="display: none; gap: 10px; align-items: center;">
                <select id="tb-fontfamily"
                    style="background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;">
                    <option value="'Malgun Gothic', sans-serif">맑은 고딕</option>
                    <option value="Arial">Arial</option>
                </select>
                <input type="number" id="tb-fontsize"
                    style="width:50px; text-align:center; background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;"
                    value="40" title="폰트 크기(px)">
                <input type="color" id="tb-color"
                    style="width:30px; height:30px; padding:0; border:none; cursor:pointer;" title="글자 색상">
                <button class="toolbar-btn" id="tb-bold"
                    style="background: #333; color: white; border: 1px solid #555; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-weight: bold;">B</button>
                <button class="toolbar-btn" id="tb-italic"
                    style="background: #333; color: white; border: 1px solid #555; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-style: italic;">I</button>
            </div>

            <div id="opt-fill" style="display: none; gap: 15px; align-items: center; font-size: 11px; color: #ccc;">
                <label>색 유사도 (0~255) <input type="number" id="fill-tolerance" value="32" min="0" max="255"
                        style="width: 50px; text-align: center; margin-left: 5px;"></label>
                <label title="웹 캔버스 한계상 기초적인 형태만 지원합니다">틈새 닫기 강도 <input type="number" id="fill-gap" value="0" min="0"
                        max="20" style="width: 50px; text-align: center; margin-left: 5px;"></label>
            </div>
        </div>
        
        <div class="panel-toggle-h toggle-top" id="btn-toggle-top" title="상단바 숨기기">▲</div>
    </div>

    <div id="floating-toolbar">
        <select id="tb-fontfamily"
            style="background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;">
            <option value="'Malgun Gothic', sans-serif">맑은 고딕</option>
            <option value="Arial">Arial</option>
        </select>
        <input type="number" id="tb-fontsize"
            style="width:50px; text-align:center; background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;"
            value="40" title="폰트 크기(px)">
        <input type="color" id="tb-color" style="width:30px; height:30px; padding:0; border:none; cursor:pointer;"
            title="글자 색상">
        <button class="toolbar-btn" id="tb-bold">B</button>
        <button class="toolbar-btn" id="tb-italic" style="font-style: italic;">I</button>
    </div>

    <div id="frame-context-menu" class="frame-context-menu">
        <div style="font-size: 11px; color: #aaa; margin-bottom: 2px; text-align: center;">프레임 옵션</div>
        <div style="display: flex; align-items: center; gap: 5px; font-size: 11px; color: white;">
            노출(ms): <input type="number" id="ctx-duration" style="width: 55px; padding: 2px; font-size: 11px; text-align: center;">
        </div>
        <button id="ctx-btn-copy" class="sys-btn" style="background: #007acc; border-color: #005f9e; padding: 4px;">프레임 복사</button>
        <button id="ctx-btn-del" class="sys-btn" style="background: #d32f2f; border-color: #b71c1c; padding: 4px;">삭제</button>
    </div>

    <div class="app-body">
        <div class="sidebar-left" id="sidebar-left">
            <div class="panel-toggle toggle-left" id="btn-toggle-left" title="도구창 숨기기">◀</div>

            <input type="color" id="color-picker" value="#ffffff">
            <button class="tool-btn" data-tool="eyedropper" style="height: 30px; font-size: 11px; margin-top: -10px;"
                title="스포이드">스포이드</button>
            <div class="control-group"><label>투명도 <span id="opacity-val">100%</span></label><input type="range"
                    id="brush-opacity" min="0.05" max="1" step="0.05" value="1"></div>
            <div class="control-group"><label>굵기 <span id="width-val">5</span></label><input type="range"
                    id="line-width" min="1" max="50" value="5"></div>
            <div class="control-group"><label>떨림방지</label><input type="range" id="smoothing-level" min="0" max="20"
                    value="7"></div>
            <div style="width: 80%; height: 1px; background: #444; margin: 5px 0;"></div>

            <button class="tool-btn active-tool" data-tool="cursor" style="font-size: 20px;" title="선택 및 조작">↖</button>

            <div class="shape-container">

                <div id="shape-flyout" class="shape-flyout">
                    <button class="tool-btn sub-tool" data-tool="line" title="직선"><svg viewBox="0 0 24 24">

                    <button class="tool-btn sub-tool" data-tool="rect" title="사각형"><svg viewBox="0 0 24 24">

            <button class="tool-btn" id="btn-undo" style="height:35px;" title="단축키: Ctrl+Z">이전</button>
            <button class="tool-btn" id="btn-redo" style="height:35px;" title="단축키: Ctrl+Y">다음</button>
        </div>

        <div class="workspace">
            <div id="scroll-container">
                <div id="layer-wrapper" class="checker-bg">
                    <div id="offline-text">현재 방송 중 아님</div>
                    <iframe id="broadcast-bg" src="https://chzzk.naver.com/live/bc2dbff369307b5c446224cce192c8b1"
                        frameborder="0" allow="autoplay; fullscreen"></iframe>
                    
                    <canvas id="onion-prev" width="1920" height="1080" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; display: none;"></canvas>
                    <canvas id="onion-next" width="1920" height="1080" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; display: none;"></canvas>
                </div>
            </div>

            <div id="frame-panel">
                <div class="panel-toggle-h toggle-bottom" id="btn-toggle-bottom" title="타임라인 숨기기">▼</div>
                
                <div class="frame-header">
                    <button id="btn-play-anim" class="sys-btn" style="width: auto; background: #4CAF50; border-color: #388E3C; padding: 4px 6px; font-weight: bold; font-size: 11px;">▶</button>
                    <button id="btn-add-frame" class="sys-btn" style="width: auto; background: #007acc; border-color: #007acc; padding: 4px 6px; font-size: 11px; margin-right: 5px;">+</button>
                    
                    <div style="width: 1px; height: 18px; background: #555; margin: 0 4px;"></div>
                    
                    <label style="font-size: 11px; color: #ccc; display: flex; align-items: center; gap: 3px; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="chk-onion-skin" style="margin: 0; width: 13px; height: 13px;"> 어니언 스킨
                    </label>
                    <input type="range" id="onion-opacity" min="0.1" max="1" step="0.1" value="0.3" style="width: 40px; height: 10px; margin-left: 2px;" title="잔상 투명도 조절">
                </div>
                <div id="frame-list"></div>

        <div class="sidebar-right" id="sidebar-right">
            <div class="panel-toggle toggle-right" id="btn-toggle-right" title="레이어창 숨기기">▶</div>

            <div class="panel-section">
                <div class="panel-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>화면 제어</span>
                    <label class="toggle-label" style="font-size: 10px; margin: 0;"><input type="checkbox"
                            id="toggle-bg" style="margin: 0 3px 0 0;">방송배경</label>
                </div>

                <div style="display: flex; gap: 3px; align-items: center; justify-content: space-between;">
                    <button class="sys-btn" id="btn-zoom-out" style="width: 25px; padding: 2px;">-</button>
                    <span id="zoom-text"
                        style="font-size: 11px; font-weight: bold; width: 35px; text-align: center;">100%</span>
                    <button class="sys-btn" id="btn-zoom-in" style="width: 25px; padding: 2px;">+</button>
                    
                    <!-- ✨ 이미지 로드 버튼 (기존 러프 대신 일반 레이어로 삽입됨) -->
                    <label class="sys-btn"
                        style="text-align: center; background: #2e7d32; border-color: #1b5e20; cursor: pointer; flex: 1; margin-left: 5px;">
                        📁 이미지 로드
                        <input type="file" id="image-load-file" accept="image/*" style="display: none;">
                    </label>

            <div class="panel-section" style="flex: 1; overflow-y: hidden; display: flex; flex-direction: column;">
                <div class="panel-title">해당 프레임의 레이어</div>
                <button id="btn-add-layer" class="sys-btn"
                    style="background: #007acc; border-color: #007acc; margin-bottom: 5px;">+ 새 레이어</button>
                <div id="layer-list"
                    style="display: flex; flex-direction: column-reverse; gap: 3px; overflow-y: auto; flex: 1; padding-right: 2px;">
                </div>
            </div>
        </div>

        <script>
            const CANVAS_WIDTH = 1920; const CANVAS_HEIGHT = 1080;
            const CHZZK_CHANNEL_ID = 'bc2dbff369307b5c446224cce192c8b1';
            const API_BASE = window.location.origin;

            const layerWrapper = document.getElementById('layer-wrapper');
            const layerListDiv = document.getElementById('layer-list');
            const zoomText = document.getElementById('zoom-text');
            const scrollContainer = document.getElementById('scroll-container');

            let baseScale = 1.0;
            let zoomLevel = 1.0;

            function resizeCanvasToFit() {
                const wsRect = scrollContainer.getBoundingClientRect();
                const scaleX = wsRect.width / CANVAS_WIDTH;
                const scaleY = wsRect.height / CANVAS_HEIGHT;
                baseScale = Math.min(scaleX, scaleY) * 0.98;
                updateZoom(zoomLevel);
            }

            function updateZoom(newZoom) {
                zoomLevel = Math.max(0.1, Math.min(newZoom, 5.0));
                const finalScale = baseScale * zoomLevel;
                layerWrapper.style.transform = `scale(${finalScale})`;

                const wsRect = scrollContainer.getBoundingClientRect();
                const scaledWidth = CANVAS_WIDTH * finalScale;
                const scaledHeight = CANVAS_HEIGHT * finalScale;
                layerWrapper.style.left = Math.max(0, (wsRect.width - scaledWidth) / 2) + 'px';
                layerWrapper.style.top = Math.max(0, (wsRect.height - scaledHeight) / 2) + 'px';

                zoomText.innerText = `${Math.round(zoomLevel * 100)}%`;
            }

            window.addEventListener('resize', resizeCanvasToFit);

            function getPointerPos(e) {
                const rect = layerWrapper.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) / (baseScale * zoomLevel),
                    y: (e.clientY - rect.top) / (baseScale * zoomLevel)
                };
            }

            function updateTopOptionBar(tool) {
                const optText = document.getElementById('opt-text');
                const optFill = document.getElementById('opt-fill');
                const toolNameDisplay = document.getElementById('current-tool-name');

                if(optText) optText.style.display = 'none';
                if(optFill) optFill.style.display = 'none';
                
                const toolNames = {
                    'cursor': '선택 및 조작', 'pen': '펜', 'eraser': '지우개', 'text': '텍스트',
                    'line': '직선', 'rect': '사각형', 'circle': '원', 'fill': '채우기',
                    'eyedropper': '스포이드'
                };
                if(toolNameDisplay) toolNameDisplay.innerText = toolNames[tool] || tool;

                let needsOptionBar = false;

                if (tool === 'text') {
                    if (optText) optText.style.display = 'flex';
                    needsOptionBar = true;
                }
                if (tool === 'fill') {
                    if (optFill) optFill.style.display = 'flex';
                    needsOptionBar = true;
                }

                if (needsOptionBar) {
                    const topWrapper = document.getElementById('top-wrapper');
                    const btnToggleTop = document.getElementById('btn-toggle-top');
                    if (topWrapper && topWrapper.classList.contains('collapsed')) {
                        topWrapper.classList.remove('collapsed');
                        if (btnToggleTop) btnToggleTop.innerText = '▲';
                    }
                }
            }

            let frames = [];
            let currentFrameId = null;

            let layers = []; let layerCounter = 0; let activeLayerId = null;
            let history = []; let redoStack = [];

            let isDrawing = false; let currentWidth = 5; let currentTool = 'cursor';
            let smX = 0, smY = 0, smW = 0; let lastX = 0, lastY = 0;
            let shapeStartX = 0, shapeStartY = 0; let canvasSnapshot = null;
            let currentPath = [];

            let currentColorHex = '#ffffff';
            let currentOpacity = 1;
            let currentColor = 'rgba(255, 255, 255, 1)';

            function updateCurrentColor() {
                const r = parseInt(currentColorHex.slice(1, 3), 16);
                const g = parseInt(currentColorHex.slice(3, 5), 16);
                const b = parseInt(currentColorHex.slice(5, 7), 16);
                currentColor = `rgba(${r}, ${g}, ${b}, ${currentOpacity})`;
            }

            document.getElementById('color-picker').onchange = (e) => { currentColorHex = e.target.value; updateCurrentColor(); };
            document.getElementById('brush-opacity').oninput = (e) => { currentOpacity = parseFloat(e.target.value); document.getElementById('opacity-val').innerText = `${Math.round(currentOpacity * 100)}%`; updateCurrentColor(); };
            document.getElementById('line-width').oninput = (e) => { currentWidth = parseInt(e.target.value); document.getElementById('width-val').innerText = currentWidth; };

            const btnShape = document.getElementById('btn-shape');
            const shapeFlyout = document.getElementById('shape-flyout');
            const allToolBtns = document.querySelectorAll('.tool-btn[data-tool]');

            btnShape.addEventListener('click', (e) => { shapeFlyout.classList.toggle('show'); e.stopPropagation(); });
            document.addEventListener('click', (e) => { if (!btnShape.contains(e.target) && !shapeFlyout.contains(e.target)) shapeFlyout.classList.remove('show'); });

            function autoRasterizeAllTransforms() {
                const transformLayers = layers.filter(l => l.type === 'transform_box');
                transformLayers.forEach(l => {
                    applyTransform(l.id);
                });
            }

            allToolBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    allToolBtns.forEach(b => b.classList.remove('active-tool')); btnShape.classList.remove('active-tool');
                    if (e.currentTarget.classList.contains('sub-tool')) { btnShape.classList.add('active-tool'); shapeFlyout.classList.remove('show'); }
                    else { e.currentTarget.classList.add('active-tool'); }
                    currentTool = e.currentTarget.getAttribute('data-tool');

                    layers.forEach(l => {
                        if (l.type === 'canvas' && l.canvas) l.canvas.style.pointerEvents = (currentTool === 'pen' || currentTool === 'eraser' || currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle' || currentTool === 'fill') ? 'auto' : 'none';
                    });

                    if (currentTool !== 'cursor') {
                        document.querySelectorAll('.transform-box').forEach(box => box.classList.remove('active'));
                        autoRasterizeAllTransforms(); 
                    }

                    updateTopOptionBar(currentTool);
                });
            });

            const toggleBgBtn = document.getElementById('toggle-bg');
            const broadcastBg = document.getElementById('broadcast-bg');
            const offlineText = document.getElementById('offline-text');
            async function checkLiveStatus() {
                if (!toggleBgBtn.checked) { broadcastBg.style.display = 'none'; offlineText.style.display = 'none'; layerWrapper.classList.add('checker-bg'); return; }
                try {
                    const response = await fetch(`https://api.chzzk.naver.com/polling/v2/channels/${CHZZK_CHANNEL_ID}/live-status`);
                    const data = await response.json();
                    if (data.content && data.content.status === 'OPEN') { broadcastBg.style.display = 'block'; offlineText.style.display = 'none'; }
                    else { broadcastBg.style.display = 'none'; offlineText.style.display = 'block'; }
                    layerWrapper.classList.remove('checker-bg');
                } catch (error) { broadcastBg.style.display = 'block'; offlineText.style.display = 'none'; layerWrapper.classList.remove('checker-bg'); }
            }
            toggleBgBtn.addEventListener('change', checkLiveStatus);
            checkLiveStatus();

            document.getElementById('btn-zoom-in').onclick = () => updateZoom(zoomLevel + 0.1);
            document.getElementById('btn-zoom-out').onclick = () => updateZoom(zoomLevel - 0.1);
            scrollContainer.addEventListener('wheel', (e) => {
                if (e.altKey) { e.preventDefault(); if (e.deltaY < 0) updateZoom(zoomLevel + 0.01); else updateZoom(zoomLevel - 0.01); }
            }, { passive: false });

            function updateOnionSkin() {
                const prevCanvas = document.getElementById('onion-prev');
                const nextCanvas = document.getElementById('onion-next');
                if (!prevCanvas || !nextCanvas) return;

                const chkBox = document.getElementById('chk-onion-skin');
                const opacityInput = document.getElementById('onion-opacity');
                const isEnabled = chkBox ? chkBox.checked : false;
                const opacityVal = opacityInput ? opacityInput.value : 0.3;
                
                if (!isEnabled || !currentFrameId || isPlaying) {
                    prevCanvas.style.display = 'none';
                    nextCanvas.style.display = 'none';
                    return;
                }
                
                prevCanvas.style.display = 'block';
                nextCanvas.style.display = 'block';
                prevCanvas.style.opacity = opacityVal;
                nextCanvas.style.opacity = opacityVal;
                
                const prevCtx = prevCanvas.getContext('2d');
                const nextCtx = nextCanvas.getContext('2d');
                prevCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                nextCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                
                const currentIndex = frames.findIndex(f => f.id === currentFrameId);
                
                if (currentIndex > 0) renderFrameToCtx(frames[currentIndex - 1], prevCtx);
                if (currentIndex < frames.length - 1) renderFrameToCtx(frames[currentIndex + 1], nextCtx);
            }
            
            function renderFrameToCtx(frameData, ctx) {
                const sortedLayers = [...frameData.layers].filter(l => l.visible).sort((a, b) => {
                    const zA = parseInt(a.type === 'canvas' ? a.canvas?.style.zIndex : a.element?.style.zIndex) || 0;
                    const zB = parseInt(b.type === 'canvas' ? b.canvas?.style.zIndex : b.element?.style.zIndex) || 0;
                    return zA - zB;
                });
                
                sortedLayers.forEach(l => {
                    ctx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
                    if (l.type === 'canvas' && l.canvas) {
                        ctx.drawImage(l.canvas, 0, 0);
                    } else if (l.type === 'raster_image' || l.type === 'transform_box') {
                        const box = l.element;
                        const contentCvs = box.querySelector('canvas.content');
                        if (contentCvs) {
                            const w = box.offsetWidth, h = box.offsetHeight;
                            const cx = parseFloat(box.style.left) + w / 2, cy = parseFloat(box.style.top) + h / 2;
                            let angle = 0;
                            const transform = window.getComputedStyle(box).transform;
                            if (transform !== 'none') {
                                const vals = transform.split('(')[1].split(')')[0].split(',');
                                angle = Math.atan2(vals[1], vals[0]);
                            }
                            ctx.save();
                            ctx.translate(cx, cy);
                            ctx.rotate(angle);
                            ctx.drawImage(contentCvs, -w / 2, -h / 2, w, h);
                            ctx.restore();
                        }
                    }
                    ctx.globalAlpha = 1.0;
                });
            }

            document.getElementById('chk-onion-skin')?.addEventListener('change', updateOnionSkin);
            document.getElementById('onion-opacity')?.addEventListener('input', updateOnionSkin);

            function syncToFrame() {
                if (!currentFrameId) return;
                const f = frames.find(f => f.id === currentFrameId);
                if (f) {
                    f.layers = layers; f.layerCounter = layerCounter;
                    f.history = history; f.redoStack = redoStack; f.activeLayerId = activeLayerId;
                }
            }

            function selectFrame(fId) {
                if (currentFrameId === fId) return;
                syncToFrame();

                if (currentFrameId) {
                    const oldF = frames.find(f => f.id === currentFrameId);
                    if (oldF) {
                        oldF.layers.forEach(l => {
                            if (l.type === 'canvas' && l.canvas) l.canvas.style.display = 'none';
                            else if (l.element) l.element.style.display = 'none';
                        });
                    }
                }

                currentFrameId = fId;
                const newF = frames.find(f => f.id === currentFrameId);

                layers = newF.layers; layerCounter = newF.layerCounter;
                history = newF.history; redoStack = newF.redoStack; activeLayerId = newF.activeLayerId;

                layers.forEach(l => {
                    if (l.visible) {
                        if (l.type === 'canvas' && l.canvas) l.canvas.style.display = 'block';
                        else if (l.element) l.element.style.display = 'flex';
                    }
                });

                renderLayerUI();
                renderFrameUI();

                layers.forEach(l => {
                    if (l.type === 'canvas' && l.canvas) l.canvas.style.pointerEvents = (currentTool === 'cursor') ? 'none' : 'auto';
                });
                
                updateOnionSkin(); 
            }

            function createNewFrame() {
                const fId = `frame_${Date.now()}`;
                const newFrame = {
                    id: fId, duration: 500,
                    layers: [], layerCounter: 0, history: [], redoStack: [], activeLayerId: null
                };
                frames.push(newFrame);
                selectFrame(fId);
                createLayer();
            }

            function copyFrame(sourceId) {
                syncToFrame();
                const srcF = frames.find(f => f.id === sourceId);
                if (!srcF) return;

                const newFId = `frame_${Date.now()}`;
                const newF = {
                    id: newFId, duration: srcF.duration, layers: [],
                    layerCounter: srcF.layerCounter,
                    history: JSON.parse(JSON.stringify(srcF.history)),
                    redoStack: [], activeLayerId: null
                };

                srcF.layers.forEach(l => {
                    const newL = { ...l };
                    if (l.type === 'canvas') {
                        const cvs = document.createElement('canvas');
                        cvs.id = l.id + '_c' + Date.now();
                        cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT;
                        cvs.className = 'drawing-layer';
                        if(l.canvas) {
                            cvs.style.zIndex = l.canvas.style.zIndex;
                            cvs.style.opacity = l.opacity !== undefined ? l.opacity : 1;
                            const ctx = cvs.getContext('2d');
                            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                            ctx.drawImage(l.canvas, 0, 0);
                            newL.ctx = ctx;
                        }
                        cvs.style.pointerEvents = 'none';
                        cvs.style.display = 'none';
                        layerWrapper.appendChild(cvs);
                        newL.canvas = cvs; newL.id = cvs.id;
                    } else if (l.element) {
                        const box = l.element.cloneNode(true);
                        box.style.display = 'none';
                        box.style.opacity = l.opacity !== undefined ? l.opacity : 1;
                        box.id = l.id + '_c' + Date.now();
                        layerWrapper.appendChild(box);
                        newL.element = box; newL.id = box.id;

                        const oldCvs = l.element.querySelector('canvas.content');
                        if (oldCvs) {
                            const newCvs = box.querySelector('canvas.content');
                            const newCtx = newCvs.getContext('2d');
                            newCtx.drawImage(oldCvs, 0, 0);
                        }
                    }
                    newF.layers.push(newL);
                });

                const idMap = {};
                srcF.layers.forEach((l, i) => idMap[l.id] = newF.layers[i].id);
                newF.history.forEach(h => { if (h.layerId && idMap[h.layerId]) h.layerId = idMap[h.layerId]; });
                if (srcF.activeLayerId && idMap[srcF.activeLayerId]) newF.activeLayerId = idMap[srcF.activeLayerId];

                frames.push(newF);
                renderFrameUI();
                selectFrame(newFId);
            }

            function deleteFrame(fId) {
                if (frames.length <= 1) return alert('마지막 프레임은 삭제할 수 없습니다.');
                if (!confirm('해당 프레임을 삭제하시겠습니까?')) return;

                const f = frames.find(f => f.id === fId);
                f.layers.forEach(l => {
                    if (l.type === 'canvas' && l.canvas) l.canvas.remove();
                    else if (l.element) l.element.remove();
                });

                frames = frames.filter(frm => frm.id !== fId);
                if (currentFrameId === fId) {
                    selectFrame(frames[frames.length - 1].id);
                } else {
                    renderFrameUI();
                }
            }

            let contextMenuTargetId = null;

            function renderFrameUI() {
                const list = document.getElementById('frame-list');
                list.innerHTML = '';
                frames.forEach((f, idx) => {
                    const item = document.createElement('div');
                    item.className = `frame-item ${f.id === currentFrameId ? 'active' : ''}`;
                    item.draggable = true;
                    item.innerText = `${idx + 1}`; 

                    item.ondragstart = (e) => { e.dataTransfer.setData('text/plain', f.id); item.style.opacity = '0.5'; };
                    item.ondragend = (e) => { item.style.opacity = '1'; };
                    item.ondragover = (e) => { e.preventDefault(); item.style.borderLeft = '2px solid #007acc'; };
                    item.ondragleave = (e) => { item.style.borderLeft = '2px solid transparent'; };
                    item.ondrop = (e) => {
                        e.preventDefault(); item.style.borderLeft = '2px solid transparent';
                        const draggedId = e.dataTransfer.getData('text/plain'); if (draggedId === f.id) return;
                        const draggedIndex = frames.findIndex(frm => frm.id === draggedId);
                        const targetIndex = frames.findIndex(frm => frm.id === f.id);
                        if (draggedIndex > -1 && targetIndex > -1) {
                            const [draggedFrm] = frames.splice(draggedIndex, 1);
                            frames.splice(targetIndex, 0, draggedFrm);
                            renderFrameUI();
                        }
                    };

                    item.onclick = (e) => {
                        selectFrame(f.id);
                    };

                    item.oncontextmenu = (e) => {
                        e.preventDefault();
                        contextMenuTargetId = f.id;
                        const menu = document.getElementById('frame-context-menu');
                        menu.style.display = 'flex';
                        menu.style.left = `${e.pageX}px`;
                        menu.style.top = `${e.pageY - 120}px`; 
                        document.getElementById('ctx-duration').value = f.duration || 500;
                    };

                    list.appendChild(item);
                });
                
                updateOnionSkin(); 
            }

            document.getElementById('ctx-duration')?.addEventListener('change', (e) => {
                if(contextMenuTargetId) {
                    const f = frames.find(frm => frm.id === contextMenuTargetId);
                    if(f) f.duration = parseInt(e.target.value) || 500;
                }
            });
            document.getElementById('ctx-btn-copy')?.addEventListener('click', () => {
                if(contextMenuTargetId) copyFrame(contextMenuTargetId);
                document.getElementById('frame-context-menu').style.display = 'none';
            });
            document.getElementById('ctx-btn-del')?.addEventListener('click', () => {
                if(contextMenuTargetId) deleteFrame(contextMenuTargetId);
                document.getElementById('frame-context-menu').style.display = 'none';
            });
            document.addEventListener('click', (e) => {
                if(!e.target.closest('#frame-context-menu') && !e.target.classList.contains('frame-item')) {
                    const menu = document.getElementById('frame-context-menu');
                    if (menu) menu.style.display = 'none';
                }
            });

            document.getElementById('btn-add-frame').onclick = createNewFrame;

            function updateLayersZIndex() {
                layers.forEach((l, index) => {
                    const z = index + 2; 
                    if (l.type === 'canvas' && l.canvas) l.canvas.style.zIndex = z;
                    else if (l.element) l.element.style.zIndex = z;
                });
            }

            function createLayer() {
                layerCounter++; const lId = `layer_${layerCounter}`;
                const cvs = document.createElement('canvas'); cvs.id = lId; cvs.width = CANVAS_WIDTH; cvs.height = CANVAS_HEIGHT; cvs.className = 'drawing-layer';

            };

            document.getElementById('btn-export-png').onclick = () => {
                syncToFrame();

                const baseFileName = document.getElementById('drawing-title').value || "drawing";

                let hasUnrasterized = false;
                frames.forEach(f => {
                    if (f.layers.some(l => l.type === 'text')) hasUnrasterized = true;
                });
                if (hasUnrasterized) {
                    alert("확정되지 않은 텍스트 객체가 있습니다.\n우측 패널에서 텍스트 레이어의 [확정] 버튼을 누른 후 내보내주세요.");
                    return;
                }

                const downloadFrame = (frameData, index, totalFrames) => {
                    const offCanvas = document.createElement('canvas');
                    offCanvas.width = CANVAS_WIDTH;
                    offCanvas.height = CANVAS_HEIGHT;
                    const offCtx = offCanvas.getContext('2d');

                    const sortedLayers = [...frameData.layers].filter(l => l.visible).sort((a, b) => {
                        const zA = a.type === 'canvas' ? parseInt(a.canvas?.style.zIndex || 0) : parseInt(a.element?.style.zIndex || 0);
                        const zB = b.type === 'canvas' ? parseInt(b.canvas?.style.zIndex || 0) : parseInt(b.element?.style.zIndex || 0);
                        return zA - zB;
                    });

                    sortedLayers.forEach(l => {
                        offCtx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
                        if (l.type === 'canvas' && l.canvas) {
                            offCtx.drawImage(l.canvas, 0, 0);
                        } else if (l.type === 'raster_image' || l.type === 'transform_box') {
                            const box = l.element;
                            const contentCvs = box.querySelector('canvas.content');
                            if (contentCvs) {
                                const w = box.offsetWidth;
                                const h = box.offsetHeight;
                                const cx = parseFloat(box.style.left) + w / 2;
                                const cy = parseFloat(box.style.top) + h / 2;
                                let angle = 0;
                                const transform = window.getComputedStyle(box).transform;
                                if (transform !== 'none') {
                                    const vals = transform.split('(')[1].split(')')[0].split(',');
                                    angle = Math.atan2(vals[1], vals[0]);
                                }

                                offCtx.save();
                                offCtx.translate(cx, cy);
                                offCtx.rotate(angle);
                                offCtx.drawImage(contentCvs, -w / 2, -h / 2, w, h);
                                offCtx.restore();
                            }
                        }
                        offCtx.globalAlpha = 1.0;
                    });

                    const link = document.createElement('a');
                    link.download = totalFrames > 1 ? `${baseFileName}_${index + 1}.png` : `${baseFileName}.png`;
                    link.href = offCanvas.toDataURL('image/png');
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };

                frames.forEach((f, index) => {
                    setTimeout(() => {
                        downloadFrame(f, index, frames.length);
                    }, index * 300);
                });
            };

            const topWrapper = document.getElementById('top-wrapper');
            const framePanel = document.getElementById('frame-panel');
            const btnToggleTop = document.getElementById('btn-toggle-top');
            const btnToggleBottom = document.getElementById('btn-toggle-bottom');

            btnToggleTop.addEventListener('click', () => {
                topWrapper.classList.toggle('collapsed');
                btnToggleTop.innerText = topWrapper.classList.contains('collapsed') ? '▼' : '▲';
            });

            btnToggleBottom.addEventListener('click', () => {
                framePanel.classList.toggle('collapsed');
                btnToggleBottom.innerText = framePanel.classList.contains('collapsed') ? '▲' : '▼';
            });

            const sidebarLeft = document.getElementById('sidebar-left');
            const sidebarRight = document.getElementById('sidebar-right');
            const btnToggleLeft = document.getElementById('btn-toggle-left');
            const btnToggleRight = document.getElementById('btn-toggle-right');

            btnToggleLeft.addEventListener('click', () => {
                sidebarLeft.classList.toggle('collapsed');
                btnToggleLeft.innerText = sidebarLeft.classList.contains('collapsed') ? '▶' : '◀';
            });

            btnToggleRight.addEventListener('click', () => {
                sidebarRight.classList.toggle('collapsed');
                btnToggleRight.innerText = sidebarRight.classList.contains('collapsed') ? '◀' : '▶';
            });

            const resizeObserver = new ResizeObserver(() => {
                resizeCanvasToFit();
            });
            resizeObserver.observe(document.getElementById('scroll-container'));

            let isPlaying = false;
            let playTimeout = null;
            let playbackIndex = 0;

            function startAnimationPlayback() {
                if (frames.length === 0) return;
                isPlaying = true;

                const playBtn = document.getElementById('btn-play-anim');
                playBtn.innerText = '⏹';
                playBtn.style.background = '#d32f2f';
                playBtn.style.borderColor = '#b71c1c';

                syncToFrame();

                playbackIndex = frames.findIndex(f => f.id === currentFrameId);
                if (playbackIndex === -1) playbackIndex = 0;

                document.querySelector('.tool-btn[data-tool="cursor"]').click();

                playNextFrame();
            }

            function stopAnimationPlayback() {
                isPlaying = false;
                clearTimeout(playTimeout);

                const playBtn = document.getElementById('btn-play-anim');
                playBtn.innerText = '▶';
                playBtn.style.background = '#4CAF50';
                playBtn.style.borderColor = '#388E3C';
            }

            function playNextFrame() {
                if (!isPlaying) return;
                if (frames.length === 0) {
                    stopAnimationPlayback();
                    return;
                }

                if (playbackIndex >= frames.length) playbackIndex = 0;

                const frameToPlay = frames[playbackIndex];
                selectFrame(frameToPlay.id);

                playTimeout = setTimeout(() => {
                    playbackIndex++;
                    playNextFrame();
                }, frameToPlay.duration || 500);
            }

            document.getElementById('btn-play-anim').addEventListener('click', () => {
                if (isPlaying) {
                    stopAnimationPlayback();
                } else {
                    startAnimationPlayback();
                }
            });

            const originalCreateNewFrame = createNewFrame;
            createNewFrame = function () {
                if (isPlaying) stopAnimationPlayback();
                originalCreateNewFrame();
            };

            const originalDeleteFrame = deleteFrame;
            deleteFrame = function (fId) {
                if (isPlaying) stopAnimationPlayback();
                originalDeleteFrame(fId);
            };

            const originalCopyFrame = copyFrame;
            copyFrame = function (sourceId) {
                if (isPlaying) stopAnimationPlayback();
                originalCopyFrame(sourceId);
            };

            btnSend.onclick = async () => {
                syncToFrame();

                const title = document.getElementById('drawing-title').value || "제목없음";
                const customName = document.getElementById('custom-nickname').value || (loggedInUser ? loggedInUser.name : "익명");
                if (!loggedInUser) return alert("로그인이 필요합니다.");

                const isAnimationMode = document.getElementById('chk-animation-mode').checked;
                let finalPayload;

                if (isAnimationMode) {
                    let hasUnrasterized = false;
                    frames.forEach(f => { if (f.layers.some(l => l.type === 'text' || l.type === 'transform_box')) hasUnrasterized = true; });
                    if (hasUnrasterized) return alert("확정되지 않은 텍스트/그림 객체가 포함된 프레임이 있습니다.\n모든 프레임을 확인하여 [확정]을 눌러주세요.");

                    const animationPayload = [];
                    const offCanvas = document.createElement('canvas'); offCanvas.width = CANVAS_WIDTH; offCanvas.height = CANVAS_HEIGHT;
                    const offCtx = offCanvas.getContext('2d');

                    frames.forEach(f => {
                        offCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                        const sortedLayers = [...f.layers].filter(l => l.visible).sort((a, b) => {
                            const zA = a.type === 'canvas' ? parseInt(a.canvas?.style.zIndex || 0) : parseInt(a.element?.style.zIndex || 0);
                            const zB = b.type === 'canvas' ? parseInt(b.canvas?.style.zIndex || 0) : parseInt(b.element?.style.zIndex || 0);
                            return zA - zB;
                        });

                        sortedLayers.forEach(l => {
                            offCtx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
                            if (l.type === 'canvas' && l.canvas) { 
                                offCtx.drawImage(l.canvas, 0, 0); 
                            }
                            else if (l.type === 'raster_image') {
                                const box = l.element; const contentCvs = box.querySelector('canvas.content');
                                const w = box.offsetWidth; const h = box.offsetHeight;
                                const cx = parseFloat(box.style.left) + w / 2; const cy = parseFloat(box.style.top) + h / 2;
                                let angle = 0; const transform = window.getComputedStyle(box).transform;
                                if (transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }

                                offCtx.save(); offCtx.translate(cx, cy); offCtx.rotate(angle);
                                offCtx.drawImage(contentCvs, -w / 2, -h / 2, w, h); offCtx.restore();
                            }
                            offCtx.globalAlpha = 1.0;
                        });

                        animationPayload.push({ src: offCanvas.toDataURL('image/png'), duration: f.duration });
                    });

                    finalPayload = { isAnimation: true, frames: animationPayload };
                } else {
                    if (layers.some(l => l.type === 'text' || l.type === 'transform_box')) return alert("확정되지 않은 텍스트/그림 객체가 있습니다.\n우측 패널에서 레이어 [확정] 버튼을 눌러주세요.");

                    let singleHistoryPayload = [...history];
                    layers.forEach(l => {
                        if (l.type === 'raster_image') {
                            const box = l.element; const contentCvs = box.querySelector('canvas.content');
                            
                            const tempCvs = document.createElement('canvas');
                            tempCvs.width = contentCvs.width; tempCvs.height = contentCvs.height;
                            const tempCtx = tempCvs.getContext('2d');
                            tempCtx.globalAlpha = l.opacity !== undefined ? l.opacity : 1;
                            tempCtx.drawImage(contentCvs, 0, 0);

                            const w = box.offsetWidth; const h = box.offsetHeight;
                            const cx = parseFloat(box.style.left) + w / 2; const cy = parseFloat(box.style.top) + h / 2;
                            let angle = 0; const transform = window.getComputedStyle(box).transform;
                            if (transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }

                            singleHistoryPayload.push({ type: 'raster_image', src: tempCvs.toDataURL('image/png'), cx: cx, cy: cy, width: w, height: h, angle: angle });
                        }
                    });

                    if (singleHistoryPayload.length === 0) return alert("그림을 그려주세요!");
                    finalPayload = singleHistoryPayload;
                }

                const finalProfileImage = (useProfileCheckbox.checked && loggedInUser.profileImage) ? loggedInUser.profileImage : "";
                const payload = { name: customName, email: loggedInUser.email, profileImage: finalProfileImage, title: title, drawingData: finalPayload };

                try {
                    const res = await fetch(`${API_BASE}/api/submit-drawing`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (res.ok) {
                        alert("전송 성공!"); clearMyCanvas(); document.getElementById('drawing-title').value = '';
                    } else {
                        const data = await res.json(); alert("전송 실패: " + (data.detail || "서버 오류"));
                    }
                } catch (error) { console.error("Error:", error); alert("서버 연결에 실패했습니다."); }
            };
        </script>
