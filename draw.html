<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시청자용 그리기 (프로페셔널 에디터)</title>
    <script type="text/javascript" src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Malgun Gothic', sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
        button { cursor: pointer; border: none; border-radius: 4px; outline: none; transition: 0.2s; }
        input[type="text"], input[type="number"] { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 4px; }
        input[type="number"] { text-align: center; }

        /* 상단 헤더 */
        .app-header { background: #2d2d2d; border-bottom: 1px solid #444; display: flex; flex-direction: column; justify-content: center; padding: 10px 20px; flex-shrink: 0; gap: 8px; }
        .header-top { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .header-group { display: flex; align-items: center; gap: 10px; }
        .btn-header, .file-label { background: #444; color: white; padding: 8px 15px; font-size: 13px; font-weight: bold; border: 1px solid #555; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-header:hover, .file-label:hover { background: #555; }
        input[type="file"] { display: none; }
        #btn-send { background: #ff9800; color: white; border: none; font-size: 15px; padding: 8px 20px; font-weight: bold; }
        #btn-send:hover { background: #fb8c00; }
        .disclaimer { font-size: 11px; color: #888; text-align: right; width: 100%; }
        #profile-preview { width: 34px; height: 34px; border-radius: 50%; background-color: white; background-size: cover; background-position: center; border: 1px solid #555;}

        /* ✨ 다이내믹 옵션바 (도구별 상단 옵션) */
        #options-bar { height: 45px; background: #252526; border-bottom: 1px solid #444; display: flex; align-items: center; padding: 0 15px; gap: 20px; flex-shrink: 0; overflow-x: auto; }
        .opt-group { display: none; align-items: center; gap: 8px; font-size: 12px; color: #ccc; }
        .opt-group.show { display: flex; }
        .opt-group input[type="range"] { width: 100px; cursor: pointer; }
        .opt-label { font-weight: bold; }
        #color-picker { width: 30px; height: 30px; padding: 0; border: 2px solid #555; border-radius: 4px; cursor: pointer; background: transparent; }
        .opt-btn { background: #333; color: white; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .opt-btn.active { background: #007acc; border-color: #007acc; }

        /* 바디 레이아웃 */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        
        /* 좌측 툴바 */
        .sidebar-left { width: 65px; background: #252526; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 10px; overflow-y: visible; flex-shrink: 0; position: relative; }
        .tool-btn { width: 45px; height: 45px; background: #333; color: #ccc; font-size: 18px; display: flex; justify-content: center; align-items: center; border: 1px solid #444; border-radius: 6px; }
        .tool-btn:hover:not(.active-tool) { background: #444; }
        .tool-btn.active-tool { background: #007acc; color: white; font-weight: bold; border-color: #007acc; }
        
        /* 도형 플라이아웃 */
        .shape-container { position: relative; width: 100%; display: flex; justify-content: center; }
        .shape-flyout { display: none; position: absolute; left: 55px; top: 0; background: #252526; border: 1px solid #555; border-radius: 4px; padding: 5px; gap: 5px; z-index: 100; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .shape-flyout.show { display: flex; flex-direction: row; }
        .sub-tool { width: 40px; height: 40px; }
        .sub-tool svg { stroke: currentColor; fill: none; stroke-width: 2; width: 24px; height: 24px; }

        /* 중앙 캔버스 영역 */
        .workspace { flex: 1; display: flex; flex-direction: column; background: #111; overflow: hidden; }
        #scroll-container { flex: 1; overflow: hidden; position: relative; }
        #layer-wrapper { 
            width: 1920px; height: 1080px; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1); 
            transform-origin: center center; touch-action: none; box-shadow: 0 0 30px rgba(0,0,0,0.8); 
        }
        .checker-bg { background-color: #ffffff; background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0), linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0); background-size: 30px 30px; background-position: 0 0, 15px 15px; }
        #broadcast-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8; display: none; }
        #offline-text { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 48px; font-weight: bold; z-index: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .drawing-layer { position: absolute; top: 0; left: 0; pointer-events: none; }

        /* 프레임 타임라인 패널 */
        #frame-panel { height: 110px; background: #252526; border-top: 1px solid #444; display: flex; flex-direction: column; flex-shrink: 0; }
        .frame-header { padding: 5px 10px; background: #333; font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        #frame-list { display: flex; flex: 1; overflow-x: auto; padding: 10px; gap: 10px; align-items: center; }
        .frame-item { width: 110px; height: 100%; background: #444; border: 2px solid transparent; border-radius: 6px; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; cursor: grab; flex-shrink: 0; }
        .frame-item.active { background: #094771; border-color: #007acc; }

        /* 우측 패널 (제어 / 레이어) */
        .sidebar-right { width: 240px; background: #252526; border-left: 1px solid #444; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; flex-shrink: 0; gap: 15px; }
        .panel-section { background: #333; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        .panel-title { font-size: 12px; color: #aaa; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .sys-btn { background: #444; color: white; padding: 6px; font-size: 12px; width: 100%; border: 1px solid #555; font-weight: bold; cursor: pointer;}
        .sys-btn:hover { background: #555; }
        .toggle-label { font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: #ccc; }
        
        .layer-item { display: flex; justify-content: space-between; align-items: center; background: #444; padding: 8px; border-radius: 4px; border: 1px solid transparent; cursor: grab; }
        .layer-item.active { background: #094771; border-color: #007acc; }
        .layer-item:hover:not(.active) { background: #555; }
        .layer-name { font-size: 13px; flex-grow: 1; padding-left: 10px; color: white;}
        .raster-btn, .del-btn { color: white; border: none; padding: 4px 6px; font-size: 11px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-left: 2px;}
        .raster-btn { background: #e65100; } .raster-btn:hover { background: #ff9800; }
        .del-btn { background: #d32f2f; } .del-btn:hover { background: #f44336; }

        /* 만능 객체 트랜스폼 박스 */
        .transform-box { position: absolute; display: flex; flex-direction: column; border: 2px dashed transparent; transform-origin: center center; user-select: none; box-sizing: border-box; }
        .transform-box::before { content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px; z-index: -1; cursor: move; }
        .transform-box.active { border-color: #007acc; z-index: 999 !important; }
        .transform-box:hover { border-color: rgba(0, 122, 204, 0.5); }
        
        .transform-box .content { width: 100%; height: 100%; cursor: default; }
        .transform-box.type-text .content { cursor: text; outline: none; white-space: pre-wrap; word-wrap: break-word; padding: 5px; }
        .transform-box.type-text .content:empty:before { content: "텍스트 입력..."; color: #aaa; }
        .transform-box.type-transform_box .content, .transform-box.type-rough .content { width: 100%; height: 100%; display: block; object-fit: fill; pointer-events: none; }

        .handle { position: absolute; width: 12px; height: 12px; background: #fff; border: 2px solid #007acc; border-radius: 50%; display: none; z-index: 10; }
        .transform-box.active .handle { display: block; }
        .handle-nw { top: -6px; left: -6px; cursor: nwse-resize; } .handle-ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .handle-sw { bottom: -6px; left: -6px; cursor: nesw-resize; } .handle-se { bottom: -6px; right: -6px; cursor: nwse-resize; }
        .rotate-area { position: absolute; width: 24px; height: 24px; background: transparent; display: none; z-index: 5; border-radius: 50%; cursor: alias; }
        .transform-box.active .rotate-area { display: block; }
        .rot-nw { top: -20px; left: -20px; } .rot-ne { top: -20px; right: -20px; }
        .rot-sw { bottom: -20px; left: -20px; } .rot-se { bottom: -20px; right: -20px; }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="header-top">
            <div class="header-group">
                <button id="btn-save" class="btn-header">파일 저장</button>
                <label class="file-label">파일 불러오기<input type="file" id="file-input" accept=".json"></label>
                <button id="btn-clear-all" class="btn-header" style="background-color: #ff4757; margin-left: 10px;">🗑️ 프레임 전체 지우기</button>
            </div>
            
            <div class="header-group" id="login-container"><div id="naverIdLogin"></div></div>

            <div class="header-group" id="donation-container" style="display: none;">
                <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                    <div id="profile-preview"></div>
                    <label style="font-size: 10px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 3px;">
                        <input type="checkbox" id="use-profile" checked style="margin:0; width:10px; height:10px;"> 프사 전송
                    </label>
                </div>
                <input type="text" id="custom-nickname" placeholder="닉네임" style="width: 100px; font-weight: bold;">
                <input type="text" id="drawing-title" placeholder="그림 제목" style="width: 180px;">
                
                <label style="color: #ff9800; font-weight: bold; margin-right: 5px; font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" id="chk-animation-mode" style="width: 15px; height: 15px;"> 🎬 다중 프레임 애니메이션 전송
                </label>
                <button id="btn-send">화면에 띄우기 (전송)</button>
            </div>
        </div>
        <div class="disclaimer">※ [조작 커서 ↖] 도구로 객체를 이동/변형하세요. (Shift 누른채 크기조절: 비율 유지) / <b>일반 그림 변형 단축키: Alt + T</b></div>
    </div>

    <!-- ✨ 동적 상단 옵션바 -->
    <div id="options-bar">
        <div class="opt-group show opt-all">
            <div class="opt-label">색상</div>
            <input type="color" id="color-picker" value="#ffffff" title="색상 선택">
        </div>
        <div class="opt-group show opt-pen opt-eraser opt-line opt-rect opt-circle opt-text opt-fill">
            <div class="opt-label">투명도 <span id="opacity-val">100%</span></div>
            <input type="range" id="brush-opacity" min="0.05" max="1" step="0.05" value="1">
        </div>
        <div class="opt-group show opt-pen opt-eraser opt-line opt-rect opt-circle">
            <div class="opt-label">굵기 <span id="width-val">5</span></div>
            <input type="range" id="line-width" min="1" max="50" value="5">
        </div>
        <div class="opt-group show opt-pen opt-eraser">
            <div class="opt-label">떨림방지 <span id="smooth-val">7</span></div>
            <input type="range" id="smoothing-level" min="0" max="20" value="7">
        </div>
        <div class="opt-group opt-fill">
            <div class="opt-label">색 유사도 <span id="tolerance-val">30</span></div>
            <input type="range" id="fill-tolerance" min="0" max="255" value="30">
        </div>
        <div class="opt-group opt-fill">
            <div class="opt-label">틈새 닫기 <span id="gap-val">0</span>px</div>
            <input type="range" id="fill-gap" min="0" max="10" value="0">
        </div>
        
        <!-- ✨ 텍스트 전용 옵션 (선택 시 나타남) -->
        <div class="opt-group opt-text">
            <div class="opt-label">폰트</div>
            <select id="opt-fontfamily" style="background:#333; color:white; padding:4px; border:1px solid #555; border-radius:4px;">
                <option value="'Malgun Gothic', sans-serif">맑은 고딕</option>
                <option value="'굴림', Gulim, sans-serif">굴림</option>
                <option value="Arial">Arial</option>
            </select>
        </div>
        <div class="opt-group opt-text">
            <div class="opt-label">크기(px)</div>
            <input type="number" id="opt-fontsize" value="40" style="width:50px; padding:4px;">
        </div>
        <div class="opt-group opt-text">
            <button id="opt-bold" class="opt-btn">B</button>
            <button id="opt-italic" class="opt-btn" style="font-style: italic;">I</button>
        </div>
    </div>

    <div class="app-body">
        <div class="sidebar-left">
            <button class="tool-btn active-tool" data-tool="cursor" title="선택 및 조작">↖</button>
            <button class="tool-btn" data-tool="pen" title="펜">🖊️</button>
            <button class="tool-btn" data-tool="eraser" title="지우개">🧹</button>
            <button class="tool-btn" data-tool="fill" title="채워넣기">🪣</button>
            <button class="tool-btn" data-tool="text" title="텍스트" style="font-weight: bold;">T</button>

            <div class="shape-container">
                <button class="tool-btn" id="btn-shape" title="도형" style="font-size:12px;">도형</button>
                <div id="shape-flyout" class="shape-flyout">
                    <button class="tool-btn sub-tool" data-tool="line" title="직선"><svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"></line></svg></button>
                    <button class="tool-btn sub-tool" data-tool="rect" title="사각형"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"></rect></svg></button>
                    <button class="tool-btn sub-tool" data-tool="circle" title="원"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle></svg></button>
                </div>
            </div>
            
            <button class="tool-btn" id="btn-undo" title="이전 (Ctrl+Z)" style="margin-top:auto; font-size:12px;">이전</button>
            <button class="tool-btn" id="btn-redo" title="다음 (Ctrl+Y)" style="font-size:12px;">다음</button>
        </div>

        <div class="workspace">
            <div id="scroll-container">
                <div id="layer-wrapper" class="checker-bg">
                    <div id="offline-text">현재 방송 중 아님</div>
                    <iframe id="broadcast-bg" src="https://chzzk.naver.com/live/bc2dbff369307b5c446224cce192c8b1" frameborder="0" allow="autoplay; fullscreen"></iframe>
                </div>
            </div>
            
            <div id="frame-panel">
                <div class="frame-header">
                    <span>🎬 애니메이션 프레임 타임라인</span>
                    <button id="btn-add-frame" class="sys-btn" style="width: auto; background: #007acc; border-color: #007acc; padding: 4px 10px;">+ 새 프레임</button>
                </div>
                <div id="frame-list"></div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="panel-section">
                <div class="panel-title">화면 제어</div>
                <div style="display: flex; gap: 5px; align-items: center; justify-content: space-between;">
                    <button class="sys-btn" id="btn-zoom-out">-</button>
                    <span id="zoom-text" style="font-size: 12px; font-weight: bold; width: 40px; text-align: center;">100%</span>
                    <button class="sys-btn" id="btn-zoom-in">+</button>
                </div>
                <label class="toggle-label" style="margin-top: 5px;"><input type="checkbox" id="toggle-bg"> 방송 배경 표시</label>
            </div>

            <div class="panel-section">
                <div class="panel-title" style="color: #4CAF50;">참고 이미지 (전송 제외)</div>
                <label class="sys-btn" style="text-align: center; background: #2e7d32; border-color: #1b5e20; cursor: pointer;">
                    📁 이미지 불러오기
                    <input type="file" id="rough-file" accept="image/*" style="display: none;">
                </label>
                <div id="rough-controls" style="display: none; flex-direction: column; gap: 8px; margin-top: 8px;">
                    <label style="font-size: 11px; color: #aaa; display: flex; justify-content: space-between;">투명도 <span id="rough-opacity-val">50%</span></label>
                    <input type="range" id="rough-opacity" min="0" max="1" step="0.05" value="0.5" style="width: 100%;">
                    <button id="btn-delete-rough" class="sys-btn" style="background: #ff4757; border-color: #c0392b;">🗑️ 모든 러프 삭제</button>
                </div>
            </div>

            <div class="panel-section" style="flex: 1; overflow-y: hidden; display: flex; flex-direction: column;">
                <div class="panel-title">해당 프레임의 레이어</div>
                <button id="btn-add-layer" class="sys-btn" style="background: #007acc; border-color: #007acc; margin-bottom: 10px;">새 레이어</button>
                <div id="layer-list" style="display: flex; flex-direction: column-reverse; gap: 5px; overflow-y: auto; flex: 1;"></div>
            </div>
        </div>
    </div>

    <script>
        // 전역 상수 및 캔버스 설정
        const CANVAS_WIDTH = 1920; const CANVAS_HEIGHT = 1080;
        const CHZZK_CHANNEL_ID = 'bc2dbff369307b5c446224cce192c8b1'; 
        const API_BASE = window.location.origin;
        
        const layerWrapper = document.getElementById('layer-wrapper');
        const layerListDiv = document.getElementById('layer-list');
        const scrollContainer = document.getElementById('scroll-container');
        
        let frames = []; let currentFrameId = null;
        let layers = []; let layerCounter = 0; let activeLayerId = null;
        let history = []; let redoStack = [];

        let isDrawing = false; let currentTool = 'cursor'; 
        let smX = 0, smY = 0, smW = 0; let lastX = 0, lastY = 0;
        let shapeStartX = 0, shapeStartY = 0; let canvasSnapshot = null; let currentPath = []; 

        // 툴 설정 상태 변수
        let currentWidth = 5; 
        let currentColorHex = '#ffffff'; 
        let currentOpacity = 1; 
        let currentColor = 'rgba(255, 255, 255, 1)';
        let fillTolerance = 30; let fillGap = 0;
        let textFontFamily = "'Malgun Gothic', sans-serif";
        let textFontSize = 40;
        let isTextBold = false;
        let isTextItalic = false;

        // 상단 옵션바 UI 동기화
        function updateOptionsBar() {
            document.querySelectorAll('#options-bar .opt-group').forEach(grp => {
                if (grp.classList.contains('opt-all') || grp.classList.contains('opt-' + currentTool)) {
                    grp.classList.add('show');
                } else {
                    grp.classList.remove('show');
                }
            });
        }

        function updateCurrentColor() {
            const r = parseInt(currentColorHex.slice(1, 3), 16);
            const g = parseInt(currentColorHex.slice(3, 5), 16);
            const b = parseInt(currentColorHex.slice(5, 7), 16);
            currentColor = `rgba(${r}, ${g}, ${b}, ${currentOpacity})`;
        }

        // 옵션바 이벤트 연결
        document.getElementById('color-picker').onchange = (e) => { currentColorHex = e.target.value; updateCurrentColor(); };
        document.getElementById('brush-opacity').oninput = (e) => { currentOpacity = parseFloat(e.target.value); document.getElementById('opacity-val').innerText = `${Math.round(currentOpacity * 100)}%`; updateCurrentColor(); };
        document.getElementById('line-width').oninput = (e) => { currentWidth = parseInt(e.target.value); document.getElementById('width-val').innerText = currentWidth; };
        document.getElementById('smoothing-level').oninput = (e) => { document.getElementById('smooth-val').innerText = e.target.value; };
        document.getElementById('fill-tolerance').oninput = (e) => { fillTolerance = parseInt(e.target.value); document.getElementById('tolerance-val').innerText = fillTolerance; };
        document.getElementById('fill-gap').oninput = (e) => { fillGap = parseInt(e.target.value); document.getElementById('gap-val').innerText = fillGap; };
        
        // 텍스트 옵션 설정
        document.getElementById('opt-fontfamily').onchange = (e) => { textFontFamily = e.target.value; applyTextFormatToActive(); };
        document.getElementById('opt-fontsize').oninput = (e) => { textFontSize = parseInt(e.target.value) || 40; applyTextFormatToActive(); };
        
        const btnBold = document.getElementById('opt-bold');
        const btnItalic = document.getElementById('opt-italic');
        btnBold.onclick = () => { isTextBold = !isTextBold; btnBold.classList.toggle('active', isTextBold); applyTextFormatToActive(); };
        btnItalic.onclick = () => { isTextItalic = !isTextItalic; btnItalic.classList.toggle('active', isTextItalic); applyTextFormatToActive(); };

        // 활성화된 텍스트 박스에 옵션 적용
        function applyTextFormatToActive() {
            const activeBox = document.querySelector('.transform-box.type-text.active .content');
            if (activeBox) {
                activeBox.style.fontFamily = textFontFamily;
                activeBox.style.fontSize = `${textFontSize}px`;
                activeBox.style.fontWeight = isTextBold ? 'bold' : 'normal';
                activeBox.style.fontStyle = isTextItalic ? 'italic' : 'normal';
            }
        }

        // 도구 메뉴 선택
        const btnShape = document.getElementById('btn-shape'); const shapeFlyout = document.getElementById('shape-flyout');
        const allToolBtns = document.querySelectorAll('.tool-btn[data-tool]');

        // 줌 및 스크롤 100% Fit 제어

        function updateZoom(newMultiplier) {

        // ✨ 텍스트 완벽 래스터화 및 변형 적용 (확정 버튼)
        function applyTransform(layerId) {

            if (!layer) return;

                const contentDiv = layer.element.querySelector('.content');
                if (!contentDiv.innerText.trim() || contentDiv.innerText === '텍스트 입력...') { deleteLayer(layerId); return; }

                const clone = contentDiv.cloneNode(true); clone.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml'); clone.removeAttribute('contenteditable'); clone.style.cssText = cssText;
                
                const scale = window.devicePixelRatio || 2; clone.style.transform = `scale(${scale})`; clone.style.transformOrigin = 'top left';
                const xmlString = new XMLSerializer().serializeToString(clone);

                const img = new Image(); img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);

        // Bounding Box 및 Alt+T 변환
        function getBoundingBox(ctx, width, height) {
            const imgData = ctx.getImageData(0, 0, width, height); const data = imgData.data;
            let minX = width, minY = height, maxX = 0, maxY = 0; let hasPixel = false;
            for (let y = 0; y < height; y++) { for (let x = 0; x < width; x++) { if (data[(y * width + x) * 4 + 3] > 0) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; hasPixel = true; } } }
            if (!hasPixel) return null; return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
        }

        function renderBrushStroke(ctx, x1, y1, w1, x2, y2, w2, color, isEraser) {
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over'; ctx.fillStyle = isEraser ? "rgba(0,0,0,1)" : color;
            const dx = x2 - x1; const dy = y2 - y1; const distance = Math.hypot(dx, dy);
            const spacing = Math.max(1, Math.min(w1, w2) * 0.1); const steps = Math.max(1, Math.floor(distance / spacing));

                ctx.beginPath(); ctx.arc(cx, cy, cw / 2, 0, Math.PI * 2); ctx.fill();

        // ✨ 틈새 닫기(Gap Close) 및 색 유사도(Tolerance)가 포함된 페인트통 (Flood Fill) 알고리즘
        function executeFill(ctx, startX, startY, fillRgba, tolerance, gap) {

        } checkDonationStatus(); setInterval(checkDonationStatus, 10000); 

        function clearMyCanvas() { frames.forEach(f => { f.layers.forEach(l => { if(l.type === 'canvas') l.canvas.remove(); else if (l.element) l.element.remove(); }); }); frames = []; createNewFrame(); }
        document.getElementById('btn-clear-all').onclick = () => { if (confirm("정말 모든 프레임과 그림을 지우시겠습니까?\n(이 작업은 되돌릴 수 없습니다)")) clearMyCanvas(); };

        btnSend.onclick = async () => {
            syncToFrame(); 
            const title = document.getElementById('drawing-title').value || "제목없음";
            const customName = document.getElementById('custom-nickname').value || (loggedInUser ? loggedInUser.name : "익명");
            if (!loggedInUser) return alert("로그인이 필요합니다.");

            const isAnimationMode = document.getElementById('chk-animation-mode').checked;
            let finalPayload;

            if (isAnimationMode) {
                let hasUnrasterized = false;
                frames.forEach(f => { if (f.layers.some(l => l.type === 'text' || l.type === 'transform_box')) hasUnrasterized = true; });
                if (hasUnrasterized) return alert("확정되지 않은 객체가 포함된 프레임이 있습니다.\n해당 프레임에서 [확정]을 눌러주세요.");

                const animationPayload = [];
                const offCanvas = document.createElement('canvas'); offCanvas.width = CANVAS_WIDTH; offCanvas.height = CANVAS_HEIGHT;
                const offCtx = offCanvas.getContext('2d');

                frames.forEach(f => {
                    offCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                    const sortedLayers = [...f.layers].filter(l => l.visible && l.type !== 'rough').sort((a,b) => {
                        const zA = a.type === 'canvas' ? parseInt(a.canvas.style.zIndex) : parseInt(a.element.style.zIndex);
                        const zB = b.type === 'canvas' ? parseInt(b.canvas.style.zIndex) : parseInt(b.element.style.zIndex);
                        return zA - zB;
                    });
                    sortedLayers.forEach(l => {
                        if (l.type === 'canvas') { offCtx.drawImage(l.canvas, 0, 0); } 
                        else if (l.type === 'raster_image') {
                            const box = l.element; const contentCvs = box.querySelector('canvas.content');
                            const w = box.offsetWidth; const h = box.offsetHeight;
                            const cx = parseFloat(box.style.left) + w/2; const cy = parseFloat(box.style.top) + h/2;
                            let angle = 0; const transform = window.getComputedStyle(box).transform; if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                            offCtx.save(); offCtx.translate(cx, cy); offCtx.rotate(angle); offCtx.drawImage(contentCvs, -w/2, -h/2, w, h); offCtx.restore();
                        }
                    });
                    animationPayload.push({ src: offCanvas.toDataURL('image/png'), duration: f.duration });
                });
                finalPayload = { isAnimation: true, frames: animationPayload };
            } else {
                if (layers.some(l => l.type === 'text' || l.type === 'transform_box')) return alert("확정되지 않은 객체가 있습니다.\n우측 패널에서 레이어 [확정] 버튼을 눌러주세요.");
                let singleHistoryPayload = [...history];
                layers.forEach(l => {
                    if (l.type === 'raster_image') {
                        const box = l.element; const contentCvs = box.querySelector('canvas.content');
                        const w = box.offsetWidth; const h = box.offsetHeight;
                        const cx = parseFloat(box.style.left) + w/2; const cy = parseFloat(box.style.top) + h/2;
                        let angle = 0; const transform = window.getComputedStyle(box).transform; if(transform !== 'none') { const vals = transform.split('(')[1].split(')')[0].split(','); angle = Math.atan2(vals[1], vals[0]); }
                        singleHistoryPayload.push({ type: 'raster_image', src: contentCvs.toDataURL('image/png'), cx: cx, cy: cy, width: w, height: h, angle: angle });
                    }
                });
                if (singleHistoryPayload.length === 0) return alert("그림을 그려주세요!");
                finalPayload = singleHistoryPayload;
            }

            const finalProfileImage = (useProfileCheckbox.checked && loggedInUser.profileImage) ? loggedInUser.profileImage : "";
            const payload = { name: customName, email: loggedInUser.email, profileImage: finalProfileImage, title: title, drawingData: finalPayload };

            try {
                const res = await fetch(`${API_BASE}/api/submit-drawing`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { alert("전송 성공!"); clearMyCanvas(); document.getElementById('drawing-title').value = ''; } 
                else { const data = await res.json(); alert("전송 실패: " + (data.detail || "서버 오류")); }
            } catch (error) { console.error("Error:", error); alert("서버 연결에 실패했습니다."); }
        };
    </script>
</body>
</html>
